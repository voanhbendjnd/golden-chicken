<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Voucher</title>
    <link rel="stylesheet" th:href="@{/css/voucher.css}">
</head>
<body>

<div class="voucher-container">
    <h2 class="page-title">Create Voucher</h2>

    <div th:if="${errorMessage}"
         class="error-box"
         th:text="${errorMessage}">
    </div>
    <form class="voucher-form"
          th:action="@{/staff/voucher/create}"
          th:object="${voucher}"
          method="post">

        <div class="form-group">
            <label>Code</label>
            <input type="text" th:field="*{code}"/>
            <div class="field-error"
                 th:if="${#fields.hasErrors('code')}"
                 th:errors="*{code}">
            </div>
        </div>

        <div class="form-group">
            <label>Name</label>
            <input type="text" th:field="*{name}"/>
            <div class="field-error"
                 th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}">
            </div>
        </div>

        <div class="form-group full">
            <label>Description</label>
            <input type="text" th:field="*{description}"/>

            <div class="field-error"
                 th:if="${#fields.hasErrors('description')}"
                 th:errors="*{description}">
            </div>
        </div>

        <div class="form-group">
            <label>Discount Type</label>
            <select th:field="*{discountType}">
                <option value="">-- Select discount type --</option>
                <option value="PERCENT">PERCENT</option>
                <option value="FIXED">FIXED</option>
            </select>
            <div class="field-error"
                 th:if="${#fields.hasErrors('discountType')}"
                 th:errors="*{discountType}">
            </div>
        </div>
        <div class="form-group">
            <label>Voucher Type</label>
            <select th:field="*{voucherType}">
                <option value="">-- Select voucher type --</option>
                <option value="PRODUCT">PRODUCT</option>
                <option value="SHIPPING">SHIPPING</option>
            </select>
            <div class="field-error"
                 th:if="${#fields.hasErrors('voucherType')}"
                 th:errors="*{voucherType}">
            </div>
        </div>
        <div class="form-group">
            <label>Discount Value</label>

            <div style="display:flex; align-items:center; gap:8px;">
                <input type="number"
                       id="discountValue"
                       th:field="*{discountValue}"

                       min="0"/>
                <span id="discountUnit">%</span>
            </div>

            <small id="discountHint" style="color:#777">
                Enter percent (0 — 100)
            </small>

            <div class="field-error"
                 th:if="${#fields.hasErrors('discountValue')}"
                 th:errors="*{discountValue}">
            </div>
        </div>

        <div class="form-group">
            <label>Min Order Value</label>
            <input type="number"
                   step="0.01"
                   th:field="*{minOrderValue}"
                   min="0"/>
            <div class="field-error"
                 th:if="${#fields.hasErrors('minOrderValue')}"
                 th:errors="*{minOrderValue}">
            </div>
        </div>

        <div class="form-group">
            <label>Point Cost</label>
            <input type="number"
                   th:field="*{pointCost}"
                   min="0"/>
            <div class="field-error"
                 th:if="${#fields.hasErrors('pointCost')}"
                 th:errors="*{pointCost}">
            </div>
        </div>
        <div class="form-group">
            <label>Quantity</label>
            <input type="number"
                   th:field="*{quantity}"
                   min="0"/>
            <div class="field-error"
                 th:if="${#fields.hasErrors('quantity')}"
                 th:errors="*{quantity}">
            </div>
        </div>
        <div class="checkbox-group">
            <label>Allow exchange by points?</label>
            <input type="checkbox" th:field="*{exchangeable}"/>
        </div>
        <div class="form-group">
            <label>Start At:</label>
            <input type="datetime-local" th:field="*{startAt}"/>
<!--                   th:attr="min=${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd''T''HH:mm')}"/>-->
            <div class="field-error"
                 th:if="${#fields.hasErrors('startAt')}"
                 th:errors="*{startAt}">
            </div>
        </div>

        <div class="form-group">
            <label>End At:</label>
            <input type="datetime-local" th:field="*{endAt}"
                   th:attr="min=${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd''T''HH:mm')}"/>
            <div class="field-error"
                 th:if="${#fields.hasErrors('endAt')}"
                 th:errors="*{endAt}">
            </div>
        </div>


        <div class="form-actions">
            <button type="submit">Create</button>
            <a class="btn-cancel" th:href="@{/staff/voucher/list}">Cancel</a>
        </div>
    </form>
</div>
<script th:src="@{/js/voucher.js}"></script>
</body>
</html>
