<div class="sidebar-sticky sidebar" xmlns:th="http://www.thymeleaf.org">
    <div class="sidebar-header d-flex align-items-center mb-3">
        <i class="fas fa-drumstick-bite me-2"></i>
        <span>Golden Admin</span>
    </div>
    <hr class="mx-3 border-secondary opacity-25">
    <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item">
            <a th:href="@{/}" class="nav-link">
                <i class="fas fa-home"></i>
                Trang chủ
            </a>
        </li>
        <li>
            <a th:href="@{/staff/dashboard}" class="nav-link">
                <i class="fas fa-chart-line"></i>
                Dashboard
            </a>
        </li>
        <li>
            <a th:href="@{/staff/product}" class="nav-link">
                <i class="fas fa-hamburger"></i>
                Sản phẩm
            </a>
        </li>
        <li>
            <a th:href="@{/staff/category}" class="nav-link">
                <i class="fas fa-list"></i>
                Thể loại
            </a>
        </li>
        <li>
            <a th:href="@{/staff/combo}" class="nav-link">
                <i class="fas fa-layer-group"></i>
                Combo
            </a>
        </li>
        <li>
            <a th:href="@{/staff/voucher/list}" class="nav-link">
                <i class="fas fa-ticket-alt"></i>
                Vouchers
            </a>
        </li>
        <li>
            <a th:href="@{/staff/badword}" class="nav-link">
                <i class='fas fa-pen-alt'></i> Từ Vi Phạm
            </a>
        </li>
        <li>
            <a th:href="@{/staff/review}" class="nav-link">
                <i class='fas fa-star'></i> Đánh giá
            </a>
        </li>
        <li>
            <a th:href="@{/staff/shippingFee}" class="nav-link">
                <i class='fas fa-star'></i> Phí ship phường/xã
            </a>
        </li>
        <li th:if="${session.roleName == 'ADMIN'}">
            <a th:href="@{/admin/user}" class="nav-link">
                <i class='fas fa-star'></i> Quản lý tài khoản (ADMIN)
            </a>
        </li>
        <li th:if="${session.roleName == 'ADMIN'}">
            <a th:href="@{/staff/shipper/dashboard}" class="nav-link">
                <i class='fas fa-star'></i> Shipper nhận đơn (ADMIN)
            </a>
        </li>
        <li th:if="${session.roleName == 'ADMIN'}">
            <a th:href="@{/staff/order}" class="nav-link">
                <i class='fas fa-star'></i> Quản lý đơn hàng (ADMIN)
            </a>
        </li>
    </ul>
    <div class="sidebar-footer mt-auto p-3 text-muted small border-top border-secondary border-opacity-10">
        <div class="d-flex align-items-center">
            <div class="avatar-circle me-2 bg-warning text-dark text-center"
                style="width: 32px; height: 32px; line-height: 32px; border-radius: 50%; font-weight: 700;"
                th:text="${#strings.substring(session.fullName ?: 'S', 0, 1)}">S</div>
            <div>
                <div class="text-white fw-bold mb-0" style="font-size: 0.8rem;" th:text="${session.fullName}">Staff Name
                </div>
                <div class="text-muted" style="font-size: 0.7rem;">Staff Member</div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const currentUrl = window.location.pathname;
        const navLinks = document.querySelectorAll('.nav-link');

        let bestMatch = null;
        let maxLen = -1;

        navLinks.forEach(link => {
            const linkHref = link.getAttribute('href');
            if (currentUrl === linkHref) {
                bestMatch = link;
                maxLen = linkHref.length;
            } else if (linkHref !== '/' && currentUrl.startsWith(linkHref)) {
                if (linkHref.length > maxLen) {
                    bestMatch = link;
                    maxLen = linkHref.length;
                }
            }
        });

        if (bestMatch) {
            bestMatch.classList.add('active');
        }
    });
</script>
