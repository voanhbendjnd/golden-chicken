<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Đổi điểm lấy Voucher</title>
  <link th:href="@{/css/style.djnd.css}" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <link th:href="@{/css/profileTest.css}" rel="stylesheet">
  <link th:href="@{/css/voucher-redeem.css}" rel="stylesheet">
  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">

  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
  <link th:href="@{/css/style.djnd.css}" rel="stylesheet">
</head>

<body>
  <div th:replace="~{client/layout/header.djnd}"></div>
  <div class="page" style="padding-top: 200px;">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="main">
      <h1 class="title">REDEEM POINTS</h1>
      <div class="voucher-container">
        <div th:replace="~{fragments/voucher-header :: voucher-header}"></div>

        <section th:if="${showMyVouchers == null}">
          <div class="section-head">
            <h2>Danh sách voucher đổi điểm</h2>
          </div>

          <div th:if="${redeemError}" class="alert alert-danger" style="margin-bottom: 12px;" th:text="${redeemError}"></div>
          <div th:if="${redeemSuccess}" class="alert alert-success" style="margin-bottom: 12px;" th:text="${redeemSuccess}"></div>

          <div class="list" th:if="${#lists.isEmpty(vouchers)}">
            <div class="voucher">
              <div class="v-left">
                <div class="v-title">Chưa có voucher khả dụng</div>
              </div>
            </div>
          </div>

          <div class="list" th:unless="${#lists.isEmpty(vouchers)}">
            <div class="voucher" th:each="v : ${vouchers}">
              <div class="v-left">
                <div class="v-title" th:text="${v.name}">Voucher</div>
                <div class="v-sub" th:text="${v.description}">Mô tả</div>
              </div>
              <div class="v-right">
                <span class="tag" th:text="${v.pointCost} + ' điểm'">1000 điểm</span>
                <form th:action="@{/vouchers/redeem/confirm}" method="post" style="display: inline-block;">
                  <input type="hidden" name="voucherId" th:value="${v.id}" />
                  <button type="submit" class="btn btn-primary"
                          th:classappend="${points lt v.pointCost} ? 'disabled' : ''"
                          th:text="${points >= v.pointCost ? 'Đổi' : 'Không đủ điểm'}">
                    Đổi
                  </button>
                </form>
              </div>
            </div>
          </div>
        </section>


      </div>
    </main>
  </div>
  <div th:replace="~{client/layout/footer.djnd}"></div>
</body>

</html>
