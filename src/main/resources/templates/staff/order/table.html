<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Quản lý đơn hàng vận hành</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link th:href="@{/css/staff-order.css}" rel="stylesheet">

    <head th:replace="~{common/head}"></head>

    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Cấu hình theme màu #ffb524 */
        .theme-bg {
            background-color: #ffb524 !important;
        }

        .theme-text {
            color: #e59a1f !important;
            /* Dùng tone tối hơn một chút cho chữ để dễ nhìn trên nền trắng */
        }

        .theme-btn {
            background-color: #ffb524;
            border-color: #ffb524;
            color: #000 !important;
            /* Chữ đen trên nền vàng */
            font-weight: 500;
        }

        .theme-btn:hover,
        .theme-btn:focus {
            background-color: #e5a320;
            border-color: #e5a320;
            color: #000 !important;
        }

        .card {
            border: none;
            border-radius: 1rem;
        }

        .table> :not(caption)>*>* {
            padding: 1rem 1rem;
            border-bottom-color: #f1f3f5;
        }

        .table thead th {
            font-weight: 600;
            color: #495057;
            background-color: #f8f9fa;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .status-select {
            border-radius: 20px;
            padding-left: 15px;
            box-shadow: none !important;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .btn-custom-search {
            border-radius: 0.5rem;
            padding: 0.5rem 1.2rem;
        }

        .badge {
            padding: 0.5em 0.8em;
            border-radius: 30px;
            font-weight: 500;
        }

        /* Custom scrollbar for table responsive */
        .table-responsive::-webkit-scrollbar {
            height: 8px;
        }

        .table-responsive::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        /* Tùy chỉnh Dropdown Đăng xuất */
        .logout-btn:hover {
            background-color: #fff3cd;
            color: #d63384;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg shadow-sm mb-4 theme-bg">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold text-dark me-4" href="#">
                <i class="bi bi-box-seam me-2"></i> Hệ Thống Vận Hành Đơn Hàng
            </a>

            <div class="navbar-nav me-auto flex-row">
                <a class="nav-link text-dark fw-medium px-2" href="/">
                    <i class="bi bi-house-door-fill me-1"></i>Trang chủ
                </a>
                <div th:if="${session.roleName == 'ADMIN'}"></div>
                <a class="nav-link text-dark fw-medium px-2" href="/admin/user">
                    Quản lý tài khoản (ADMIN)
                </a>
                <a class="nav-link text-dark fw-medium px-2" href="/staff/dashboard">
                    Staff (ADMIN)
                </a>
            </div>

            <div class="d-flex align-items-center dropdown">
                <a class="nav-link dropdown-toggle text-dark fw-medium d-flex align-items-center" href="#" role="button"
                    data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-person-circle fs-4 me-2"></i>
                    <span>Cài đặt</span>
                </a>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                    <li>
                        <form th:action="@{/logout}" method="post" class="m-0">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="dropdown-item logout-btn fw-medium text-danger"
                                sec:authorize="isAuthenticated()">
                                <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 pb-5">
        <div class="row justify-content-center">
            <div class="col-12 col-xxl-11">
                <div class="card shadow-sm">
                    <div
                        class="card-header bg-white py-4 px-4 border-bottom-0 d-flex justify-content-between align-items-center rounded-top-4">
                        <h4 class="mb-0 theme-text fw-bold">
                            <i class="bi bi-list-check me-2"></i>Danh sách đơn hàng
                        </h4>
                    </div>

                    <div class="card-body px-4 pt-0">
                        <div class="p-3 bg-light rounded-3 mb-4">
                            <div class="row g-2 align-items-center">
                                <div class="col-md-8 col-lg-6">
                                    <div class="input-group shadow-sm rounded-3">
                                        <span class="input-group-text bg-white border-end-0 text-muted">
                                            <i class="bi bi-funnel"></i>
                                        </span>
                                        <select id="filterStatus"
                                            class="form-select border-start-0 focus-ring focus-ring-light"
                                            style="max-width: 220px;" onchange="handleSearch()">
                                            <option value="">-- Tất cả trạng thái --</option>
                                            <option value="PENDING"
                                                th:selected="${param.filter != null && #strings.contains(param.filter, 'status : ''PENDING''')}">
                                                Pending (Chờ xác nhận)
                                            </option>
                                            <option value="PREPARING"
                                                th:selected="${param.filter != null && #strings.contains(param.filter, 'status : ''PREPARING''')}">
                                                Preparing (Đang chuẩn bị)
                                            </option>
                                            <option value="COMPLETED"
                                                th:selected="${param.filter != null && #strings.contains(param.filter, 'status : ''COMPLETED''')}">
                                                Completed (Đã nhận hàng)
                                            </option>
                                            <option value="READY_FOR_DELIVERY"
                                                th:selected="${param.filter != null && #strings.contains(param.filter, 'status : ''READY_FOR_DELIVERY''')}">
                                                Ready (Sẵn sàng giao)
                                            </option>
                                            <option value="DELIVERING"
                                                th:selected="${param.filter != null && #strings.contains(param.filter, 'status : ''DELIVERING''')}">
                                                Delivering (Đang giao)
                                            </option>
                                            <option value="SHIPPER_ISSUE"
                                                th:selected="${param.filter != null && #strings.contains(param.filter, 'status : ''SHIPPER_ISSUE''')}">
                                                Shipper Issue (Sự cố)
                                            </option>
                                            <option value="REASSIGNING_SHIPPER"
                                                th:selected="${param.filter != null && #strings.contains(param.filter, 'status : ''REASSIGNING_SHIPPER''')}">
                                                Reassigning (Đang đổi shipper)
                                            </option>
                                            <option value="DELIVERY_FAILED"
                                                th:selected="${param.filter != null && #strings.contains(param.filter, 'status : ''DELIVERY_FAILED''')}">
                                                Delivery Failed (Giao hụt)
                                            </option>
                                            <option value="DELIVERED"
                                                th:selected="${param.filter != null && #strings.contains(param.filter, 'status : ''DELIVERED''')}">
                                                Delivered (Thành công)
                                            </option>
                                            <option value="CANCELLED"
                                                th:selected="${param.filter != null && #strings.contains(param.filter, 'status : ''CANCELLED''')}">
                                                Cancelled (Đã hủy)
                                            </option>
                                        </select>
                                        <input type="text" id="searchName" class="form-control"
                                            placeholder="Nhập số điện thoại cần tìm..." th:value="${searchName}">
                                        <button class="btn theme-btn" type="button" onclick="handleSearch()">
                                            <i class="bi bi-search me-1"></i> Tìm
                                        </button>
                                    </div>
                                </div>
                                <div class="col-md-4 col-lg-6 text-md-end mt-3 mt-md-0">
                                    <a href="/staff/order" class="btn btn-outline-secondary btn-custom-search">
                                        <i class="bi bi-arrow-clockwise me-1"></i>Làm mới
                                    </a>
                                </div>
                            </div>
                        </div>

                        <div th:if="${orders != null and !orders.isEmpty()}" class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th style="width: 80px;">Mã ĐH</th>
                                        <th>Khách hàng</th>
                                        <th>Tổng tiền</th>
                                        <th>Thanh toán</th>
                                        <th>Ngày tạo</th>
                                        <th style="width: 250px;" class="text-center">Trạng thái vận hành</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="order : ${orders}">
                                        <td>
                                            <a th:href="@{/staff/order/{id}(id=${order.id})}"
                                                th:text="'#' + ${order.id}"
                                                class="fw-bold text-decoration-none theme-text"></a>
                                        </td>
                                        <td>
                                            <div class="fw-semibold text-dark" th:text="${order.name}"></div>
                                            <div class="text-muted small d-flex align-items-center mt-1">
                                                <i class="bi bi-telephone-fill me-1" style="font-size: 0.75rem;"></i>
                                                <span th:text="${order.phone}"></span>
                                            </div>
                                        </td>
                                        <td class="fw-bold text-danger"
                                            th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT') + ' đ'}">
                                        </td>
                                        <td>
                                            <span class="badge"
                                                th:classappend="${order.paymentStatus == 'PAID' ? 'bg-success' : (order.paymentStatus == 'REFUNDED' ? 'bg-secondary' : 'bg-warning text-dark')}"
                                                th:text="${order.paymentStatus}"></span>
                                        </td>
                                        <td>
                                            <div class="text-secondary small">
                                                <i class="bi bi-calendar3 me-1"></i>
                                                <span
                                                    th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                                            </div>
                                        </td>
                                        <td>
                                            <select class="form-select form-select-sm status-select fw-bold mx-auto"
                                                th:onchange="'updateStatus(this, ' + ${order.id} + ')'" th:disabled="${order.status.name() == 'DELIVERED' or
                                                order.status.name() == 'COMPLETED' or
                                                order.status.name() == 'CANCELLED' or
                                                order.status.name()== 'READY_FOR_DELIVERY' or
                                                order.status.name() == 'DELIVERING' or
                                                order.status.name() == 'SHIPPER_ISSUE' or
                                                order.status.name() == 'REASSIGNING_SHIPPER' or
                                                order.status.name() == 'DELIVERY_FAILED'}" th:style="${'background-color: ' +
                                                        (order.status.name() == 'PENDING' ? '#fff3cd' :
                                                         order.status.name() == 'DELIVERING' ? '#cff4fc' :
                                                         order.status.name() == 'DELIVERED' ? '#d1e7dd' :
                                                         order.status.name() == 'CANCELLED' ? '#f8d7da' :
                                                         order.status.name() == 'COMPLETED' ? '#d1e7dd' :
                                                         (order.status.name() == 'SHIPPER_ISSUE' or order.status.name() == 'DELIVERY_FAILED') ? '#ffe5d0' : '#e2e3e5') +
                                                        '; color: #333;'}">

                                                <option th:value="${order.status.name()}"
                                                    th:text="${order.status.name()}" selected></option>

                                                <th:block th:if="${order.status.name() == 'PENDING'}">
                                                    <option value="PREPARING">PREPARING (Chuẩn bị hàng)</option>
                                                    <option value="CANCELLED">CANCELLED (Hủy đơn)</option>
                                                    <option value="COMPLETED">COMPLETED (Đã nhận đơn)</option>
                                                </th:block>

                                                <th:block th:if="${order.status.name() == 'PREPARING'}">
                                                    <option value="READY_FOR_DELIVERY">READY FOR DELIVERY (Sẵn sàng)
                                                    </option>
                                                </th:block>

                                                <th:block th:if="${order.status.name() == 'DELIVERING'}">
                                                    <option value="DELIVERED">DELIVERED (Thành công)</option>
                                                    <option value="DELIVERY_FAILED">DELIVERY FAILED (Khách không nghe
                                                        máy)
                                                    </option>
                                                    <option value="SHIPPER_ISSUE">SHIPPER ISSUE (Shipper gặp sự cố)
                                                    </option>
                                                </th:block>

                                                <th:block th:if="${order.status.name() == 'SHIPPER_ISSUE'}">
                                                    <option value="REASSIGNING_SHIPPER">REASSIGNING (Đổi shipper khác)
                                                    </option>
                                                </th:block>

                                                <th:block th:if="${order.status.name() == 'REASSIGNING_SHIPPER'}">
                                                    <option value="DELIVERING">DELIVERING (Tiếp tục giao)</option>
                                                </th:block>

                                                <th:block th:if="${order.status.name() == 'DELIVERY_FAILED'}">
                                                    <option value="DELIVERING">DELIVERING (Thử giao lại lần 2)</option>
                                                    <option value="CANCELLED">CANCELLED (Hủy đơn)</option>
                                                </th:block>
                                            </select>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>

                            <div class="d-flex justify-content-center mt-4">
                                <nav aria-label="Page navigation">
                                    <ul class="pagination pagination-sm shadow-sm">
                                        <li th:class="|page-item ${meta.page == 1 ? 'disabled' : ''}|">
                                            <a class="page-link shadow-none text-dark"
                                                th:href="@{/staff/order(page=${meta.page - 1}, size=${meta.pageSize}, filter=${param.filter})}">Trước</a>
                                        </li>
                                        <li th:each="p : ${#numbers.sequence(1, meta.pages)}"
                                            th:class="|page-item ${meta.page == p ? 'active' : ''}|">
                                            <a class="page-link shadow-none text-dark"
                                                th:style="${meta.page == p ? 'background-color: #ffb524; border-color: #ffb524; font-weight: bold;' : ''}"
                                                th:href="@{/staff/order(page=${p}, size=${meta.pageSize}, filter=${param.filter})}"
                                                th:text="${p}"></a>
                                        </li>
                                        <li th:class="|page-item ${meta.page == meta.pages ? 'disabled' : ''}|">
                                            <a class="page-link shadow-none text-dark"
                                                th:href="@{/staff/order(page=${meta.page + 1}, size=${meta.pageSize}, filter=${param.filter})}">Sau</a>
                                        </li>
                                    </ul>
                                </nav>
                            </div>
                        </div>

                        <form id="updateStatusForm" th:action="@{/staff/order/update-status}" method="POST"
                            style="display: none;">
                            <input type="hidden" name="orderId" id="submitOrderId">
                            <input type="hidden" name="status" id="submitStatus">
                        </form>

                        <div th:if="${orders == null or orders.isEmpty()}" class="text-center py-5">
                            <div class="mb-3">
                                <i class="bi bi-inbox text-muted" style="font-size: 4rem; opacity: 0.5;"></i>
                            </div>
                            <h5 class="text-secondary fw-bold">Trống!</h5>
                            <p class="text-muted">Không tìm thấy đơn hàng nào khớp với yêu cầu tìm kiếm của bạn.</p>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function updateStatus(selectElement, orderId) {
            const newStatus = selectElement.value;
            const statusText = selectElement.options[selectElement.selectedIndex].text;

            Swal.fire({
                title: 'Xác nhận cập nhật?',
                text: `Bạn muốn chuyển đơn hàng #${orderId} sang trạng thái: ${statusText}?`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ffb524', // Cập nhật màu nút đồng ý theo theme
                cancelButtonColor: '#6c757d',
                confirmButtonText: '<span style="color: #000; font-weight: 500;">Đồng ý</span>', // Chữ màu đen trên nền vàng
                cancelButtonText: 'Hủy',
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    document.getElementById('submitOrderId').value = orderId;
                    document.getElementById('submitStatus').value = newStatus;
                    document.getElementById('updateStatusForm').submit();
                } else {
                    location.reload();
                }
            });
        }

        function handleSearch() {
            const name = document.getElementById("searchName").value.trim();
            const status = document.getElementById("filterStatus").value;
            const urlParams = new URLSearchParams(window.location.search);

            let filterConditions = [];

            if (name !== "") {
                filterConditions.push(`phone ~~ '${name}'`);
            }

            if (status !== "" && status !== "ALL") {
                filterConditions.push(`status : '${status}'`);
            }

            if (filterConditions.length > 0) {
                urlParams.set('filter', filterConditions.join(' and '));
            } else {
                urlParams.delete('filter');
            }

            urlParams.set('page', '1');
            window.location.href = window.location.pathname + "?" + urlParams.toString();
        }

        document.getElementById("searchName").addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                handleSearch();
            }
        });
    </script>
</body>

</html>
