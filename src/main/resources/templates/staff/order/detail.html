<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Staff - Chi tiết đơn hàng #[[${order.id}]]</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <head th:replace="~{common/head}"></head>
    <style>
        .order-info-header { background-color: #f8f9fa; padding: 20px; border-radius: 8px; border-left: 5px solid #0d6efd; }
        .product-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #eee; }
        .card { border: none; box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); border-radius: 12px; }
        .status-section { background: #fdfdfd; padding: 15px; border-radius: 10px; border: 1px solid #edf2f7; }
        .info-label { font-size: 0.8rem; font-weight: 600; color: #718096; text-transform: uppercase; }
    </style>
</head>

<body>
<div th:replace="~{component/header}"></div>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 col-lg-2 p-0">
            <div th:replace="~{staff/layout/sidebar}"></div>
        </div>

        <main class="col-md-9 col-lg-10 ms-sm-auto px-md-4 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">Order Details <span class="text-primary" th:text="'#' + ${order.id}"></span></h2>
                <a href="/staff/order" class="btn btn-outline-secondary btn-sm rounded-pill">
                    <i class="fa-solid fa-chevron-left me-1"></i> Back to List
                </a>
            </div>

            <div class="row">
                <div class="col-lg-8">
                    <div class="card mb-4 shadow-sm">
                        <div class="card-header bg-white fw-bold py-3">Items Purchased</div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">Product</th>
                                        <th>Price</th>
                                        <th>Quantity</th>
                                        <th class="text-end pe-4">Total</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="item : ${order.items}">
                                        <td class="ps-4">
                                            <div class="d-flex align-items-center">
                                                <img th:src="@{'/images/products/' + ${item.img}}" class="product-img me-3">
                                                <div>
                                                    <div class="fw-bold" th:text="${item.name}"></div>
                                                    <small class="text-muted" th:text="'ID: ' + ${item.productId}"></small>
                                                </div>
                                            </div>
                                        </td>
                                        <td th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                                        <td th:text="'x' + ${item.quantity}"></td>
                                        <td class="text-end pe-4 fw-bold text-primary"
                                            th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT') + ' ₫'}">
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div class="card-footer bg-white text-end py-3 pe-4">
                            <h5 class="mb-0">Grand Total: <span class="text-danger fw-bold"
                                                                th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span>
                            </h5>
                        </div>
                    </div>

                    <div class="card mb-4 shadow-sm">
                        <div class="card-header bg-white fw-bold py-3">Shipping & Notes</div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="info-label d-block">Recipient Name</label>
                                    <span class="fw-bold" th:text="${order.name}"></span>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="info-label d-block">Phone Number</label>
                                    <span class="fw-bold" th:text="${order.phone}"></span>
                                </div>
                                <div class="col-12 mb-3">
                                    <label class="info-label d-block">Shipping Address</label>
                                    <span th:text="${order.address}"></span>
                                </div>
                                <div class="col-12">
                                    <label class="info-label d-block">Customer Note</label>
                                    <p class="fst-italic text-secondary" th:text="${#strings.isEmpty(order.note) ? 'No note.' : order.note}"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="card mb-4 shadow-sm border-top border-primary border-4">
                        <div class="card-body">
                            <label class="fw-bold mb-3 d-block text-uppercase small">Order Management</label>

                            <div class="status-section">
                                <label class="small text-muted mb-2">Current Status Step:</label>
                                <select class="form-select fw-bold mb-3" id="orderStatusSelect"
                                        th:onchange="'updateStatus(this, ' + ${order.id} + ')'"
                                        th:disabled="${order.status.name() == 'DELIVERED' or order.status.name() == 'CANCELLED'}">

                                    <option th:value="${order.status.name()}" th:text="${order.status.name()}" selected></option>

                                    <th:block th:if="${order.status.name() == 'PENDING'}">
                                        <option value="PREPARING">PREPARING</option>
                                        <option value="CANCELLED">CANCELLED</option>
                                    </th:block>

                                    <th:block th:if="${order.status.name() == 'PREPARING'}">
                                        <option value="READY_FOR_DELIVERY">READY FOR DELIVERY</option>
                                    </th:block>

                                    <th:block th:if="${order.status.name() == 'READY_FOR_DELIVERY'}">
                                        <option value="DELIVERING">DELIVERING</option>
                                    </th:block>

                                    <th:block th:if="${order.status.name() == 'DELIVERING'}">
                                        <option value="DELIVERED">DELIVERED</option>
                                        <option value="SHIPPER_ISSUE">SHIPPER ISSUE</option>
                                        <option value="DELIVERY_FAILED">DELIVERY FAILED</option>
                                    </th:block>

                                    <th:block th:if="${order.status.name() == 'SHIPPER_ISSUE'}">
                                        <option value="REASSIGNING_SHIPPER">REASSIGNING SHIPPER</option>
                                    </th:block>

                                    <th:block th:if="${order.status.name() == 'REASSIGNING_SHIPPER'}">
                                        <option value="DELIVERING">DELIVERING (Retry)</option>
                                    </th:block>

                                    <th:block th:if="${order.status.name() == 'DELIVERY_FAILED'}">
                                        <option value="DELIVERING">DELIVERING (Retry 2)</option>
                                        <option value="CANCELLED">CANCELLED</option>
                                    </th:block>
                                </select>
                            </div>

                            <hr class="my-4 opacity-25">
                            <div class="small text-muted mb-2">
                                Created At: <span class="float-end text-dark fw-medium" th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                            </div>
                            <div class="small text-muted">
                                Last Update: <span class="float-end text-dark fw-medium" th:text="${#temporals.format(order.updatedAt, 'dd/MM/yyyy HH:mm')}"></span>
                            </div>
                        </div>
                    </div>

                    <div class="card shadow-sm">
                        <div class="card-header bg-white fw-bold py-3">Payment Details</div>
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <span class="text-muted small">Method:</span>
                                <span class="badge bg-light text-dark border fw-bold" th:text="${order.paymentMethod}"></span>
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="text-muted small">Status:</span>
                                <span th:classappend="${order.paymentStatus == 'PAID' ? 'text-success' : 'text-danger'}"
                                      class="fw-bold" th:text="${order.paymentStatus}"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<form id="statusUpdateForm" th:action="@{/staff/order/update-status}" method="POST" style="display: none;">
    <input type="hidden" name="orderId" id="formOrderId">
    <input type="hidden" name="status" id="formStatus">
</form>

<script>
    function updateStatus(selectElement, orderId) {
        const newStatus = selectElement.value;
        Swal.fire({
            title: 'Confirm Update?',
            text: `Change order #${orderId} status to ${newStatus}?`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#0d6efd',
            confirmButtonText: 'Confirm',
            cancelButtonText: 'Cancel'
        }).then((result) => {
            if (result.isConfirmed) {
                // Sử dụng form submit để đồng bộ với backend
                document.getElementById('formOrderId').value = orderId;
                document.getElementById('formStatus').value = newStatus;
                document.getElementById('statusUpdateForm').submit();
            } else {
                location.reload(); // Reset lại nếu nhấn Hủy
            }
        });
    }
</script>
</body>
</html>
