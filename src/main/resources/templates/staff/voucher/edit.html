<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Update Voucher</title>
    <link rel="stylesheet" href="/css/voucher.css">
</head>

<body>

    <div class="voucher-container">
        <h2 class="page-title">Cập nhật</h2>

        <!--    <div th:if="${error}" class="form-error">-->
        <!--        <p th:text="${error}"></p>-->
        <!--    </div>-->
        <div th:if="${isUsed}" class="info-box" style="background:#e3f2fd; color:#1976d2; padding:12px 16px; border-radius:8px; margin-bottom:15px; border-left: 5px solid #1976d2;">
            Voucher này đã được khách hàng nhận hoặc sử dụng. Bạn chỉ có thể cập nhật <b>Trạng thái</b>.
        </div>
        <div th:if="${errorMessage}" class="error-box" th:text="${errorMessage}">
        </div>
        <form class="voucher-form" th:action="@{/staff/voucher/edit/{id}(id=${voucher.id})}" th:object="${voucher}"
            method="post">


            <div class="form-group">
                <label>Code <span style="color: red"> *</span></label>
                <input type="text" id="code" th:field="*{code}" th:readonly="${isUsed}" required />
                <div class="field-error" th:if="${#fields.hasErrors('code')}" th:errors="*{code}">
                </div>
            </div>

            <div class="form-group">
                <label>Tên<span style="color: red"> *</span></label>
                <input type="text" id="name" th:field="*{name}" th:readonly="${isUsed}" required />
                <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">
                </div>
            </div>

            <div class="form-group full">
                <label>Mô tả<span style="color: red"> *</span></label>
                <input type="text" id="description" th:field="*{description}" th:readonly="${isUsed}" required />

                <div class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">
                </div>
            </div>
            <div class="form-group">
                <label>Loại giảm<span style="color: red"> *</span></label>
                <select th:field="*{discountType}" th:disabled="${isUsed}" required>
                    <option value="">-- Chọn --</option>
                    <option value="PERCENT">PERCENT</option>
                    <option value="FIXED">FIXED</option>
                </select>
                <input type="hidden" th:if="${isUsed}" th:field="*{discountType}" />
                <div class="field-error" th:if="${#fields.hasErrors('discountType')}" th:errors="*{discountType}">
                </div>
            </div>

            <div class="form-group">
                <label>Giá trị giảm<span style="color: red"> *</span></label>

                <div style="display:flex; align-items:center; gap:8px;">
                    <input type="number" id="discountValue" th:field="*{discountValue}" min="0" th:readonly="${isUsed}" required />
                    <span id="discountUnit">%</span>
                </div>

                <small id="discountHint" style="color:#777">
                    Nhập % (0 — 100)
                </small>

                <div class="field-error" th:if="${#fields.hasErrors('discountValue')}" th:errors="*{discountValue}">
                </div>
            </div>

            <div class="form-group">
                <label>Đơn tối thiểu<span style="color: red"> *</span></label>
                <input type="number" step="0.01" th:field="*{minOrderValue}" min="0" th:readonly="${isUsed}" required />
                <div class="field-error" th:if="${#fields.hasErrors('minOrderValue')}" th:errors="*{minOrderValue}">
                </div>
            </div>

            <div class="form-group exchange-field" th:style="${voucher.exchangeable == null or !voucher.exchangeable} ? 'display: none' : ''">
                <label>Điểm đổi<span style="color: red"> *</span></label>
                <input type="number" id="pointCost" th:field="*{pointCost}" min="0" required />
                <div class="field-error" th:if="${#fields.hasErrors('pointCost')}" th:errors="*{pointCost}">
                </div>
            </div>

            <div class="checkbox-group" th:style="${voucher.exchangeable == null or !voucher.exchangeable} ? 'display: none' : ''">
                <label>Cho phép dùng điểm đổi<span style="color: red"> *</span></label>
                <input type="checkbox" id="exchangeable" th:field="*{exchangeable}" th:disabled="${isUsed}" />
                <input type="hidden" th:if="${isUsed}" th:field="*{exchangeable}" />
            </div>

            <div class="form-group">
                <label>Ngày bắt đầu<span style="color: red"> *</span></label>
                <input type="datetime-local" id="startAt" name="startAt"
                    th:value="${#temporals.format(voucher.startAt, 'yyyy-MM-dd''T''HH:mm')}" th:readonly="${isUsed}" required />
                <!--                   th:attr="min=${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd''T''HH:mm')}"/>-->
                <div class="field-error" th:if="${#fields.hasErrors('startAt')}" th:errors="*{startAt}">
                </div>
            </div>

            <div class="form-group">
                <label>Ngày kết thúc<span style="color: red"> *</span></label>
                <input type="datetime-local" id="endAt" name="endAt"
                    th:value="${#temporals.format(voucher.endAt, 'yyyy-MM-dd''T''HH:mm')}"
                    th:attr="min=${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd''T''HH:mm')}" th:readonly="${isUsed}" required />
                <div class="field-error" th:if="${#fields.hasErrors('endAt')}" th:errors="*{endAt}">
                </div>
            </div>

            <div class="form-group exchange-field" th:style="${voucher.exchangeable == null or !voucher.exchangeable} ? 'display: none' : ''">
                <label>Số lượng<span style="color: red"> *</span></label>
                <input type="number" id="quantity" th:field="*{quantity}" min="0" th:readonly="${isUsed}" required />
                <div class="field-error" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}">
                </div>
            </div>

            <div class="form-group">
                <label>Loại voucher áp dụng cho<span style="color: red"> *</span></label>
                <select th:field="*{voucherType}" th:disabled="${isUsed}" required>
                    <option value="">-- Chọn --</option>
                    <option value="PRODUCT">PRODUCT</option>
                    <option value="SHIPPING">SHIPPING</option>
                </select>
                <input type="hidden" th:if="${isUsed}" th:field="*{voucherType}" />
                <div class="field-error" th:if="${#fields.hasErrors('voucherType')}" th:errors="*{voucherType}">
                </div>
            </div>
            <div class="form-group">
                <label>Trạng thái<span style="color: red"> *</span></label>
                <select th:field="*{status}" required>
                    <option value="ACTIVE">ACTIVE</option>
                    <option value="DISABLED">DISABLED</option>
                    <option value="EXPIRED">EXPIRED</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Cập nhật</button>
                <a th:href="@{/staff/voucher/list}" class="btn-secondary">Dừng</a>
            </div>

        </form>
    </div>
    <script th:src="@{/js/voucher.js}"></script>
</body>

</html>
