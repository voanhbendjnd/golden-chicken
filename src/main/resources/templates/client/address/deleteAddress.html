<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Xác nhận xóa địa chỉ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">


    <link th:href="@{/css/profileTest.css}" rel="stylesheet">
    <link th:href="@{/css/address.css}" rel="stylesheet">
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link th:href="@{/css/style.djnd.css}" rel="stylesheet">
</head>

<body>
    <div th:replace="~{client/layout/header.djnd}"></div>

    <div class="page" style="padding: 200px;">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <main class="addr-main">
            <h1 class="addr-title">Xác nhận xóa địa chỉ</h1>

            <section class="addr-card">
                <div class="addr-card__head">XÓA ĐỊA CHỈ</div>
                <div class="addr-card__body">
                    <p>Bạn có chắc chắn muốn xóa địa chỉ này không?</p>

                    <div class="mb-3">
                        <p><strong>Người nhận:</strong> <span th:text="${address.recipientName}"></span></p>
                        <p><strong>SĐT:</strong> <span th:text="${address.recipientPhone}"></span></p>
                        <p><strong>Địa chỉ:</strong> <span
                                th:text="|${address.specificAddress}, ${address.ward}, ${address.city}|"></span></p>
                    </div>

                    <div class="d-flex gap-2">
                        <th:block th:if="${productId != null or (productIds != null && productIds != '')}">
                            <a th:href="@{/checkout/addresses(productId=${productId}, productIds=${productIds}, productVoucherId=${productVoucherId}, shippingVoucherId=${shippingVoucherId})}"
                                class="btn btn-secondary">Hủy</a>
                        </th:block>
                        <th:block th:unless="${productId != null or (productIds != null && productIds != '')}">
                            <a th:href="@{/addresses}" class="btn btn-secondary">Hủy</a>
                        </th:block>

                        <form th:action="@{/addresses/{id}/delete(id=${address.id})}" method="post" class="m-0">
                            <input type="hidden" name="productId" th:value="${productId}" />
                            <input type="hidden" name="productIds" th:value="${productIds}" />
                            <input type="hidden" name="productVoucherId" th:value="${productVoucherId}" />
                            <input type="hidden" name="shippingVoucherId" th:value="${shippingVoucherId}" />
                            <button type="submit" class="btn btn-danger">Xác nhận xóa</button>
                        </form>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div th:replace="~{client/layout/footer.djnd}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
