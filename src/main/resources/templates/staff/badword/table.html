<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta name="_csrf" th:content="${_csrf.token}" />

    <head th:replace="~{common/head}"></head>
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <title>Bad Word Management - Golden Chicken</title>
</head>

<body>
    <div th:replace="~{component/header}"></div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 p-0 sidebar-bg">
                <div th:replace="~{staff/layout/sidebar}"></div>
            </div>
            <main class="col-md-9 col-lg-10 ms-sm-auto px-md-4 py-4">
                <div
                    class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="fas fa-tags me-2 text-theme"></i>Quản lý từ vi phạm</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <a th:href="@{/staff/badword/create}" class="btn btn-theme shadow-sm">
                            <i class="fas fa-plus me-1"></i> Tạo mới từ
                        </a>
                    </div>
                </div>

                <div class="premium-card shadow-sm">
                    <div class="card-header">
                        <div class="row align-items-center">
                            <div class="col">
                                <h5 class="mb-0">Danh sách</h5>
                            </div>
                            <div class="col-auto">
                                <div class="input-group input-group-sm" style="width: 250px;">
                                    <input type="text" id="searchName" class="form-control"
                                        placeholder="Tìm kiếm theo từ..." th:value="${searchName}">
                                    <button class="btn btn-theme" type="button" onclick="handleSearch()">
                                        <i class="fas fa-search"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div th:if="${errorMessage != null}" class="alert alert-danger shadow-sm border-0 mb-4" role="alert"
                        th:text="${errorMessage}"></div>
                    <div th:if="${msg != null}" class="alert alert-success shadow-sm border-0 mb-4" role="alert"
                        th:text="${msg}"></div>
                    <div th:if="${msgWarning != null}" class="alert alert-warning shadow-sm border-0 mb-4" role="alert"
                        th:text="${msgWarning}"></div>
                    <div class="card-body">
                        <div th:if="${badwords != null and !badwords.isEmpty()}" class="table-responsive">
                            <table class="table table-hover table-premium">
                                <thead>
                                    <tr>
                                        <th style="width: 80px;">ID</th>
                                        <th style="width: 200px;">Từ</th>
                                        <th>Trạng thái</th>
                                        <th class="text-end" style="width: 150px;">Hàng động</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="badword : ${badwords}">
                                        <td><span class="text-muted fw-bold" th:text="${badword.id}">1</span></td>
                                        <td>
                                            <div class="d-flex align-items-center">
                                                <i class="fas fa-folder text-theme me-2"></i>
                                                <span class="fw-bold text-dark" th:text="${badword.word}">Badword
                                                    Name</span>
                                            </div>
                                        </td>
                                        <td>
                                            <span th:if="${badword.status}"
                                                class="badge-status bg-success-subtle text-success">Hoạt động</span>
                                            <span th:unless="${badword.status}"
                                                class="badge-status bg-danger-subtle text-danger">Không hoạt động</span>
                                        </td>
                                        <td class="text-end">
                                            <div class="btn-group shadow-sm border rounded">
                                                <a th:href="@{/staff/badword/update/{id}(id=${badword.id})}"
                                                    class="btn btn-sm btn-white text-info px-3" title="Edit">
                                                    <i class="fas fa-edit"></i>
                                                </a>
                                                <button type="button"
                                                    class="btn btn-sm btn-white text-primary px-3 btn-status"
                                                    title="Toggle Status">
                                                    <i class="fas fa-sync-alt"></i>
                                                </button>
                                                <form th:action="@{/staff/badword/status/{id}(id=${badword.id})}"
                                                    method="POST" class="delete-form d-none">
                                                    <input type="hidden" th:name="${_csrf.parameterName}"
                                                        th:value="${_csrf.token}" />
                                                </form>
                                                <button type="button"
                                                    class="btn btn-sm btn-white text-danger px-3 btn-delete"
                                                    title="Delete">
                                                    <i class="fas fa-trash-alt"></i>
                                                </button>
                                                <form th:action="@{/staff/badword/delete/{id}(id=${badword.id})}"
                                                    method="POST" class="delete-form d-none">
                                                    <input type="hidden" th:name="${_csrf.parameterName}"
                                                        th:value="${_csrf.token}" />
                                                </form>
                                            </div>

                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <!-- Pagination -->
                        <div th:if="${badwords != null and !badwords.isEmpty()}"
                            class="d-flex justify-content-between align-items-center mt-4">
                            <span class="small text-muted">Trang <span th:text="${meta.page}"></span> trên <span
                                    th:text="${meta.pages}"></span></span>
                            <nav aria-label="Page navigation">
                                <ul class="pagination pagination-sm mb-0">
                                    <li th:class="|page-item ${meta.page == 1 ? 'disabled' : ''}|">
                                        <a class="page-link shadow-none"
                                            th:href="@{/staff/badword(page=${meta.page - 1}, size=${meta.pageSize}, filter=${param.filter})}">Trước</a>
                                    </li>
                                    <li th:each="p : ${#numbers.sequence(1, meta.pages)}"
                                        th:class="|page-item ${meta.page == p ? 'active' : ''}|">
                                        <a class="page-link shadow-none"
                                            th:classappend="${meta.page == p} ? 'bg-theme border-theme text-white' : ''"
                                            th:href="@{/staff/badword(page=${p}, size=${meta.pageSize}, filter=${param.filter})}"
                                            th:text="${p}"></a>
                                    </li>

                                    <li th:class="|page-item ${meta.page == meta.pages ? 'disabled' : ''}|">
                                        <a class="page-link shadow-none"
                                            th:href="@{/staff/badword(page=${meta.page + 1}, size=${meta.pageSize}, filter=${param.filter})}">Sau</a>
                                    </li>
                                </ul>
                            </nav>
                        </div>

                        <div th:if="${badwords == null or badwords.isEmpty()}" class="text-center py-5">
                            <div class="display-1 text-light"><i class="fas fa-folder-open"></i></div>
                            <p class="text-muted mt-3">Không tìm thấy từ nào!</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        document.querySelectorAll('.btn-delete').forEach(button => {
            button.addEventListener('click', function () {
                const form = this.nextElementSibling;

                Swal.fire({
                    title: 'Bạn chắc muốn xóa?',
                    html: `
                        <p>Sau khi xóa sẽ không thể khôi phục lại!</p>
                        <hr>
                        <div class="text-start">
                            <label class="mb-2 fw-bold">Chọn phạm vi áp dụng:</label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="applyChoice" id="applyOld" value="true" checked>
                                <label class="form-check-label" for="applyOld">
                                    Từ trước đến nay (Quét toàn bộ review cũ)
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="applyChoice" id="applyNew" value="false">
                                <label class="form-check-label" for="applyNew">
                                    Chỉ từ sau lúc này
                                </label>
                            </div>
                        </div>
                    `,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#d33',
                    cancelButtonColor: '#3085d6',
                    confirmButtonText: 'OK',
                    cancelButtonText: 'Cancel',
                    reverseButtons: true,
                    preConfirm: () => {
                        return document.querySelector('input[name="applyChoice"]:checked').value;
                    }
                }).then((result) => {
                    if (result.isConfirmed) {
                        const applyChoice = result.value;
                        const input = document.createElement('input');
                        input.type = 'hidden';
                        input.name = 'applyFromNowOn';
                        input.value = applyChoice;
                        form.appendChild(input);
                        form.submit();
                    }
                });
            });
        });
        function handleSearch() {
            const name = document.getElementById("searchName").value;
            const urlParams = new URLSearchParams(window.location.search);

            if (name && name.trim() !== "") {
                urlParams.set('filter', "word ~~ '" + name.trim() + "'");
            } else {
                urlParams.delete('filter');
            }

            urlParams.set('page', '1');

            window.location.href = window.location.pathname + "?" + urlParams.toString();
        }
        document.getElementById("searchName").addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                handleSearch();
            }
        });
        document.querySelectorAll('.btn-status').forEach(button => {
            button.addEventListener('click', function () {
                const form = this.nextElementSibling;
                Swal.fire({
                    title: 'Thay đổi trạng thái',
                    html: `
                        <p>Bạn có chắc muốn thay đổi trạng thái của từ khóa này?</p>
                        <hr>
                        <div class="text-start">
                            <label class="mb-2 fw-bold">Chọn phạm vi áp dụng:</label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="applyChoiceStatus" id="applyOldStatus" value="true" checked>
                                <label class="form-check-label" for="applyOldStatus">
                                    Từ trước đến nay (Quét toàn bộ review cũ)
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="applyChoiceStatus" id="applyNewStatus" value="false">
                                <label class="form-check-label" for="applyNewStatus">
                                    Chỉ từ sau lúc này
                                </label>
                            </div>
                        </div>
                    `,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#d33',
                    cancelButtonColor: '#3085d6',
                    confirmButtonText: 'OK',
                    cancelButtonText: 'Cancel',
                    reverseButtons: true,
                    preConfirm: () => {
                        return document.querySelector('input[name="applyChoiceStatus"]:checked').value;
                    }
                }).then((result) => {
                    if (result.isConfirmed) {
                        const applyChoice = result.value;
                        const input = document.createElement('input');
                        input.type = 'hidden';
                        input.name = 'applyFromNowOn';
                        input.value = applyChoice;
                        form.appendChild(input);
                        form.submit();
                    }
                });
            });
        });
    </script>
</body>

</html>
