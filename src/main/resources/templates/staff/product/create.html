<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <head th:replace="~{common/head}"></head>
    <title>Create Product</title>
</head>

<body>
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h3 class="text-center mb-0">Tạo mới sản phẩm</h3>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/staff/product/create}" method="post" th:object="${product}"
                            enctype="multipart/form-data">

                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên</label>
                                <input type="text" class="form-control" th:field="*{name}" required />
                                <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>

                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Giá</label>
                                    <input type="number" step="0.01" class="form-control" th:field="*{price}"
                                        required />
                                    <div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}">
                                    </div>

                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Thể loại</label>
                                    <select class="form-select" th:field="*{category.id}" required>
                                        <option value="">-- Chọn thể loại --</option>
                                        <option th:each="cat : ${categories}" th:value="${cat.id}"
                                            th:text="${cat.name}"></option>
                                    </select>
                                </div>
                            </div>
                            <input type="hidden" name="type" value="SINGLE">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Mô tả</label>
                                <textarea class="form-control" th:field="*{description}" rows="3" required></textarea>
                                <div class="text-danger" th:if="${#fields.hasErrors('description')}"
                                    th:errors="*{description}"></div>

                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Ảnh chính</label>
                                    <input type="file" name="thumbnailFile" class="form-control" accept="image/*"
                                        onchange="previewImage(this, 'main-preview')" required />
                                    <img id="main-preview" src="#" alt="Preview" class="mt-2 img-thumbnail d-none"
                                        style="height: 100px;" />
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Ảnh phụ</label>
                                    <input type="file" name="galleryFiles" class="form-control" accept="image/*"
                                        multiple onchange="previewMultiple(this, 'gallery-preview')" />
                                    <div id="gallery-preview" class="d-flex flex-wrap gap-2 mt-2"></div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Loại sản phẩm</label>
                                    <div>SINGLE</div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Trạng thái</label>
                                    <select th:field="*{active}" class="form-select" required>
                                        <option value="true">Hoạt động</option>
                                        <option value="false">Chưa hoạt động</option>
                                    </select>
                                </div>
                            </div>
                            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <a th:href="@{/staff/product}" class="btn btn-secondary me-md-2">Dừng</a>
                                <button type="submit" class="btn btn-primary px-4">Tạo mới</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const allowedExtensions = ['png', 'jpg', 'jpeg'];

        function validateFile(file) {
            const extension = file.name.split('.').pop().toLowerCase();
            return allowedExtensions.includes(extension);
        }

        function previewImage(input, previewId) {
            const preview = document.getElementById(previewId);
            if (input.files && input.files[0]) {
                const file = input.files[0];
                if (!validateFile(file)) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Tệp không hợp lệ',
                        text: 'Chỉ chấp nhận các tệp ảnh định dạng: .png, .jpg, .jpeg',
                        confirmButtonColor: '#3085d6',
                        confirmButtonText: 'Đồng ý'
                    });
                    input.value = '';
                    preview.classList.add('d-none');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function (e) {
                    preview.src = e.target.result;
                    preview.classList.remove('d-none');
                }
                reader.readAsDataURL(file);
            }
        }

        function previewMultiple(input, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            if (input.files) {
                const files = Array.from(input.files);
                const invalidFiles = files.filter(file => !validateFile(file));

                if (invalidFiles.length > 0) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Tệp không hợp lệ',
                        text: 'Một hoặc nhiều tệp không đúng định dạng. Chỉ chấp nhận: .png, .jpg, .jpeg',
                        confirmButtonColor: '#3085d6',
                        confirmButtonText: 'Đồng ý'
                    });
                    input.value = '';
                    return;
                }

                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.className = 'img-thumbnail';
                        img.style.height = '80px';
                        container.appendChild(img);
                    }
                    reader.readAsDataURL(file);
                });
            }
        }
    </script>
</body>

</html>
