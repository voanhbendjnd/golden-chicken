<!DOCTYPE html>
<html lang="vi">

<head>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực OTP</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f9;
        }

        .otp-card {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }

        .otp-card h2 {
            margin-bottom: 10px;
            color: #333;
        }

        .otp-card p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .otp-inputs {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 30px;
        }

        .otp-inputs input {
            width: 60px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid #ddd;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .otp-inputs input:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 8px rgba(13, 110, 253, 0.2);
            outline: none;
        }

        .btn-verify {
            width: 100%;
            padding: 12px;
            background-color: #0d6efd;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-verify:hover {
            background-color: #0b5ed7;
        }

        .resend {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .resend a {
            color: #0d6efd;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <!-- <input type="hidden" id="user-email" th:value="${session.OTP_EMAIL}"> -->
    <div class="otp-card">
        <h2>Verify OTP</h2>
        <p>Please enter code that was sent to your email</p>

        <div class="otp-inputs" id="otp-inputs">
            <input type="number" maxlength="1" max="9" min="0" inputmode="numeric" autocomplete="one-time-code">
            <input type="number" maxlength="1" max="9" min="0" inputmode="numeric">
            <input type="number" maxlength="1" max="9" min="0" inputmode="numeric">
            <input type="number" maxlength="1" max="9" min="0" inputmode="numeric">
        </div>

        <button class="btn-verify" onclick="verifyOTP()">Xác nhận</button>

        <div class="resend">
            Bạn không nhận được mã? <a th:href="@{/verify(email=${email})}">Gửi lại</a>
        </div>
        <div class="text-center">
            <a th:href="@{/register}" class="link-style">Need an account? Sign up</a>
        </div>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" id="csrf-token" />

    </div>

    <script>
        const inputs = document.querySelectorAll('#otp-inputs input');
        const csrfToken = document.getElementById('csrf-token').value;

        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        function verifyOTP() {
            let otp = "";
            inputs.forEach(input => otp += input.value);
            // Hàm lấy tham số từ URL
            const urlParams = new URLSearchParams(window.location.search);
            const emailFromUrl = urlParams.get('email');

            fetch('/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRF-TOKEN': csrfToken },

                body: JSON.stringify({ otp: otp, email: emailFromUrl })
            }).then(res => {
                if (res.ok) window.location.href = "/login?success";
                else alert("Mã OTP không đúng hoặc đã hết hạn!");
            });
        }
    </script>

</body>

</html>
