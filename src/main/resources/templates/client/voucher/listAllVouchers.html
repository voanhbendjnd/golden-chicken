<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tất cả Voucher</title>
    <link rel="shortcut icon" th:href="@{/img/favicon_New.png}" type="image/x-icon">
    <link th:href="@{/css/profileTest.css}" rel="stylesheet">
    <link th:href="@{/css/voucher-redeem.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">

    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.djnd.css}" rel="stylesheet">
</head>

<body>
    <div th:replace="~{client/layout/header.djnd}"></div>
    <div class="page" style="padding-top: 200px;">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <main class="main">
            <h1 class="title">VOUCHER LIST</h1>
            <div class="voucher-container">

                <section class="">
                    <div class="section-head">
                        <h2>Voucher của tôi</h2>
                    </div>
                    <div class="list" th:if="${#lists.isEmpty(myVouchers)}">
                        <div class="voucher">
                            <div class="v-left">
                                <div class="v-title">Bạn chưa sở hữu voucher nào</div>
                            </div>
                        </div>
                    </div>
                    <div class="list" th:unless="${#lists.isEmpty(myVouchers)}">
                        <div class="voucher" th:each="cv : ${myVouchers}">
                            <div class="v-left">
                                <div class="v-title" th:text="${cv.voucher.name}">Tên Voucher</div>
                                <div class="v-sub" th:text="${cv.voucher.code}">CODE</div>
                            </div>
                            <div class="v-right">
                                <span class="tag personal" th:text="${cv.status}">AVAILABLE</span>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Khối 2: Voucher hệ thống -->
                <section class="">
                    <div class="section-head">
                        <h2>Voucher hệ thống</h2>
                    </div>
                    <div class="list" th:if="${#lists.isEmpty(systemVouchers)}">
                        <div class="voucher">
                            <div class="v-left">
                                <div class="v-title">Không có voucher hệ thống khả dụng</div>
                            </div>
                        </div>
                    </div>
                    <div class="list" th:unless="${#lists.isEmpty(systemVouchers)}">
                        <div class="voucher" th:each="v : ${systemVouchers}">
                            <div class="v-left">
                                <div class="v-title" th:text="${v.name}">Tên Voucher</div>
                                <div class="v-sub">
                                    <span
                                        th:text="'Áp dụng cho đơn từ ' + ${v.minOrderValue} + 'đ trở lên'"></span><br />
                                    <span th:text="'Hiệu lực: ' + ${#temporals.format(v.startAt, 'dd/MM/yyyy')} 
                                                   + ' - ' + ${#temporals.format(v.endAt, 'dd/MM/yyyy')}"></span>
                                </div>
                            </div>
                            <div class="v-right">
                                <span class="tag"
                                    th:text="${v.discountType == 'PERCENT' ? v.discountValue + '%': v.discountValue + 'đ'}">
                                    -10%
                                </span>
                            </div>
                        </div>
                    </div>
                </section>

            </div>
        </main>
    </div>
    <div th:replace="~{client/layout/footer.djnd}"></div>
</body>

</html>
