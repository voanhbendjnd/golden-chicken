<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Shipping Fee Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h3 class="text-center">Tạo mới phí ship cho phường/xã</h3>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/staff/shippingFee/create}" method="post" th:object="${shippingFee}">
                            <div class="mb-3">
                                <label class="form-label">Phường xã</label>
                                <select class="form-select" th:field="*{ward}" th:attr="data-selected=*{ward}" required>
                                    <option value="">-- Chọn phường/xã --</option>
                                </select>
                                <div th:if="${#fields.hasErrors('ward')}" style="color: red;" th:errors="*{ward}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Phí</label>
                                <input type="number" class="form-control" th:field="*{fee}" min="0" required />
                                <div th:if="${#fields.hasErrors('fee')}" style="color: red;" th:errors="*{fee}"></div>
                            </div>


                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a th:href="@{/staff/shippingFee}" class="btn btn-secondary me-md-2">Hủy</a>
                                <button type="submit" class="btn btn-primary">Tạo mới</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/address.js}"></script>
</body>

</html>
