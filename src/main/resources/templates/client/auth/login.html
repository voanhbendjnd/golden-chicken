<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <title>Golden Chicken - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* ===== GLOBAL BACKGROUND ===== */

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #d90429, #ffbe0b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* ===== GLASS CARD ===== */

        .login-card {
            border-radius: 30px;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        /* ===== BRAND SIDE ===== */

        .brand-section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            color: white;
            text-align: center;
            padding: 50px 25px;
        }

        .brand-section h2 {
            font-weight: 700;
            letter-spacing: 1px;
        }

        .brand-section p {
            opacity: 0.9;
        }

        /* ===== FORM SIDE ===== */

        .form-section {
            padding: 50px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(25px);
            color: #111;
        }

        .form-section h3 {
            font-weight: 600;
        }

        /* ===== INPUT ===== */

        .form-control {
            border-radius: 40px;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.6);
            border: none;
            backdrop-filter: blur(10px);
            transition: 0.3s ease;
        }

        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.85);
        }

        /* ===== BUTTON ===== */

        .btn-login {
            border-radius: 40px;
            padding: 12px;
            font-weight: 600;
            border: none;
            color: white;
            background: linear-gradient(135deg, #d90429, #9d0208);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
        }

        /* ===== LINK ===== */

        .link-style {
            text-decoration: none;
            font-weight: 500;
            color: #111;
            transition: 0.3s;
        }

        .link-style:hover {
            opacity: 0.7;
        }

        /* ===== ALERT GLASS ===== */

        .alert {
            border-radius: 20px;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.6);
            border: none;
        }

        /* ===== 3D EFFECT ===== */

        .login-card {
            transform-style: preserve-3d;
            transition: transform 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        /* ánh sáng phản chiếu */
        .login-card::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at center,
                    rgba(255, 255, 255, 0.4),
                    transparent 60%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <div class="card shadow-lg login-card">

                    <div class="row g-0">

                        <!-- Brand Side -->
                        <div class="col-md-5 brand-section d-flex flex-column justify-content-center">
                            <h2>Golden Chicken</h2>
                            <p>Fresh • Crispy • Delicious</p>
                        </div>

                        <!-- Form Side -->
                        <div class="col-md-7 form-section">

                            <h3 class="text-center mb-4">Welcome Back</h3>

                            <form method="post" th:action="@{/login}">

                                <div th:if="${param.error != null}" class="alert alert-danger">
                                    Invalid email or password.
                                </div>

                                <div th:if="${param.logout != null}" class="alert alert-success">
                                    Logout successful!
                                </div>

                                <div class="mb-3">
                                    <input class="form-control" type="email" name="username"
                                        placeholder="Enter your email" required />
                                </div>

                                <div class="mb-3">
                                    <input class="form-control" type="password" name="password"
                                        placeholder="Enter your password" required />
                                </div>

                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                                <div class="d-grid mb-3">
                                    <button class="btn btn-login">
                                        Login
                                    </button>
                                </div>

                                <div class="text-center">
                                    <a th:href="@{/register}" class="link-style">Need an account? Sign up</a>
                                </div>

                            </form>

                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

                const y = e.clientY - rect.top;

                const centerX = rect.width / 2;
                const centerY = rect.height / 2;

                const rotateX = ((y - centerY) / 20) * -1;
                const rotateY = (x - centerX) / 20;

                card.style.transform =
                    `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;

                // ánh sáng theo chuột
                const percentX = (x / rect.width) * 100;
                const percentY = (y / rect.height) * 100;

                    "--light-x",
                    percentX + "%"
                );
                card.style.setProperty(
                    "--light-y",
                    percentY + "%"
                );

                card.querySelector("::before");
                card.style.setProperty(
                    "--glow",

            rgba(255,255,255,0.5),
            transparent 60%)`

                card.style.setProperty("opacity", "1");

            card.addEventListener("mouseleave", () => {

            setInterval(() => {

</body>

</html>
