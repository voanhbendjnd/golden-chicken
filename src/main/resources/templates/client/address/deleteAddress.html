<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Xác nhận xóa địa chỉ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="shortcut icon" th:href="@{/img/favicon_New.png}" type="image/x-icon">
    <th:block th:replace="~{common/head}"></th:block>

    <link th:href="@{/css/base.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/profileTest.css}" rel="stylesheet">
    <link th:href="@{/css/address.css}" rel="stylesheet">
</head>

<body>
    <div th:replace="~{client/layout/header}"></div>

    <div class="page">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <main class="addr-main">
            <h1 class="addr-title">Xác nhận xóa địa chỉ</h1>

            <section class="addr-card">
                <div class="addr-card__head">XÓA ĐỊA CHỈ</div>
                <div class="addr-card__body">
                    <p>Bạn có chắc chắn muốn xóa địa chỉ này không?</p>

                    <div class="mb-3">
                        <p><strong>Người nhận:</strong> <span th:text="${address.recipientName}">Name</span></p>
                        <p><strong>SĐT:</strong> <span th:text="${address.recipientPhone}">Phone</span></p>
                        <p>
                            <strong>Địa chỉ:</strong>
                            <span th:text="${address.specificAddress}"></span>,
                            <span th:text="${address.ward}"></span>,
                            <!-- <span th:text="${address.district}"></span>, -->
                            <span th:text="${address.city}"></span>
                        </p>
                    </div>

                    <div class="d-flex gap-2">
                        <a th:href="@{/addresses}" class="btn btn-secondary">Hủy</a>
                        <form th:action="@{/addresses/{id}/delete(id=${address.id})}" method="post" class="m-0">
                            <button type="submit" class="btn btn-danger">Xác nhận xóa</button>
                        </form>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div th:replace="~{client/layout/footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
