<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Golden Chicken - Change Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* ===== BACKGROUND IMAGE ===== */
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('/img/register.jpg') no-repeat center center/cover;
            font-family: 'Segoe UI', sans-serif;
            position: relative;
        }

        /* Overlay tối */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 0;
        }

        /* ===== GLASS CARD ===== */
        .login-card {
            width: 420px;
            padding: 40px;
            border-radius: 25px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 1;
            transition: 0.3s ease;
        }

        .login-card:hover {
            transform: scale(1.03);
        }

        h3 {
            color: #fff;
            font-weight: 700;
        }

        /* ===== INPUT ===== */
        .form-control {
            border-radius: 15px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.4);
            border: none;
            color: #fff;
        }

        .form-control::placeholder {
            color: #eee;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.3);
            color: #000;
        }

        /* ===== BUTTON ===== */
        .btn-login {
            border-radius: 15px;
            padding: 12px;
            font-weight: 600;
            border: none;
            background: #e9c3a3;
            transition: 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        /* ===== LINKS ===== */
        .link-style {
            text-decoration: none;
            color: #fff;
            font-weight: 500;
        }

        .link-style:hover {
            text-decoration: underline;
        }

        /* ===== ALERT ===== */
        .alert {
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.7);
            border: none;
        }
    </style>
</head>

<body>

    <div class="login-card">

        <h3 class="text-center mb-4">Cập Nhật Mật Khẩu</h3>

        <form method="post" th:action="@{/update-password-v2}">



            <div class="mb-3">
                <input class="form-control" type="password" id="password" name="password"
                    placeholder="Enter your password" required />
            </div>

            <div class="mb-3">
                <input class="form-control" type="password" id="confirmPassword" name="confirmPassword"
                    placeholder="Enter your confirm password" required />
            </div>

            <div id="passwordError" class="text-white mb-3" style="display:none;">
                Mật khẩu không khớp!
            </div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="d-grid mb-3">
                <button class="btn btn-login">
                    Gửi
                </button>
            </div>
            <div class="text-center">
                <a th:href="@{/register}" class="link-style">Bạn chưa có tài khoản? Đăng ký</a>

            </div>

        </form>
    </div>
    <script>
        document.querySelector("form").addEventListener("submit", function (e) {

            let password = document.getElementById("password").value;
            let confirmPassword = document.getElementById("confirmPassword").value;
            let error = document.getElementById("passwordError");

            if (password !== confirmPassword) {
                e.preventDefault(); // chặn submit
                error.style.display = "block";
            } else {
                error.style.display = "none";
            }
        });
        let password = document.getElementById("password");
        let confirmPassword = document.getElementById("confirmPassword");
        let error = document.getElementById("passwordError");

        function checkPassword() {
            if (confirmPassword.value === "") {
                error.style.display = "none";
                return;
            }

            if (password.value !== confirmPassword.value) {
                error.style.display = "block";
            } else {
                error.style.display = "none";
            }
        }

        password.addEventListener("keyup", checkPassword);
        confirmPassword.addEventListener("keyup", checkPassword);
    </script>
</body>

</html>
