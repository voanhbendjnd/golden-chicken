<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Đổi điểm</title>
  <link rel="shortcut icon" th:href="@{/img/favicon_New.png}" type="image/x-icon">
  <link th:href="@{/css/base.css}" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
  <th:block th:replace="~{common/head}"></th:block>
  <link th:href="@{/css/profileTest.css}" rel="stylesheet">
  <link th:href="@{/css/voucher-redeem.css}" rel="stylesheet">


</head>

<body>
  <div th:replace="~{client/layout/header}"></div>
  <div class="page">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="main">
      <div class="voucher-container">
        <div class="voucher-header">
          <div>
            <h1>Đổi điểm lấy Voucher</h1>
            <div class="points">
              <b id="pointsText" th:text="${points}">0</b>
              điểm • dùng để đổi voucher
            </div>
          </div>
          <button class="btn" id="btnMyVouchers" type="button">Voucher của tôi</button>
        </div>

        <div class="tabs" role="tablist">
          <div class="tab active" id="tabRedeem" role="tab" aria-selected="true">Đổi quà</div>
          <div class="tab" id="tabHistory" role="tab" aria-selected="false">Lịch sử</div>
        </div>

        <section id="myVoucherSection" style="display:none">
          <div class="section-head">
            <h2>Voucher hiện có</h2>
            <button class="link" id="btnBackFromMy" type="button">Quay lại</button>
          </div>

          <div class="list">
            <div class="voucher">
              <div class="v-left">
                <div class="v-title">Voucher của tôi</div>
              </div>
              <div class="v-right">
                <span class="tag personal">Cá nhân</span>
                <button class="btn-primary" type="button" disabled>Chưa có</button>
              </div>
            </div>
          </div>
        </section>

        <section id="redeemSection">
          <div class="section-head">
            <h2>Danh sách voucher đổi điểm</h2>
            <button class="link" type="button">Xem tất cả</button>
          </div>

          <div class="list" th:if="${#lists.isEmpty(vouchers)}">
            <div class="voucher">
              <div class="v-left">
                <div class="v-title">Chưa có voucher khả dụng</div>
              </div>
            </div>
          </div>

          <div class="list" th:unless="${#lists.isEmpty(vouchers)}">
            <div class="voucher" th:each="v : ${vouchers}">
              <div class="v-left">
                <div class="v-title" th:text="${v.name}">Voucher</div>
                <div class="v-sub" th:text="${v.description}">Mô tả</div>
              </div>
              <div class="v-right">
                <span class="tag" th:text="${v.pointCost} + ' điểm'">1000 điểm</span>
                <button class="btn btn-primary" type="button" th:disabled="${points lt v.pointCost}"
                  th:text="${points >= v.pointCost ? 'Đổi' : 'Không đủ điểm'}">
                  Đổi
                </button>
              </div>
            </div>
          </div>

        </section>

        <section id="historySection" style="display:none">
          <div class="section-head">
            <h2>Lịch sử đổi điểm</h2>
            <button class="link" type="button">Lọc</button>
          </div>

          <div class="list">
            <div class="voucher">
              <div class="v-left">
                <div class="v-title">Lịch sử đổi điểm</div>
              </div>
              <div class="v-right">
                <span class="tag">-0 điểm</span>
                <span class="tag system">Chờ cập nhật</span>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>
  <div th:replace="~{client/layout/footer}"></div>

  <script th:src="@{/js/voucher-redeem.js}"></script>
</body>

</html>
