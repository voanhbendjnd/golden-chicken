<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Update Voucher</title>
    <link rel="stylesheet" href="/css/voucher.css">
</head>

<body>

<div class="voucher-container">
    <h2 class="page-title">Update Voucher</h2>

    <!--    <div th:if="${error}" class="form-error">-->
    <!--        <p th:text="${error}"></p>-->
    <!--    </div>-->
    <div th:if="${errorMessage}"
         class="error-box"
         th:text="${errorMessage}">
    </div>
    <form class="voucher-form"
          th:action="@{/staff/voucher/edit/{id}(id=${voucher.id})}"
          th:object="${voucher}"
          method="post">
        <!--        <div class="error-box"-->
        <!--             th:if="${#fields.hasErrors('endAt')}"-->
        <!--             th:errors="*{endAt}">-->
        <!--        </div>-->

        <div class="form-group">
            <label>Code</label>
            <input type="text" th:field="*{code}"/>
            <div class="field-error"
                 th:if="${#fields.hasErrors('code')}"
                 th:errors="*{code}">
            </div>
        </div>

        <div class="form-group">
            <label>Name</label>
            <input type="text" th:field="*{name}"/>
            <div class="field-error"
                 th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}">
            </div>
        </div>

        <div class="form-group full">
            <label>Description</label>
            <input type="text" th:field="*{description}"/>

            <div class="field-error"
                 th:if="${#fields.hasErrors('description')}"
                 th:errors="*{description}">
            </div>
        </div>
        <div class="form-group">
            <label>Discount Type</label>
            <select th:field="*{discountType}">
                <option value="">-- Select discount type --</option>
                <option value="PERCENT">PERCENT</option>
                <option value="FIXED">FIXED</option>
            </select>
            <div class="field-error"
                 th:if="${#fields.hasErrors('discountType')}"
                 th:errors="*{discountType}">
            </div>
        </div>

        <div class="form-group">
            <label>Discount Value</label>

            <div style="display:flex; align-items:center; gap:8px;">
                <input type="number"
                       id="discountValue"
                       th:field="*{discountValue}"

                       min="0"/>
                <span id="discountUnit">%</span>
            </div>

            <small id="discountHint" style="color:#777">
                Enter percent (0 — 100)
            </small>

            <div class="field-error"
                 th:if="${#fields.hasErrors('discountValue')}"
                 th:errors="*{discountValue}">
            </div>
        </div>

        <div class="form-group">
            <label>Min Order Value</label>
            <input type="number"
                   step="0.01"
                   th:field="*{minOrderValue}"
                   min="0"/>
            <div class="field-error"
                 th:if="${#fields.hasErrors('minOrderValue')}"
                 th:errors="*{minOrderValue}">
            </div>
        </div>

        <div class="form-group">
            <label>Point Cost</label>
            <input type="number"
                   th:field="*{pointCost}"
                   min="0"/>
            <div class="field-error"
                 th:if="${#fields.hasErrors('pointCost')}"
                 th:errors="*{pointCost}">
            </div>
        </div>

        <div class="checkbox-group">
            <label>Allow exchange by points?</label>
            <input type="checkbox" th:field="*{exchangeable}"/>
        </div>

        <div class="form-group">
            <label>Start At</label>
            <input type="datetime-local"
                   id="startAt"
                   name="startAt"
                   th:value="${#temporals.format(voucher.startAt, 'yyyy-MM-dd''T''HH:mm')}"/>
        </div>

        <div class="form-group">
            <label>End At</label>
            <input type="datetime-local"
                   id="endAt"
                   name="endAt"
                   th:value="${#temporals.format(voucher.endAt, 'yyyy-MM-dd''T''HH:mm')}"/>
        </div>

        <div class="form-group">
            <label>Status</label>
            <select th:field="*{status}" required>
                <option value="ACTIVE">ACTIVE</option>
                <option value="DISABLED">DISABLED</option>
                <option value="EXPIRED">EXPIRED</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Update</button>
            <a th:href="@{/staff/voucher/list}" class="btn-secondary">Cancel</a>
        </div>

    </form>
</div>
<script th:src="@{/js/voucher.js}"></script>
</body>

</html>
