<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Quản lý đơn hàng - Staff</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link th:href="@{/css/staff-order.css}" rel="stylesheet">

    <head th:replace="~{common/head}"></head>
</head>

<body>
<div th:replace="~{component/header}"></div>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 col-lg-2 p-0">
            <div th:replace="~{staff/layout/sidebar}"></div>
        </div>

        <main class="col-md-9 col-lg-10 ms-sm-auto px-md-4">
            <div class="container mt-5">
                <div class="row">
                    <div class="col-12">
                        <div class="card shadow-sm">
                            <div class="card-header bg-white py-3">
                                <h5 class="mb-0 text-primary"><i class="bi bi-cart-check me-2"></i>Danh sách đơn hàng
                                    vận hành</h5>
                            </div>
                            <div class="card-body">
                                <div class="row mb-3">
                                    <div class="col-md-8">
                                        <div class="input-group">
                                            <select id="filterStatus" class="form-select" style="max-width: 200px;"
                                                    onchange="handleSearch()">
                                                <option value="">-- Tất cả trạng thái --</option>
                                                <option value="PENDING"
                                                        th:selected="${param.filter != null && #strings.contains(param.filter, 'status : ''PENDING''')}">
                                                    Pending (Chờ xác nhận)
                                                </option>
                                                <option value="PREPARING"
                                                        th:selected="${param.filter != null && #strings.contains(param.filter, 'status : ''PREPARING''')}">
                                                    Preparing (Đang chuẩn bị)
                                                </option>
                                                <option value="READY_FOR_DELIVERY"
                                                        th:selected="${param.filter != null && #strings.contains(param.filter, 'status : ''READY_FOR_DELIVERY''')}">
                                                    Ready (Sẵn sàng giao)
                                                </option>
                                                <option value="DELIVERING"
                                                        th:selected="${param.filter != null && #strings.contains(param.filter, 'status : ''DELIVERING''')}">
                                                    Delivering (Đang giao)
                                                </option>
                                                <option value="SHIPPER_ISSUE"
                                                        th:selected="${param.filter != null && #strings.contains(param.filter, 'status : ''SHIPPER_ISSUE''')}">
                                                    Shipper Issue (Sự cố)
                                                </option>
                                                <option value="REASSIGNING_SHIPPER"
                                                        th:selected="${param.filter != null && #strings.contains(param.filter, 'status : ''REASSIGNING_SHIPPER''')}">
                                                    Reassigning (Đang đổi shipper)
                                                </option>
                                                <option value="DELIVERY_FAILED"
                                                        th:selected="${param.filter != null && #strings.contains(param.filter, 'status : ''DELIVERY_FAILED''')}">
                                                    Delivery Failed (Giao hụt)
                                                </option>
                                                <option value="DELIVERED"
                                                        th:selected="${param.filter != null && #strings.contains(param.filter, 'status : ''DELIVERED''')}">
                                                    Delivered (Thành công)
                                                </option>
                                                <option value="CANCELLED"
                                                        th:selected="${param.filter != null && #strings.contains(param.filter, 'status : ''CANCELLED''')}">
                                                    Cancelled (Đã hủy)
                                                </option>
                                            </select>

                                            <input type="text" id="searchName" class="form-control"
                                                   placeholder="Tìm theo số điện thoại..." th:value="${searchName}">

                                            <button class="btn btn-primary" type="button" onclick="handleSearch()">
                                                <i class="bi bi-search"></i> Tìm kiếm
                                            </button>
                                            <a href="/staff/order" class="btn btn-outline-dark">Reset</a>
                                        </div>
                                    </div>
                                </div>

                                <div th:if="${orders != null and !orders.isEmpty()}" class="table-responsive">
                                    <table class="table table-hover align-middle">
                                        <thead class="table-light">
                                        <tr>
                                            <th>ID</th>
                                            <th>Khách hàng</th>
                                            <th>Tổng tiền</th>
                                            <th>Thanh toán</th>
                                            <th>Ngày tạo</th>
                                            <th style="width: 200px;">Trạng thái vận hành</th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        <tr th:each="order : ${orders}">
                                            <td>
                                                <a th:href="@{/staff/order/{id}(id=${order.id})}"
                                                   th:text="'#' + ${order.id}" class="fw-bold text-decoration-none"></a>
                                            </td>
                                            <td>
                                                <div th:text="${order.name}"></div>
                                                <small class="text-muted" th:text="${order.phone}"></small>
                                            </td>
                                            <td class="fw-bold text-danger"
                                                th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>
                                            <td>
                                               <span class="badge"
                                                     th:classappend="${order.paymentStatus == 'PAID' ? 'bg-success' : (order.paymentStatus == 'REFUNDED' ? 'bg-refunded' : 'bg-warning text-dark')}"
                                                     th:text="${order.paymentStatus}">
                                               </span>
                                            </td>
                                            <td th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                                            <td>
                                                <select class="form-select form-select-sm status-select fw-bold"
                                                        th:onchange="'updateStatus(this, ' + ${order.id} + ')'"
                                                        th:disabled="${order.status.name() == 'DELIVERED' or order.status.name() == 'COMPLETED' or order.status.name() == 'CANCELLED'}"
                                                        th:style="${'background-color: ' +
                                                            (order.status.name() == 'PENDING' ? '#fff3cd' :
                                                             order.status.name() == 'DELIVERING' ? '#cff4fc' :
                                                             order.status.name() == 'DELIVERED' ? '#d1e7dd' :
                                                             order.status.name() == 'CANCELLED' ? '#f8d7da' :
                                                             order.status.name() == 'COMPLETED' ? '#d1e7dd' :
                                                             (order.status.name() == 'SHIPPER_ISSUE' or order.status.name() == 'DELIVERY_FAILED') ? '#ffe5d0' : '#e2e3e5') +
                                                            '; color: #333;'}">

                                                    <option th:value="${order.status.name()}"
                                                            th:text="${order.status.name()}" selected></option>

                                                    <th:block th:if="${order.status.name() == 'PENDING'}">
                                                        <option value="PREPARING">PREPARING (Chuẩn bị hàng)</option>
                                                        <option value="CANCELLED">CANCELLED (Hủy đơn)</option>
                                                        <option value="COMPLETED">COMPLETED (Đã nhận đơn)</option>
                                                    </th:block>

                                                    <th:block th:if="${order.status.name() == 'PREPARING'}">
                                                        <option value="READY_FOR_DELIVERY">READY FOR DELIVERY (Sẵn
                                                            sàng)
                                                        </option>
                                                    </th:block>

                                                    <th:block th:if="${order.status.name() == 'READY_FOR_DELIVERY'}">
                                                        <option value="DELIVERING">DELIVERING (Bắt đầu giao)</option>
                                                    </th:block>

                                                    <th:block th:if="${order.status.name() == 'DELIVERING'}">
                                                        <option value="DELIVERED">DELIVERED (Thành công)</option>
                                                        <option value="DELIVERY_FAILED">DELIVERY FAILED (Khách không
                                                            nghe máy)
                                                        </option>
                                                        <option value="SHIPPER_ISSUE">SHIPPER ISSUE (Shipper gặp sự
                                                            cố)
                                                        </option>
                                                    </th:block>

                                                    <th:block th:if="${order.status.name() == 'SHIPPER_ISSUE'}">
                                                        <option value="REASSIGNING_SHIPPER">REASSIGNING (Đổi shipper
                                                            khác)
                                                        </option>
                                                    </th:block>

                                                    <th:block th:if="${order.status.name() == 'REASSIGNING_SHIPPER'}">
                                                        <option value="DELIVERING">DELIVERING (Tiếp tục giao)</option>
                                                    </th:block>

                                                    <th:block th:if="${order.status.name() == 'DELIVERY_FAILED'}">
                                                        <option value="DELIVERING">DELIVERING (Thử giao lại lần 2)
                                                        </option>
                                                        <option value="CANCELLED">CANCELLED (Hủy đơn)</option>
                                                    </th:block>
                                                </select>
                                            </td>
                                        </tr>
                                        </tbody>
                                    </table>

                                    <div class="d-flex justify-content-center mt-3">
                                        <nav aria-label="Page navigation">
                                            <ul class="pagination">
                                                <li th:class="|page-item ${meta.page == 1 ? 'disabled' : ''}|">
                                                    <a class="page-link shadow-none"
                                                       th:href="@{/staff/order(page=${meta.page - 1}, size=${meta.pageSize}, filter=${param.filter})}">Trước</a>
                                                </li>
                                                <li th:each="p : ${#numbers.sequence(1, meta.pages)}"
                                                    th:class="|page-item ${meta.page == p ? 'active' : ''}|">
                                                    <a class="page-link shadow-none"
                                                       th:href="@{/staff/order(page=${p}, size=${meta.pageSize}, filter=${param.filter})}"
                                                       th:text="${p}"></a>
                                                </li>
                                                <li th:class="|page-item ${meta.page == meta.pages ? 'disabled' : ''}|">
                                                    <a class="page-link shadow-none"
                                                       th:href="@{/staff/order(page=${meta.page + 1}, size=${meta.pageSize}, filter=${param.filter})}">Sau</a>
                                                </li>
                                            </ul>
                                        </nav>
                                    </div>
                                </div>

                                <form id="updateStatusForm" th:action="@{/staff/order/update-status}" method="POST"
                                      style="display: none;">
                                    <input type="hidden" name="orderId" id="submitOrderId">
                                    <input type="hidden" name="status" id="submitStatus">
                                </form>

                                <div th:if="${orders == null or orders.isEmpty()}" class="text-center py-5">
                                    <img src="https://cdn-icons-png.flaticon.com/512/7486/7486744.png" width="80"
                                         class="mb-3 opacity-50">
                                    <p class="text-muted">Không tìm thấy đơn hàng nào khớp với yêu cầu!</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function updateStatus(selectElement, orderId) {
        const newStatus = selectElement.value;
        const statusText = selectElement.options[selectElement.selectedIndex].text;

        Swal.fire({
            title: 'Xác nhận cập nhật?',
            text: `Bạn muốn chuyển đơn hàng #${orderId} sang trạng thái: ${statusText}?`,
            icon: 'info',
            showCancelButton: true,
            confirmButtonColor: '#0d6efd',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Đồng ý',
            cancelButtonText: 'Hủy',
            reverseButtons: true
        }).then((result) => {
            if (result.isConfirmed) {
                document.getElementById('submitOrderId').value = orderId;
                document.getElementById('submitStatus').value = newStatus;
                document.getElementById('updateStatusForm').submit();
            } else {
                location.reload();
            }
        });
    }

    function handleSearch() {
        const name = document.getElementById("searchName").value.trim();
        const status = document.getElementById("filterStatus").value;
        const urlParams = new URLSearchParams(window.location.search);

        let filterConditions = [];

        if (name !== "") {
            filterConditions.push(`phone ~~ '${name}'`);
        }

        if (status !== "" && status !== "ALL") {
            filterConditions.push(`status : '${status}'`);
        }

        if (filterConditions.length > 0) {
            urlParams.set('filter', filterConditions.join(' and '));
        } else {
            urlParams.delete('filter');
        }

        urlParams.set('page', '1');
        window.location.href = window.location.pathname + "?" + urlParams.toString();
    }

    document.getElementById("searchName").addEventListener("keypress", function (event) {
        if (event.key === "Enter") {
            handleSearch();
        }
    });
</script>
</body>
</html>
