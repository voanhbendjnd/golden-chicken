    <head th:replace="~{common/head}"></head>
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <title>Product Management - Golden Chicken</title>
</head>

<body>
    <div th:replace="~{component/header}"></div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 p-0 sidebar-bg">
                <div th:replace="~{staff/layout/sidebar}"></div>
            </div>
            <main class="col-md-9 col-lg-10 ms-sm-auto px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="fas fa-hamburger me-2 text-theme"></i>Product Inventory</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <a th:href="@{/staff/product/create}" class="btn btn-theme shadow-sm">
                            <i class="fas fa-plus me-1"></i> Add New Product
                        </a>
                    </div>
                </div>

                <div class="premium-card shadow-sm">
                    <div class="card-header">
                        <div class="row align-items-center">
                            <div class="col">
                                <h5 class="mb-0">Product List</h5>
                            </div>
                            <div class="col-auto">
                                <div class="input-group input-group-sm" style="width: 300px;">
                                    <input type="text" id="searchName" class="form-control"
                                        placeholder="Search by name..." th:value="${searchName}">
                                    <button class="btn btn-theme" type="button" onclick="handleSearch()">
                                        <i class="fas fa-search"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div th:if="${products != null and !products.isEmpty()}" class="table-responsive">
                            <table class="table table-hover table-premium">
                                <thead>
                                    <tr>
                                        <th style="width: 80px;">ID</th>
                                        <th>Product</th>
                                        <th>Category</th>
                                        <th>Price</th>
                                        <th>Status</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="product : ${products}">
                                        <td><span class="text-muted fw-bold" th:text="${product.id}">1</span></td>
                                        <td>
                                            <div class="d-flex align-items-center">
                                                <div class="bg-light p-2 rounded me-3">
                                                    <i class="fas fa-fast-food text-theme"></i>
                                                </div>
                                                <div>
                                                    <div class="fw-bold" th:text="${product.name}">Product Name</div>
                                                    <div class="small text-muted" th:text="${product.type}">Type</div>
                                                </div>
                                            </div>
                                        </td>
                                        <td>
                                            <span class="badge bg-light text-dark border px-2 py-1" th:text="${product.category.name}">Category</span>
                                        </td>
                                        <td>
                                            <span class="fw-bold text-dark" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT') + ' ₫'}">Price</span>
                                        </td>
                                        <td>
                                            <span th:if="${product.active}" class="badge-status bg-success-subtle text-success">Active</span>
                                            <span th:unless="${product.active}" class="badge-status bg-danger-subtle text-danger">Inactive</span>
                                        </td>
                                        <td class="text-end">
                                            <div class="btn-group shadow-sm border rounded">
                                                <a th:href="@{/staff/product/update/{id}(id=${product.id})}"
                                                    class="btn btn-sm btn-white text-info px-3" title="Edit">
                                                    <i class="fas fa-edit"></i>
                                                </a>
                                                <button type="button" class="btn btn-sm btn-white text-warning px-3 btn-status" title="Toggle Status">
                                                    <i class="fas fa-toggle-on"></i>
                                                </button>
                                                <button type="button" class="btn btn-sm btn-white text-danger px-3 btn-delete" title="Delete">
                                                    <i class="fas fa-trash-alt"></i>
                                                </button>
                                            </div>
                                            
                                            <!-- Hidden Forms -->
                                            <form th:action="@{/staff/product/delete/{id}(id=${product.id})}" method="POST" class="delete-form d-none">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                            </form>
                                            <form th:action="@{/staff/product/status/{id}(id=${product.id})}" method="POST" class="status-form d-none">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                            </form>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <!-- Pagination -->
                        <div th:if="${products != null and !products.isEmpty()}" class="d-flex justify-content-between align-items-center mt-4">
                            <span class="small text-muted">Showing page <span th:text="${meta.page}"></span> of <span th:text="${meta.pages}"></span></span>
                            <nav aria-label="Page navigation">
                                <ul class="pagination pagination-sm mb-0">
                                    <li th:class="|page-item ${meta.page == 1 ? 'disabled' : ''}|">
                                        <a class="page-link shadow-none" th:href="@{/staff/product(page=${meta.page - 1}, size=${meta.pageSize}, filter=${param.filter})}">Previous</a>
                                    </li>
                                    <li th:each="p : ${#numbers.sequence(1, meta.pages)}"
                                        th:class="|page-item ${meta.page == p ? 'active' : ''}|">
                                        <a class="page-link shadow-none" th:classappend="${meta.page == p} ? 'bg-theme border-theme text-white' : ''"
                                            th:href="@{/staff/product(page=${p}, size=${meta.pageSize}, filter=${param.filter})}" th:text="${p}"></a>
                                    </li>
                                    <li th:class="|page-item ${meta.page == meta.pages ? 'disabled' : ''}|">
                                        <a class="page-link shadow-none" th:href="@{/staff/product(page=${meta.page + 1}, size=${meta.pageSize}, filter=${param.filter})}">Next</a>
                                    </li>
                                </ul>
                            </nav>
                        </div>
                        
                        <div th:if="${products == null or products.isEmpty()}" class="text-center py-5">
                            <div class="display-1 text-light"><i class="fas fa-hamburger"></i></div>
                            <p class="text-muted mt-3">No products found in the inventory.</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function handleSearch() {
            const name = document.getElementById("searchName").value;
            const urlParams = new URLSearchParams(window.location.search);

            if (name && name.trim() !== "") {
                urlParams.set('filter', "name ~~ '" + name.trim() + "'");
            } else {
                urlParams.delete('filter');
            }

            urlParams.set('page', '1');

            window.location.href = window.location.pathname + "?" + urlParams.toString();
        }
        document.getElementById("searchName").addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                handleSearch();
            }
        });
        document.querySelectorAll('.btn-delete').forEach(button => {
            button.addEventListener('click', function () {
                const form = this.closest('.delete-form');
                Swal.fire({
                    title: 'Are you sure delete?',
                    text: "The data will be moved to the Recycle Bin and can be recovered later!",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#d33',
                    cancelButtonColor: '#3085d6',
                    confirmButtonText: 'OK',
                    cancelButtonText: 'Cancel',
                    reverseButtons: true
                }).then((result) => {
                    if (result.isConfirmed) {
                        form.submit();
                    }
                });
            });
        });

        document.querySelectorAll('.btn-status').forEach(button => {
            button.addEventListener('click', function () {
                const form = this.closest('.status-form');
                Swal.fire({
                    title: 'Are you sure change status?',
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#d33',
                    cancelButtonColor: '#3085d6',
                    confirmButtonText: 'OK',
                    cancelButtonText: 'Cancel',
                    reverseButtons: true
                }).then((result) => {
                    if (result.isConfirmed) {
                        form.submit();
                    }
                });
            });
        });
    </script>
</body>

</html>
