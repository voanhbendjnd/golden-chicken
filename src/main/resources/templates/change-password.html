<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Management</title>

    <meta charset="UTF-8">
    <link th:href="@{/css/style.djnd.css}" rel="stylesheet">
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <meta name="_csrf" th:content="${_csrf.token}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/css/order.history.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <link th:href="@{/css/pagination.css}" rel="stylesheet">

    <style>
        .card.rounded-4 {
            border-radius: 1rem;
        }

        .btn-icon {
            width: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .nav-pills .nav-link.active {
            background: #ffc107;
            color: #111 !important;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div th:replace="~{client/layout/header.djnd}"></div>

    <div class="container py-5">
        <div class="row g-4" style="padding-top: 120px;">

            <!-- Sidebar -->
            <div th:replace="~{fragments/sidebar :: sidebar}"></div>


            <!-- Content -->
            <div class="col-12 col-lg-9">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-4 p-lg-5">

                        <div class="d-flex align-items-center justify-content-between mb-4">
                            <div>
                                <h4 class="fw-bold mb-1">Đổi mật khẩu</h4>
                                <div class="text-secondary">Cập nhật mật khẩu để bảo mật tài khoản.</div>
                            </div>
                        </div>

                        <div class="alert alert-danger py-2 mb-3" th:if="${error}" th:text="${error}"></div>

                        <form id="changePasswordForm" th:action="@{/change-password}" method="post" class="mt-2">
                            <input type="hidden" id="csrfToken" th:value="${_csrf.token}">
                            <input type="hidden" id="csrfHeader" th:value="${_csrf.headerName}">

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Mật khẩu cũ</label>
                                <div class="input-group">
                                    <input id="oldPw" class="form-control" type="password" name="oldPassword"
                                        placeholder="Nhập mật khẩu cũ" required>
                                    <button class="btn btn-outline-secondary btn-icon" type="button"
                                        onclick="togglePw('oldPw', this)">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                </div>

                                <div class="text-danger mt-1" id="oldError" style="display:none;"></div>

                                <div class="text-danger mt-1" th:if="${errorOld}" th:text="${errorOld}"></div>
                            </div>

                            <!-- new password -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Mật khẩu mới</label>
                                <div class="input-group">
                                    <input id="newPw" class="form-control" type="password" name="newPassword"
                                        placeholder="Tối thiểu 6 ký tự" required>
                                    <button class="btn btn-outline-secondary btn-icon" type="button"
                                        onclick="togglePw('newPw', this)">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                </div>

                                <!-- lỗi new từ server -->
                                <div class="text-danger mt-1" th:if="${errorNew}" th:text="${errorNew}"></div>

                                <!-- lỗi new từ client -->
                                <div class="text-danger mt-1" id="newPwError" style="display:none;"></div>
                            </div>

                            <!-- confirm password -->
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Xác nhận mật khẩu mới</label>
                                <div class="input-group">
                                    <input id="confirmPw" class="form-control" type="password" name="confirmPassword"
                                        placeholder="Nhập lại mật khẩu mới" required>
                                    <button class="btn btn-outline-secondary btn-icon" type="button"
                                        onclick="togglePw('confirmPw', this)">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                </div>

                                <!-- lỗi confirm từ client -->
                                <div class="text-danger mt-1" id="confirmError" style="display:none;"></div>

                                <!-- lỗi confirm từ server -->
                                <div class="text-danger mt-1" th:if="${errorConfirm}" th:text="${errorConfirm}"></div>
                            </div>
                            <div class="alert alert-success py-2 mb-3" th:if="${success}" th:text="${success}"></div>


                            <div class="d-flex gap-2">
                                <button id="submitBtn" type="submit" class="btn btn-warning fw-semibold px-4">
                                    Update Password
                                </button>
                                <a th:href="@{/profile}" class="btn btn-light px-4">
                                    Quay lại
                                </a>
                            </div>
                        </form>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <div th:if="${!(session.roleName == 'SHIPPER' or session.staffType == 'SHIPPER')}"
        th:replace="~{client/layout/footer.djnd}"></div>

    <script th:inline="javascript">
        function togglePw(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector("i");
            const toText = input.type === "password";
            input.type = toText ? "text" : "password";
            if (icon) {
                icon.classList.toggle("fa-eye", !toText);
                icon.classList.toggle("fa-eye-slash", toText);
            }
        }

        (function () {
            const form = document.getElementById("changePasswordForm");

            const oldPw = document.getElementById("oldPw");
            const newPw = document.getElementById("newPw");
            const confirmPw = document.getElementById("confirmPw");

            const oldError = document.getElementById("oldError");
            const confirmError = document.getElementById("confirmError");
            const newPwError = document.getElementById("newPwError");

            const csrfToken = document.getElementById("csrfToken")?.value;
            const csrfHeader = document.getElementById("csrfHeader")?.value;

            function showError(el, msg) {
                if (!el) return;
                el.style.display = "block";
                el.innerText = msg;
            }

            function hideError(el) {
                if (!el) return;
                el.style.display = "none";
                el.innerText = "";
            }

            function validateNewPw() {
                hideError(newPwError);
                if (newPw.value && newPw.value.length < 6) {
                    showError(newPwError, "Mật khẩu mới phải có ít nhất 6 ký tự.");
                    return false;
                }
                return true;
            }

            function validateConfirm() {
                hideError(confirmError);
                if (confirmPw.value && newPw.value !== confirmPw.value) {
                    showError(confirmError, "Mật khẩu xác nhận không khớp.");
                    return false;
                }
                return true;
            }

            async function validateOldAjax() {
                hideError(oldError);

                const val = (oldPw.value || "").trim();
                if (!val) {
                    showError(oldError, "Vui lòng nhập mật khẩu cũ.");
                    return false;
                }

                const body = new URLSearchParams({ oldPassword: val });
                const headers = { "Content-Type": "application/x-www-form-urlencoded" };
                if (csrfHeader && csrfToken) headers[csrfHeader] = csrfToken;

                try {
                    const res = await fetch("/change-password/check-old", { method: "POST", headers, body });
                    if (!res.ok) {
                        showError(oldError, "Không kiểm tra được mật khẩu cũ (CSRF/Server).");
                        return false;
                    }

                    const data = await res.json();
                    if (!data.valid) {
                        showError(oldError, "Mật khẩu cũ không đúng.");
                        oldPw.focus();
                        return false;
                    }
                    return true;
                } catch (e) {
                    showError(oldError, "Không kiểm tra được mật khẩu cũ. Vui lòng thử lại.");
                    return false;
                }
            }

            newPw.addEventListener("input", function () {
                validateNewPw();
                validateConfirm();
            });
            confirmPw.addEventListener("input", validateConfirm);
            oldPw.addEventListener("input", function () {
                hideError(oldError);
            });

            form.addEventListener("submit", async function (e) {
                const okNew = validateNewPw();
                const okConfirm = validateConfirm();

                if (!okNew || !okConfirm) {
                    e.preventDefault();
                    if (!okConfirm) confirmPw.focus();
                    else newPw.focus();
                    return;
                }

                e.preventDefault();
                const okOld = await validateOldAjax();
                if (okOld) form.submit();
            });
        })();
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
