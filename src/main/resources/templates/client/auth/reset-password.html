<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <title>Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #d90429, #ef233c);
            background-size: 200% 200%;
            animation: gradientMove 12s ease infinite;
            font-family: 'Segoe UI', sans-serif;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .wrapper {
            width: 850px;
            max-width: 95%;
            display: flex;
            border-radius: 35px;
            overflow: hidden;
            backdrop-filter: blur(30px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.35);
            transition: 0.3s ease;
        }

        .left-panel {
            flex: 1;
            padding: 60px 40px;
            background: linear-gradient(160deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .left-panel h2 { font-weight: 700; font-size: 32px; }
        .left-panel p { opacity: 0.9; margin-top: 12px; }

        .right-panel {
            flex: 1.2;
            padding: 50px;
            background: rgba(255, 255, 255, 0.2);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.6);
            border: none;
            border-radius: 15px;
            padding: 14px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.2);
        }

        .btn-danger {
            border-radius: 15px;
            background: linear-gradient(135deg, #d90429, #ef233c);
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .btn-danger:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        }

        .hint {
            font-size: 14px;
            opacity: 0.9;
        }

        .back-link a {
            text-decoration: none;
            font-weight: 500;
            color: #111;
        }

        @media(max-width: 768px) {
            .wrapper { flex-direction: column; }
            .left-panel { text-align: center; }
        }
    </style>
</head>

<body>

<div class="wrapper login-card">

    <!-- LEFT -->
    <div class="left-panel">
        <h2>Reset Password</h2>
        <p>Create a new password for your account.</p>

        <p class="hint mt-3" th:if="${email != null}">
            Email: <b th:text="${email}">example@email.com</b>
        </p>
    </div>

    <!-- RIGHT -->
    <div class="right-panel">
        <h3 class="text-center mb-4 fw-bold">New Password</h3>

        <div th:if="${message}" class="alert alert-success text-center">
            <span th:text="${message}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger text-center">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/reset-password}" method="post" onsubmit="return validPassword()">

            <!-- hidden email (hoặc key nào bạn dùng) -->
            <input type="hidden" name="email" th:value="${email}" />

            <div class="form-floating mb-3">
                <input class="form-control"
                       id="password"
                       name="password"
                       type="password"
                       placeholder="Password"
                       required />
                <label>New password</label>
            </div>

            <div class="form-floating mb-3">
                <input class="form-control"
                       id="confirmPassword"
                       name="confirmPassword"
                       type="password"
                       placeholder="Confirm password"
                       required />
                <label>Confirm password</label>
            </div>

            <div id="error-msg" class="mb-3 fw-semibold" style="color:#b00020;"></div>

            <div class="d-grid">
                <button type="submit" class="btn btn-danger">
                    Update Password
                </button>
            </div>

            <div class="back-link text-center mt-3">
                <a th:href="@{/login}">← Back to Login</a>
            </div>

        </form>
    </div>

</div>

<script>
    function validPassword() {
        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirmPassword").value;
        const errorElement = document.getElementById("error-msg");

        if (password.length < 6) {
            errorElement.innerHTML = "Password must be at least 6 characters.";
            return false;
        }

        if (password !== confirm) {
            errorElement.innerHTML = "Password and Confirm password are not the same!";
            return false;
        }

        errorElement.innerHTML = "";
        return true;
    }

    // 3D tilt
    const card = document.querySelector(".login-card");
    card.addEventListener("mousemove", (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const centerX = rect.width / 2;
        const centerY = rect.height / 2;

        const rotateX = ((y - centerY) / 30) * -1;
        const rotateY = (x - centerX) / 30;

        card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
    });

    card.addEventListener("mouseleave", () => {
        card.style.transform = "rotateX(0deg) rotateY(0deg) scale(1)";
    });
</script>

</body>
</html>
