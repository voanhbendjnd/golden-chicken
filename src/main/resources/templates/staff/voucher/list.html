<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Voucher List</title>
    <link rel="stylesheet" th:href="@{/css/voucher.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <head th:replace="~{common/head}"></head>

</head>

<body>
    <div th:replace="~{component/header}"></div>
    <div class="row">
        <div class="col-md-3 col-lg-2 p-0">
            <div th:replace="~{staff/layout/sidebar}"></div>
        </div>
        <main class="col-md-9 col-lg-10 ms-sm-auto px-md-4">
            <div class="container mt-5">


                <h2 class="page-title">Voucher List</h2>
                <div th:if="${success}" class="alert alert-success">
                    <span th:text="${success}"></span>
                </div>

                <div th:if="${error}" class="alert alert-danger">
                    <span th:text="${error}"></span>
                </div>
                <div class="action-bar">
                    <a class="btn btn-primary" th:href="@{/staff/voucher/create}">
                        + Create new voucher
                    </a>
                </div>

                <table class="voucher-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Code</th>
                            <th>Name</th>
                            <th>Status</th>
                            <th>Quantity</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="v : ${vouchers.content}">
                            <td th:text="${v.id}"></td>
                            <td th:text="${v.code}"></td>
                            <td th:text="${v.name}"></td>
                            <td>
                                <span class="status" th:classappend="' ' + ${v.status.toLowerCase()}"
                                    th:text="${v.status}">
                                </span>
                            </td>
                            <td th:text="${v.quantity}"></td>
                            <td class="action-col">
                                <a class="link view" th:href="@{/staff/voucher/detail/{id}(id=${v.id})}">
                                    View
                                </a>
                                <a class="link edit" th:href="@{/staff/voucher/edit/{id}(id=${v.id})}">
                                    Edit
                                </a>
                                <a class="link disable" href="javascript:void(0)"
                                    th:onclick="|openConfirm('disable', ${v.id})|">
                                    Disable
                                </a>

                                <a class="link delete" href="javascript:void(0)"
                                    th:onclick="|openConfirm('delete', ${v.id})|">
                                    Delete
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <nav aria-label="Artist pagination">
                    <ul class="pagination justify-content-center flex-wrap">

                        <!-- Previous -->
                        <li class="page-item"
                            th:classappend="${!vouchers.hasPrevious()} ? 'disabled'">

                            <a class="page-link"
                               th:href="@{/staff/voucher/list(page=${currentPage - 1}, size=${vouchers.size})}">
                                Previous
                            </a>
                        </li>

                        <!-- Page numbers -->
                        <li class="page-item"
                            th:each="i : ${#numbers.sequence(0, vouchers.totalPages - 1)}"
                            th:classappend="${i == currentPage} ? 'active'">

                            <a class="page-link"
                               th:href="@{/staff/voucher/list(page=${i}, size=${vouchers.size})}"
                               th:text="${i + 1}">
                            </a>
                        </li>

                        <!-- Next -->
                        <li class="page-item"
                            th:classappend="${!vouchers.hasNext()} ? 'disabled'">

                            <a class="page-link"
                               th:href="@{/staff/voucher/list(page=${currentPage + 1}, size=${vouchers.size})}">
                                Next
                            </a>
                        </li>

                    </ul>
                </nav>
            </div>
        </main>

    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle"></h3>
            <p id="modalMessage"></p>

            <div class="modal-actions">
                <a id="confirmBtn" class="btn-danger">Confirm</a>
                <button class="btn-secondary" onclick="closeConfirm()">Cancel</button>
            </div>
        </div>
    </div>
    <script th:src="@{/js/voucher.js}"></script>
</body>

</html>
