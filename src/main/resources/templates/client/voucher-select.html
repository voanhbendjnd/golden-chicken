<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Use Voucher</title>
    <link th:href="@{/css/style.djnd.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <meta name="_csrf" th:content="${_csrf.token}" />
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/voucher-client.css}" rel="stylesheet">
</head>

<body>
    <div th:replace="~{client/layout/header.djnd}"></div>

    <main style="padding-top:200px; " class="container">
        <div class="mb-4">
            <a class="btn btn-outline-secondary" th:href="@{/checkout(
                    productId=${productId},
                    ids=${productIds != null ? #strings.listJoin(productIds, ',') : null},
                    orderId=${orderId},
                    quantity=${quantity},
                    addressId=${addressId},
                    orderId=${orderId}
               )}">
                <i class="fa-solid fa-arrow-left"></i> Quay lại thanh toán
            </a>
        </div>

        <h2 class="voucher-title text-center mb-4">Chọn ưu đãi cho đơn hàng của bạn</h2>

        <form th:action="@{/checkout/apply-vouchers}" method="post">
            <input type="hidden" name="productId" th:value="${productId}" />
            <input type="hidden" name="ids"
                th:value="${productIds != null ? #strings.listJoin(productIds, ',') : ''}" />
            <input type="hidden" name="quantity" th:value="${quantity}" />
            <input type="hidden" name="currentPage" th:value="${currentPage}" />
            <input type="hidden" name="addressId" th:value="${addressId}" />
            <input type="hidden" name="orderId" th:value="${orderId}" />

            <div class="row mb-3 align-items-end">
                <div class="col-md-8">
                    <label class="form-label">Nhập mã voucher (chỉ áp voucher đã đổi)</label>
                    <input class="form-control voucher-code-input" type="text" name="voucherCode"
                        placeholder="Nhập mã voucher" />
                </div>
                <div class="col-md-4 d-grid">
                    <button type="submit" class="btn btn-outline-primary">Áp dụng mã</button>
                </div>
            </div>

            <div class="row">
                <div th:each="v : ${vouchers}" class="col-md-4 mb-4">
                    <label class="voucher-card p-3 text-center border rounded shadow-sm d-block"
                        style="cursor: pointer;"
                        th:classappend="${v.voucher != null and v.voucher.minOrderValue != null and orderTotal.compareTo(v.voucher.minOrderValue) < 0} ? ' voucher-disabled'"
                        th:attr="data-type=${v.voucher.voucherType}">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <span class="badge text-dark"
                                th:classappend="${v.voucher.voucherType == 'SHIPPING'} ? ' bg-info' : ' bg-warning'"
                                th:text="${v.voucher.voucherType}">PRODUCT</span>
                            <input class="form-check-input" type="checkbox" name="voucherIds" th:value="${v.id}"
                                th:attr="data-type=${v.voucher.voucherType},data-min-disabled=${v.voucher != null and v.voucher.minOrderValue != null and orderTotal.compareTo(v.voucher.minOrderValue) < 0}"
                                th:disabled="${v.voucher != null and v.voucher.minOrderValue != null and orderTotal.compareTo(v.voucher.minOrderValue) < 0}" />
                        </div>

                        <h3 th:text="${v.voucher.code}" style="color: #ffb524;"></h3>
                        <p class="fw-bold" th:text="${v.voucher.name}"></p>
                        <p class="text-muted small" th:text="${v.voucher.description}"></p>

                        <div th:if="${v.voucher.minOrderValue != null}" class="mb-2">
                            <small class="badge bg-light text-dark">
                                Đơn tối thiểu:
                                [[${#numbers.formatDecimal(v.voucher.minOrderValue,0,'COMMA',0,'POINT')}]]đ
                            </small>
                        </div>
                    </label>
                </div>
            </div>

            <div class="sticky-apply-bar">
                <button type="submit" class="btn btn-primary">Áp dụng voucher</button>
            </div>
        </form>

        <div class="mt-4" th:if="${totalPages > 1}">
            <nav aria-label="Voucher pagination">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                        <a class="page-link"
                            th:href="@{/checkout/vouchers(id=${productId}, ids=${productIds != null ? #strings.listJoin(productIds, ',') : null}, orderId=${orderId}, quantity=${quantity}, addressId=${addressId}, page=${currentPage - 1}, size=${size})}">Trước</a>
                    </li>
                    <li class="page-item" th:each="p : ${#numbers.sequence(1, totalPages)}"
                        th:classappend="${p == currentPage} ? 'active'">
                        <a class="page-link"
                            th:href="@{/checkout/vouchers(id=${productId}, ids=${productIds != null ? #strings.listJoin(productIds, ',') : null}, orderId=${orderId}, quantity=${quantity}, addressId=${addressId}, page=${p}, size=${size})}"
                            th:text="${p}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                        <a class="page-link"
                            th:href="@{/checkout/vouchers(id=${productId}, ids=${productIds != null ? #strings.listJoin(productIds, ',') : null}, orderId=${orderId}, quantity=${quantity}, addressId=${addressId}, page=${currentPage + 1}, size=${size})}">Sau</a>
                    </li>
                </ul>
            </nav>
        </div>

        <script th:src="@{/js/voucher-select.js}"></script>

        <div th:if="${vouchers == null || vouchers.isEmpty()}" class="text-center mt-5">
            <p class="text-muted">Bạn không có mã giảm giá nào khả dụng.</p>
        </div>
    </main>

    <link th:href="@{/css/voucher-select.css}" rel="stylesheet" />

    <div th:replace="~{client/layout/footer.djnd}"></div>
</body>

</html>
