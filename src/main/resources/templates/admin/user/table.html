<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <head th:replace="~{common/head}"></head>
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <title>User Management - Golden Chicken</title>
</head>

<body>
    <div th:replace="~{component/header}"></div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 p-0 sidebar-bg">
                <div th:replace="~{admin/layout/sidebar}"></div>
            </div>
            <main class="col-md-9 col-lg-10 ms-sm-auto px-md-4 py-4">
                <div
                    class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="fas fa-users me-2 text-theme"></i>User Management</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <a th:href="@{/admin/user/create}" class="btn btn-theme shadow-sm">
                            <i class="fas fa-plus me-1"></i> Create New User
                        </a>
                    </div>
                </div>

                <div class="premium-card shadow-sm">
                    <div class="card-header">
                        <div class="row align-items-center">
                            <div class="col">
                                <h5 class="mb-0">User Accounts</h5>
                            </div>
                            <div class="col-auto">
                                <div class="input-group input-group-sm" style="width: 300px;">
                                    <input type="text" id="searchFullName" class="form-control"
                                        placeholder="Search by name..." th:value="${searchName}">
                                    <button class="btn btn-theme" type="button" onclick="handleSearch()">
                                        <i class="fas fa-search"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <!-- Bulk Operations / Import -->
                        <div class="mb-4 p-3 bg-light rounded-3 border border-light-subtle">
                            <h6 class="fw-bold mb-3 small text-uppercase text-muted"><i
                                    class="fas fa-file-import me-2"></i>Bulk Import Users</h6>
                            <form th:action="@{/admin/user/import}" method="post" enctype="multipart/form-data"
                                class="row g-3">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <div class="col-md-8">
                                    <input type="file" name="file" class="form-control form-control-sm"
                                        accept=".xlsx, .xls" required />
                                    <div class="form-text small opacity-75">Required: Email, Password, Full Name,
                                        Role...</div>
                                </div>
                                <div class="col-md-4">
                                    <button type="submit" class="btn btn-sm btn-success w-100">
                                        <i class="fas fa-upload me-1"></i> Import Excel
                                    </button>
                                </div>
                            </form>
                        </div>

                        <div th:if="${errorMessage != null}" class="alert alert-danger shadow-sm border-0 mb-4"
                            role="alert" th:text="${errorMessage}"></div>

                        <div th:if="${users != null and !users.isEmpty()}" class="table-responsive">
                            <table class="table table-hover table-premium">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Account Info</th>
                                        <th>Role / Type</th>
                                        <th>Created</th>
                                        <th>Status</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="user : ${users}">
                                        <td><span class="text-muted fw-bold" th:text="${user.id}">1</span></td>
                                        <td>
                                            <div class="d-flex align-items-center">
                                                <div class="avatar-sm me-3 bg-light text-theme rounded-circle text-center"
                                                    style="width: 32px; height: 32px; line-height:32px;">
                                                    <i class="fas fa-user-circle"></i>
                                                </div>
                                                <div>
                                                    <div class="fw-bold" th:text="${user.fullName}">Name</div>
                                                    <div class="small text-muted" th:text="${user.email}">email</div>
                                                </div>
                                            </div>
                                        </td>
                                        <td>
                                            <span class="badge bg-light text-dark border"
                                                th:text="${user.staffType != null ? user.staffType : 'CUSTOMER'}">Type</span>
                                        </td>
                                        <td class="text-muted small"
                                            th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy')}">Date</td>
                                        <td>
                                            <span th:if="${user.status}"
                                                class="badge-status bg-success-subtle text-success">Active</span>
                                            <span th:unless="${user.status}"
                                                class="badge-status bg-danger-subtle text-danger">Inactive</span>
                                        </td>
                                        <td class="text-end">
                                            <div class="btn-group shadow-sm border rounded">
                                                <a th:href="@{/admin/user/update/{id}(id=${user.id})}"
                                                    class="btn btn-sm btn-white text-info px-3" title="Edit">
                                                    <i class="fas fa-edit"></i>
                                                </a>
                                                <button type="button"
                                                    class="btn btn-sm btn-white text-danger px-3 btn-delete"
                                                    title="Delete">
                                                    <i class="fas fa-trash-alt"></i>
                                                </button>
                                            </div>
                                            <form th:action="@{/admin/user/delete/{id}(id=${user.id})}" method="POST"
                                                class="delete-form d-none">
                                                <input type="hidden" th:name="${_csrf.parameterName}"
                                                    th:value="${_csrf.token}" />
                                            </form>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <!-- Pagination -->
                        <div th:if="${users != null and !users.isEmpty()}"
                            class="d-flex justify-content-between align-items-center mt-4">
                            <span class="small text-muted">Showing page <span th:text="${meta.page}"></span> of <span
                                    th:text="${meta.pages}"></span></span>
                            <nav aria-label="Page navigation">
                                <ul class="pagination pagination-sm mb-0">
                                    <li th:class="|page-item ${meta.page == 1 ? 'disabled' : ''}|">
                                        <a class="page-link shadow-none"
                                            th:href="@{/admin/user(page=${meta.page - 1}, size=${meta.pageSize}, filter=${param.filter})}">Previous</a>
                                    </li>
                                    <li th:each="p : ${#numbers.sequence(1, meta.pages)}"
                                        th:class="|page-item ${meta.page == p ? 'active' : ''}|">
                                        <a class="page-link shadow-none"
                                            th:classappend="${meta.page == p} ? 'bg-theme border-theme text-white' : ''"
                                            th:href="@{/admin/user(page=${p}, size=${meta.pageSize}, filter=${param.filter})}"
                                            th:text="${p}"></a>
                                    </li>
                                    <li th:class="|page-item ${meta.page == meta.pages ? 'disabled' : ''}|">
                                        <a class="page-link shadow-none"
                                            th:href="@{/admin/user(page=${meta.page + 1}, size=${meta.pageSize}, filter=${param.filter})}">Next</a>
                                    </li>
                                </ul>
                            </nav>
                        </div>

                        <div th:if="${users == null or users.isEmpty()}" class="text-center py-5">
                            <div class="display-1 text-light"><i class="fas fa-search"></i></div>
                            <p class="text-muted mt-3">No users found matching your criteria.</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function handleSearch() {
            const name = document.getElementById("searchFullName").value;
            const urlParams = new URLSearchParams(window.location.search);

            if (name && name.trim() !== "") {
                urlParams.set('filter', "fullName ~~ '" + name.trim() + "'");
            } else {
                urlParams.delete('filter');
            }

            urlParams.set('page', '1');

            window.location.href = window.location.pathname + "?" + urlParams.toString();
        }
        document.getElementById("searchFullName").addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                handleSearch();
            }
        });

        function handleOnClick() {
            alert("Click Me");
        }
        document.querySelectorAll('.btn-delete').forEach(button => {
            button.addEventListener('click', function () {
                const form = this.closest('.delete-form');
                Swal.fire({
                    title: 'Bạn chắc chắn muốn xóa?',
                    text: "Nếu tài khoản chứa có liên quan tới giỏ hàng và đơn hàng thì sẽ chuyển sang trạng thái inactive!",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#d33',
                    cancelButtonColor: '#3085d6',
                    confirmButtonText: 'Đồng ý',
                    cancelButtonText: 'Hủy',
                    reverseButtons: true
                }).then((result) => {
                    if (result.isConfirmed) {
                        form.submit();
                    }
                });
            });
        });
    </script>
</body>

</html>
