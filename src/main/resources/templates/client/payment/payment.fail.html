<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Thanh toán thành công</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* ===== BACKGROUND GIỐNG LOGIN ===== */
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", sans-serif;
            background: url('/img/register.jpg') no-repeat center center/cover;
            position: relative;
        }

        /* Overlay tối */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 0;
        }

        /* ===== GLASS CARD ===== */
        .success-card {
            position: relative;
            z-index: 1;
            width: 95%;
            max-width: 480px;
            padding: 50px 40px;
            text-align: center;
            border-radius: 25px;

            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);

            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            transition: 0.3s ease;
        }

        .success-card:hover {
            transform: scale(1.03);
        }

        /* ===== CHECK ICON ===== */
        .check-circle {
            width: 100px;
            height: 100px;
            margin: 0 auto 25px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00c853, #69f0ae);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0, 200, 83, 0.5);
            animation: pop 0.6s ease;
        }

        .check-circle svg {
            width: 50px;
            height: 50px;
            fill: white;
        }

        h1 {
            color: white;
            font-size: 26px;
            margin-bottom: 10px;
        }

        p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            margin-bottom: 35px;
        }

        /* ===== BUTTON ===== */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-custom {
            padding: 12px;
            border-radius: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .btn-primary-custom {
            background: #d3bead;
            color: #000;
        }

        .btn-primary-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        .btn-outline-custom {
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }

        .btn-outline-custom:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: translateY(-3px);
        }

        @keyframes pop {
            0% {
                transform: scale(0.6);
            }

            80% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        @media (min-width: 768px) {
            .btn-group {
                flex-direction: row;
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <div class="success-card">

        <div class="check-circle">
            <svg viewBox="0 0 24 24">
                <path d="M9 16.2l-3.5-3.5L4 14.2l5 5 11-11-1.5-1.5z" />
            </svg>
        </div>

        <h1 style="color: red;">Thanh toán thất bại!</h1>
        <p>Đặt hàng không thành công.</p>

        <div class="btn-group">
            <a href="/home" class="btn-custom btn-primary-custom">
                Tiếp tục mua hàng
            </a>

            <a href="/order-history" class="btn-custom btn-outline-custom">
                Xem đơn hàng
            </a>
        </div>

    </div>

</body>

</html>
