<head th:replace="~{common/head}"></head>
<link th:href="@{/css/dashboard.css}" rel="stylesheet">
<link th:href="@{/css/voucher.css}" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
<title>Voucher Management - Golden Chicken</title>
</head>

<body>
    <div th:replace="~{component/header}"></div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 p-0 sidebar-bg">
                <div th:replace="~{staff/layout/sidebar}"></div>
            </div>
            <main class="col-md-9 col-lg-10 ms-sm-auto px-md-4 py-4">
                <div
                    class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="fas fa-ticket-alt me-2 text-theme"></i>Quản lý voucher</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <a th:href="@{/staff/voucher/create}" class="btn btn-theme shadow-sm">
                            <i class="fas fa-plus me-1"></i> Tạo mới
                        </a>
                    </div>
                </div>

                <div th:if="${success}" class="alert alert-success shadow-sm border-0 mb-4" role="alert">
                    <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
                </div>
                <div th:if="${error}" class="alert alert-danger shadow-sm border-0 mb-4" role="alert">
                    <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
                </div>

                <div class="premium-card shadow-sm">
                    <div class="card-header">
                        <div class="row align-items-center">
                            <div class="col">
                                <h5 class="mb-0">Voucher có sẳn</h5>
                            </div>
                            <div class="col-auto">
                                <div class="input-group input-group-sm" style="width: 300px;">
                                    <input type="text" id="searchCode" class="form-control"
                                        placeholder="Tìm bằng code..." th:value="${searchCode}">
                                    <button class="btn btn-theme" type="button" onclick="handleSearch()">
                                        <i class="fas fa-search"></i>
                                    </button>
                                    <button class="btn btn-secondary" type="button" onclick="clearSearch()">
                                        Tạo mới
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover table-premium">
                            <thead>
                                <tr>
                                    <th style="width: 80px;">ID</th>
                                    <th style="width: 150px;">Code</th>
                                    <th>Tên</th>
                                    <th>Trạng thái</th>
                                    <th>Số lượng</th>
                                    <th class="text-end" style="width: 250px;">Hàng động</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="v : ${vouchers.content}">
                                    <td><span class="text-muted fw-bold" th:text="${v.id}">1</span></td>
                                    <td><code><span class="text-primary fw-bold" th:text="${v.code}">CODE123</span></code>
                                    </td>
                                    <td class="fw-bold text-dark" th:text="${v.name}">Voucher Name</td>
                                    <td>
                                        <span th:if="${v.status == 'ACTIVE'}"
                                            class="badge-status bg-success-subtle text-success"
                                            th:text="${v.status}">ACTIVE</span>
                                        <span th:if="${v.status == 'DISABLED'}"
                                            class="badge-status bg-warning-subtle text-warning"
                                            th:text="${v.status}">DISABLED</span>
                                        <span th:if="${v.status == 'EXPIRED'}"
                                            class="badge-status bg-danger-subtle text-danger"
                                            th:text="${v.status}">EXPIRED</span>
                                        <span
                                            th:unless="${v.status == 'ACTIVE' or v.status == 'DISABLED' or v.status == 'EXPIRED'}"
                                            class="badge-status bg-light text-dark" th:text="${v.status}">STATUS</span>
                                    </td>
                                    <td>
                                        <div class="d-flex align-items-center">
                                            <i class="fas fa-box-open text-muted me-2 small"></i>
                                            <span th:text="${v.quantity}">100</span>
                                        </div>
                                    </td>
                                    <td class="text-end">
                                        <div class="btn-group shadow-sm border rounded">
                                            <a th:href="@{/staff/voucher/detail/{id}(id=${v.id})}"
                                                class="btn btn-sm btn-white text-primary px-3" title="View">
                                                <i class="fas fa-eye"></i>
                                            </a>
                                            <a th:href="@{/staff/voucher/edit/{id}(id=${v.id})}"
                                                class="btn btn-sm btn-white text-info px-3" title="Edit">
                                                <i class="fas fa-edit"></i>
                                            </a>
                                            <button type="button" th:onclick="|openConfirm('disable', ${v.id})|"
                                                class="btn btn-sm btn-white text-warning px-3" title="Disable">
                                                <i class="fas fa-ban"></i>
                                            </button>
                                            <button type="button" th:onclick="|openConfirm('delete', ${v.id})|"
                                                class="btn btn-sm btn-white text-danger px-3" title="Delete">
                                                <i class="fas fa-trash-alt"></i>
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <div class="d-flex justify-content-between align-items-center mt-4" th:if="${emptyList == 'yes'}">
                        <span class="small text-muted">Showing page <span th:text="${currentPage + 1}"></span> of
                            <span th:text="${vouchers.totalPages}"></span></span>
                        <nav aria-label="Voucher pagination">
                            <ul class="pagination pagination-sm mb-0">
                                <li class="page-item" th:classappend="${!vouchers.hasPrevious()} ? 'disabled'">
                                    <a class="page-link shadow-none"
                                        th:href="@{/staff/voucher/list(page=${currentPage - 1}, size=${vouchers.size})}">
                                        Previous
                                    </a>
                                </li>
                                <li class="page-item" th:each="i : ${#numbers.sequence(0, vouchers.totalPages - 1)}"
                                    th:classappend="${i == currentPage} ? 'active'">
                                    <a class="page-link shadow-none"
                                        th:classappend="${i == currentPage} ? 'bg-theme border-theme text-white' : ''"
                                        th:href="@{/staff/voucher/list(page=${i}, size=${vouchers.size})}"
                                        th:text="${i + 1}">
                                    </a>
                                </li>
                                <li class="page-item" th:classappend="${!vouchers.hasNext()} ? 'disabled'">
                                    <a class="page-link shadow-none"
                                        th:href="@{/staff/voucher/list(page=${currentPage + 1}, size=${vouchers.size})}">
                                        Next
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
        </div>
        </main>
    </div>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle"></h3>
            <p id="modalMessage"></p>

            <div class="modal-actions">
                <a id="confirmBtn" class="btn-danger">Xác nhận</a>
                <button class="btn-secondary" onclick="closeConfirm()">Dừng</button>
            </div>
        </div>
    </div>
    <script th:src="@{/js/voucher.js}"></script>
    <script>
        function handleSearch() {
            const searchValue = document.getElementById("searchCode").value.trim();

            const url = new URL(window.location.href);

            if (searchValue) {
                url.searchParams.set("searchCode", searchValue);
            } else {
                url.searchParams.delete("searchCode");
            }


            url.searchParams.set("page", 0);

            window.location.href = url.toString();
        }
        function clearSearch() {
            const url = new URL(window.location.href);
            url.searchParams.delete("searchCode");
            url.searchParams.set("page", 0);
            window.location.href = url.toString();
        }


        document.getElementById("searchCode").addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                handleSearch();
            }
        });
    </script>
</body>

</html>
