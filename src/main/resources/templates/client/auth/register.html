<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* ===== BACKGROUND ===== */
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('/img/register.jpg') no-repeat center center/cover;
            font-family: 'Segoe UI', sans-serif;
            position: relative;
        }

        /* Overlay tối */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 0;
        }

        /* ===== CARD ===== */
        .register-wrapper {
            width: 420px;
            padding: 40px;
            border-radius: 25px;
            backdrop-filter: blur(25px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            transition: 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .register-wrapper:hover {
            transform: scale(1.03);
        }

        h3 {
            font-weight: 700;
            color: #fff;
        }

        /* ===== INPUT ===== */
        .form-control {
            background: rgba(255, 255, 255, 0.4);
            border: none;
            border-radius: 15px;
            padding: 14px;
            color: #fff;
        }

        .form-control::placeholder {
            color: #eee;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.3);
            color: #000;
        }

        label {
            color: #000000 !important;
            font-weight: 500;
        }

        /* ===== BUTTON ===== */
        .btn-custom {
            border-radius: 15px;
            background: #e9c3a3;
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .btn-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        /* Link */
        .login-link a {
            color: #fff;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        #error-msg {
            color: #ffb3b3;
        }
    </style>
</head>

<body>

    <div class="register-wrapper login-card">

        <h3 class="text-center mb-4">Create Account</h3>

        <form th:action="@{/register}" method="post" th:object="${registerUser}" onsubmit="return validPassword()">

            <div class="form-floating mb-3">
                <input class="form-control" th:field="*{fullName}" placeholder="Full name">
                <label>Full name</label>
            </div>

            <div class="form-floating mb-3">
                <input th:class="'form-control' + (${#fields.hasErrors('email')} ? ' is-invalid' : '')"
                    th:field="*{email}" type="email" placeholder="name@example.com" />
                <label for="inputEmail">Email</label>
                <div th:if="${#fields.hasErrors('email')}" class="invalid-feedback" th:errors="*{email}"
                    style="color: #000; font-style: italic; margin-left: 10px;"></div>
            </div>

            <div class="form-floating mb-3">
                <input class="form-control" th:field="*{password}" id="password" type="password" placeholder="Password">
                <label>Password</label>
            </div>

            <div class="form-floating mb-3">
                <input class="form-control" th:field="*{confirmPassword}" id="confirmPassword" type="password"
                    placeholder="Confirm Password">
                <label>Confirm Password</label>
            </div>

            <div id="error-msg" class="mb-3 fw-semibold"></div>

            <div class="d-grid">
                <button type="submit" class="btn btn-custom">
                    Create Account
                </button>
            </div>

            <div class="login-link text-center mt-3">
                <a th:href="@{/login}">
                    Already have an account? Login
                </a>
            </div>

        </form>
    </div>

    <script>
        function validPassword() {
            var password = document.getElementById("password").value;
            var confirm = document.getElementById("confirmPassword").value;
            var errorElement = document.getElementById("error-msg");

            if (password !== confirm) {
                errorElement.innerHTML = "Password and Confirm password are not the same!";
                return false;
            }
            return true;
        }

        // 3D Tilt Effect
        const card = document.querySelector(".login-card");

        card.addEventListener("mousemove", (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const centerX = rect.width / 2;
            const centerY = rect.height / 2;

            const rotateX = ((y - centerY) / 25) * -1;
            const rotateY = (x - centerX) / 25;

            card.style.transform =
                `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.03)`;
        });

        card.addEventListener("mouseleave", () => {
            card.style.transform = "rotateX(0deg) rotateY(0deg) scale(1)";
        });
    </script>

</body>

</html>
