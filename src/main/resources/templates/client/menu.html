<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Thực đơn - Golden Chicken</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}" />

    <link rel="stylesheet" th:href="@{/css/menudjnd.css}">
    <script th:src="@{/js/menu.js}"></script>
    <link rel="shortcut icon" th:href="@{/img/favicon_New.png}" type="image/x-icon">
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.djnd.css}" rel="stylesheet">
</head>

<body>

    <!-- HEADER -->
    <div th:replace="~{client/layout/header.djnd}"></div>

    <section class="menu-page section container">
        <div class="container-fluid py-4">

            <h1 class="menu-title text-center">THỰC ĐƠN</h1>

            <!-- DANH MỤC -->
            <div class="category-block" th:each="block : ${categoryProductList}">

                <h2 class="category-name" th:text="${block.categoryName}" style="color: #b00020;">
                    Danh mục
                </h2>

                <div class="row product-list g-4">

                    <!-- SẢN PHẨM -->
                    <div class="col-6 col-md-4 col-lg-3" th:each="product : ${block.products}">
                        <a th:href="@{/product/{id}(id=${product.id})}" style="text-decoration-line:none;">
                            <div class="product-card">

                                <!-- IMAGE (SỬA CHUẨN DTO) -->
                                <img class="product-card__img" th:src="@{'/images/products/' + ${product.img}}"
                                    th:alt="${product.name}">


                                <div class="product-card__body">
                                    <h3 class="product-card__name" th:text="${product.name}">
                                        Tên món
                                    </h3>

                                    <p class="product-card__price"
                                        th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')} + ' ₫'">
                                        0 ₫
                                    </p>

                                    <p class="product-card__desc" th:if="${product.description}"
                                        th:text="${product.description}">
                                        Mô tả
                                    </p>
                                </div>

                                <a class="btn-default btn-danger btn-order" style="text-decoration-line: none;"
                                    th:href="@{/checkout?id={id}(id=${product.id})}">
                                    Mua ngay
                                </a>
                                <div class="product-card__action mt-3 d-flex gap-2 align-items-center"
                                    th:if="${product.type.name() != 'MYSTERY'}">
                                    <button class="btn-default btn-warning flex-grow-1 btn-add-to-cart"
                                        th:data-id="${product.id}">
                                        Thêm vào giỏ hàng
                                    </button>

                                    <div class="input-group quantity-selector shadow-sm" style="width: 130px;">
                                        <button class="btn btn-outline-secondary btn-minus" type="button">-</button>
                                        <input type="number" class="form-control text-center input-qty" value="1"
                                            min="1" max="33" th:id="'qty-' + ${product.id}" style="width: auto;">
                                        <button class="btn btn-outline-secondary btn-plus" type="button">+</button>
                                    </div>
                                </div>

                            </div>
                        </a>

                    </div>
                    <!-- END PRODUCT -->

                </div>
            </div>
            <!-- END CATEGORY -->

            <!-- KHÔNG CÓ DỮ LIỆU -->
            <div class="text-center py-5" th:if="${#lists.isEmpty(categoryProductList)}">
                <p class="text-muted">Chưa có sản phẩm nào trong thực đơn.</p>
            </div>

        </div>
    </section>

    <!-- FOOTER -->
    <div th:replace="~{client/layout/footer.djnd}"></div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>

    </script>

</body>

</html>
