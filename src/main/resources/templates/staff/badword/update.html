<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Update Badword Page</title>

    <head th:replace="~{common/head}"></head>
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h3 class="text-center">Cập Nhật</h3>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/staff/badword/update}" method="post" th:object="${badword}" id="updateForm">
                            <input type="hidden" id="applyFromNowOn" th:field="*{applyFromNowOn}">
                            <div class="mb-3">
                                <input type="hidden" th:field="*{id}" />
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Từ</label>
                                <input type="text" class="form-control" th:field="*{word}" required />
                                <div th:if="${#fields.hasErrors('word')}" style="color: red;" th:errors="*{word}"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Trạng thái</label>
                                <select th:field="*{status}" class="form-select">
                                    <option value="true">Hoạt động</option>
                                    <option value="false">Không hoạt động</option>
                                </select>
                                <div th:if="${#fields.hasErrors('status')}" style="color: red;" th:errors="*{status}">
                                </div>
                                <div th:if="${errorMessage != null}" class="alert alert-danger"
                                    th:text="${errorMessage}">
                                </div>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a th:href="@{/staff/badword}" class="btn btn-secondary me-md-2">Hủy</a>
                                <button type="button" onclick="handleSubmit()" class="btn btn-primary">Cập Nhật</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        function handleSubmit() {
            const form = document.getElementById('updateForm');
            const word = document.querySelector('input[name="word"]').value;

            if (!word || word.trim() === "") {
                form.reportValidity();
                return;
            }

            Swal.fire({
                title: 'Xác nhận phạm vi áp dụng',
                html: `
                    <p>Bạn muốn áp dụng các thay đổi này từ lúc nào?</p>
                    <hr>
                    <div class="text-start">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="applyChoice" id="applyOld" value="true" checked>
                            <label class="form-check-label" for="applyOld">
                                Từ trước đến nay (Quét toàn bộ review cũ)
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="applyChoice" id="applyNew" value="false">
                            <label class="form-check-label" for="applyNew">
                                Chỉ từ sau lúc này
                            </label>
                        </div>
                    </div>
                `,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#3085d6',
                cancelButtonColor: '#aaa',
                confirmButtonText: 'Tiếp tục',
                cancelButtonText: 'Hủy',
                reverseButtons: true,
                preConfirm: () => {
                    return document.querySelector('input[name="applyChoice"]:checked').value;
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    document.getElementById('applyFromNowOn').value = result.value;
                    form.submit();
                }
            });
        }
    </script>
</body>

</html>
