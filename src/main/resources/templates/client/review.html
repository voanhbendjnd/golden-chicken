<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Đánh giá sản phẩm - Golden Chicken</title>
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> -->
    <link th:href="@{/css/style.djnd.css}" rel="stylesheet">
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <meta name="_csrf" th:content="${_csrf.token}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        .review-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            /* border: 1px solid #ddd; */
            border-radius: 8px;
            font-family: Arial, sans-serif;
        }

        .product-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .product-info img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
        }

        /* CSS cho hệ thống chọn Sao đánh giá */
        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            /* Đảo ngược để dùng CSS ~ select */
            justify-content: flex-end;
            gap: 5px;
        }

        .star-rating input[type="radio"] {
            display: none;
            /* Giấu nút radio gốc đi */
        }

        .star-rating label {
            font-size: 30px;
            color: #ccc;
            cursor: pointer;
            transition: color 0.2s;
        }

        .star-rating label:hover,
        .star-rating label:hover~label,
        .star-rating input[type="radio"]:checked~label {
            color: #ffc107;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            resize: vertical;
        }

        .btn-submit {
            background-color: #e52b34;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .btn-submit:hover {
            background-color: #cc222a;
        }
    </style>
</head>

<body>
    <div th:replace="~{client/layout/header.djnd}"></div>

    <div class="review-container" style="padding-top: 150px; margin-top: 30px;">
        <h2>Đánh giá sản phẩm</h2>

        <div class="product-info">
            <img th:src="@{'/images/products/' + ${product.img}}" alt="Sản phẩm">
            <div class="product-name" th:text="${product.name}">Tên món gà</div>
        </div>

        <form th:action="@{/review/submit}" method="post" enctype="multipart/form-data" th:object="${review}">

            <input type="hidden" name="orderItemId" th:value="${orderItemId}" />

            <div class="form-group">
                <label><strong>Chất lượng sản phẩm:</strong></label>
                <div class="star-rating">
                    <input type="radio" id="star5" th:field="*{rating}" value="5" required />
                    <label for="star5" title="Tuyệt vời"><i class="fa-solid fa-star"></i></label>

                    <input type="radio" id="star4" th:field="*{rating}" value="4" />
                    <label for="star4" title="Rất tốt"><i class="fa-solid fa-star"></i></label>

                    <input type="radio" id="star3" th:field="*{rating}" value="3" />
                    <label for="star3" title="Bình thường"><i class="fa-solid fa-star"></i></label>

                    <input type="radio" id="star2" th:field="*{rating}" value="2" />
                    <label for="star2" title="Tệ"><i class="fa-solid fa-star"></i></label>

                    <input type="radio" id="star1" th:field="*{rating}" value="1" />
                    <label for="star1" title="Rất tệ"><i class="fa-solid fa-star"></i></label>
                </div>
                <p th:if="${#fields.hasErrors('rating')}" th:errors="*{rating}" style="color:red; font-size: 0.8rem;">
                </p>
            </div>

            <div class="form-group">
                <label for="comment"><strong>Chia sẻ cảm nhận của bạn:</strong></label>
                <textarea id="comment" th:field="*{comment}" rows="4"
                    placeholder="Món gà này hương vị thế nào? (Không bắt buộc)"></textarea>
            </div>

            <div class="form-group">
                <label for="files"><strong>Thêm hình ảnh / video (Tối đa 5 mục):</strong></label>
                <br>
                <input type="file" id="files" name="files" multiple accept="image/*,video/*"
                    style="margin-top: 10px;" />
            </div>

            <button type="submit" class="btn-submit">Hoàn Thành Đánh Giá</button>
        </form>
    </div>
    <div th:replace="~{client/layout/footer.djnd}"></div>
</body>

</html>
