<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Golden Chicken - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        /* ===== BACKGROUND IMAGE ===== */
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('/img/register.jpg') no-repeat center center/cover;
            font-family: 'Segoe UI', sans-serif;
            position: relative;
        }

        /* Overlay tối */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 0;
        }

        /* ===== GLASS CARD ===== */
        .login-card {
            width: 420px;
            padding: 40px;
            border-radius: 25px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 1;
            transition: 0.3s ease;
        }

        .login-card:hover {
            transform: scale(1.03);
        }

        h3 {
            color: #fff;
            font-weight: 700;
        }

        /* ===== INPUT ===== */
        .form-control {
            border-radius: 15px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.4);
            border: none;
            color: #fff;
        }

        .form-control::placeholder {
            color: #eee;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.3);
            color: #000;
        }

        /* ===== BUTTON ===== */
        .btn-login {
            border-radius: 15px;
            padding: 12px;
            font-weight: 600;
            border: none;
            background: #e9c3a3;
            transition: 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        /* ===== LINKS ===== */
        .link-style {
            text-decoration: none;
            color: #fff;
            font-weight: 500;
        }

        .link-style:hover {
            text-decoration: underline;
        }

        /* ===== ALERT ===== */
        .alert {
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.7);
            border: none;
        }

        /* ===== PASSWORD TOGGLE ===== */
        .input-group .btn-toggle-pw {
            background: rgba(255, 255, 255, 0.3);
            border: none;
            border-radius: 0 15px 15px 0;
            color: #fff;
            padding: 0 14px;
            transition: background 0.2s;
        }

        .input-group .btn-toggle-pw:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .input-group .form-control {
            border-radius: 15px 0 0 15px !important;
        }
    </style>
</head>

<body>

    <div class="login-card">

        <h3 class="text-center mb-4">Đăng Nhập</h3>

        <form method="post" th:action="@{/login}">

            <div th:if="${param.error != null}" class="alert alert-danger">
                <span
                    th:if="${session != null and session.SPRING_SECURITY_LAST_EXCEPTION != null and session.SPRING_SECURITY_LAST_EXCEPTION.message == 'Account has locked!'}">Tài
                    khoản của bạn đã bị khóa do nhập sai nhiều lần! Vui lòng thử lại sau!</span>
                <span
                    th:if="${session != null and session.SPRING_SECURITY_LAST_EXCEPTION != null and session.SPRING_SECURITY_LAST_EXCEPTION.message == 'Account has locked when review!'}">Tài
                    khoản của bạn đã bị khóa do dùng từ ngữ vi phạm tiêu chuẩn cộng đồng!</span>
                <span
                    th:unless="${session != null and session.SPRING_SECURITY_LAST_EXCEPTION != null and session.SPRING_SECURITY_LAST_EXCEPTION.message == 'Account has locked!' or session.SPRING_SECURITY_LAST_EXCEPTION.message == 'Account has locked when review!'}">Email
                    hoặc mật khẩu không đúng!</span>
            </div>

            <div th:if="${param.logout != null}" class="alert alert-success">
                Đăng xuất thành công!
            </div>

            <div class="mb-3">
                <input class="form-control" type="email" name="username" placeholder="Enter your email" required />
            </div>

            <div class="mb-3">
                <div class="input-group">
                    <input class="form-control" type="password" id="loginPassword" name="password"
                        placeholder="Enter your password" required />
                    <button type="button" class="btn-toggle-pw" onclick="toggleLoginPw()" tabindex="-1">
                        <i id="loginEyeIcon" class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="d-grid mb-3">
                <button class="btn btn-login">
                    Đăng Nhập
                </button>
            </div>

            <div class="text-center mb-2">
                <a th:href="@{/forgot-password-v2}" class="link-style">
                    Quên mật khẩu
                </a>
            </div>

            <div class="text-center">
                <a th:href="@{/register}" class="link-style">Bạn chưa có tài khoản? Đăng ký</a>

            </div>

        </form>
    </div>

    <script>
        function toggleLoginPw() {
            const input = document.getElementById('loginPassword');
            const icon = document.getElementById('loginEyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }
    </script>

</body>

</html>
