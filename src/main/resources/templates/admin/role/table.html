<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <head th:replace="~{common/head}"></head>
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <title>Quản lý vai trò - Golden Chicken</title>
</head>

<body>
    <div th:replace="~{component/header}"></div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 p-0 sidebar-bg">
                <div th:replace="~{admin/layout/sidebar}"></div>
            </div>
            <main class="col-md-9 col-lg-10 ms-sm-auto px-md-4 py-4">
                <div
                    class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="fas fa-user-tag me-2 text-theme"></i>Quản lý vai trò</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <a th:href="@{/admin/role/create}" class="btn btn-theme shadow-sm">
                            <i class="fas fa-plus me-1"></i> Tạo vai trò mới
                        </a>
                    </div>
                </div>

                <div class="premium-card shadow-sm">
                    <div class="card-header">
                        <div class="row align-items-center">
                            <div class="col">
                                <h5 class="mb-0">Vai trò truy cập</h5>
                            </div>
                            <div class="col-auto">
                                <div class="input-group input-group-sm" style="width: 250px;">
                                    <input type="text" id="searchName" class="form-control"
                                        placeholder="Tìm kiếm theo tên..." th:value="${searchName}">
                                    <button class="btn btn-theme" type="button" onclick="handleSearch()">
                                        <i class="fas fa-search"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <!-- Import Section -->
                        <!-- <div class="mb-4 p-3 bg-light rounded-3 border border-light-subtle">
                            <h6 class="fw-bold mb-3 small text-uppercase text-muted"><i
                                    class="fas fa-file-import me-2"></i>Nhập vai trò hàng loạt</h6>
                            <form th:action="@{/admin/role/import}" method="post" enctype="multipart/form-data"
                                class="row g-3">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <div class="col-md-8">
                                    <input type="file" name="file" class="form-control form-control-sm"
                                        accept=".xlsx, .xls" required />
                                    <div class="form-text small">Định dạng Excel: Tên, Mô tả</div>
                                </div>
                                <div class="col-md-4">
                                    <button type="submit" class="btn btn-sm btn-success w-100">
                                        <i class="fas fa-upload me-1"></i> Nhập từ Excel
                                    </button>
                                </div>
                            </form>
                        </div> -->

                        <div th:if="${errorMessage != null}" class="alert alert-danger shadow-sm border-0 mb-4"
                            role="alert" th:text="${errorMessage}"></div>
                        <div th:if="${msgWarning != null}" class="alert alert-warning shadow-sm border-0 mb-4"
                            role="alert" th:text="${msgWarning}"></div>
                        <div th:if="${roles != null and !roles.isEmpty()}" class="table-responsive">
                            <table class="table table-hover table-premium">
                                <thead>
                                    <tr>
                                        <th style="width: 80px;">ID</th>
                                        <th style="width: 200px;">Tên</th>
                                        <th>Mô tả</th>
                                        <th class="text-end" style="width: 150px;">Hành động</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="role : ${roles}">
                                        <td><span class="text-muted fw-bold" th:text="${role.id}">1</span></td>
                                        <td>
                                            <div class="d-flex align-items-center">
                                                <i class="fas fa-id-badge text-theme me-2"></i>
                                                <span class="fw-bold" th:text="${role.name}">ADMIN</span>
                                            </div>
                                        </td>
                                        <td class="text-muted" th:text="${role.description}">Role description here</td>
                                        <td class="text-end">
                                            <div class="btn-group shadow-sm border rounded">
                                                <a th:href="@{/admin/role/update/{id}(id=${role.id})}"
                                                    class="btn btn-sm btn-white text-info px-3" title="Sửa">
                                                    <i class="fas fa-edit"></i>
                                                </a>
                                                <button type="button"
                                                    class="btn btn-sm btn-white text-danger px-3 btn-delete"
                                                    title="Xóa">
                                                    <i class="fas fa-trash-alt"></i>
                                                </button>
                                                <form th:action="@{/admin/role/delete/{id}(id=${role.id})}"
                                                    method="POST" class="delete-form d-none">
                                                    <input type="hidden" th:name="${_csrf.parameterName}"
                                                        th:value="${_csrf.token}" />
                                                </form>

                                            </div>

                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <!-- Pagination -->
                        <div th:if="${roles != null and !roles.isEmpty()}"
                            class="d-flex justify-content-between align-items-center mt-4">
                            <span class="small text-muted">Hiển thị trang <span th:text="${meta.page}"></span> trên
                                <span th:text="${meta.pages}"></span></span>
                            <nav aria-label="Page navigation">
                                <ul class="pagination pagination-sm mb-0">
                                    <li th:class="|page-item ${meta.page == 1 ? 'disabled' : ''}|">
                                        <a class="page-link shadow-none"
                                            th:href="@{/admin/role(page=${meta.page - 1}, size=${meta.pageSize}, filter=${param.filter})}">Trang
                                            trước</a>
                                    </li>
                                    <li th:each="p : ${#numbers.sequence(1, meta.pages)}"
                                        th:class="|page-item ${meta.page == p ? 'active' : ''}|">
                                        <a class="page-link shadow-none"
                                            th:classappend="${meta.page == p} ? 'bg-theme border-theme text-white' : ''"
                                            th:href="@{/admin/role(page=${p}, size=${meta.pageSize}, filter=${param.filter})}"
                                            th:text="${p}"></a>
                                    </li>
                                    <li th:class="|page-item ${meta.page == meta.pages ? 'disabled' : ''}|">
                                        <a class="page-link shadow-none"
                                            th:href="@{/admin/role(page=${meta.page + 1}, size=${meta.pageSize}, filter=${param.filter})}">Trang
                                            sau</a>
                                    </li>
                                </ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.btn-delete').forEach(button => {
            button.addEventListener('click', function () {
                const form = this.nextElementSibling;

                Swal.fire({
                    title: 'Bạn có chắc chắn muốn xóa?',
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#d33',
                    cancelButtonColor: '#3085d6',
                    confirmButtonText: 'Đồng ý',
                    cancelButtonText: 'Hủy',
                    reverseButtons: true
                }).then((result) => {
                    if (result.isConfirmed) {
                        form.submit();
                    }
                });
            });
        });
        function handleSearch() {
            const name = document.getElementById("searchName").value;
            const urlParams = new URLSearchParams(window.location.search);

            if (name && name.trim() !== "") {
                urlParams.set('filter', "name ~~ '" + name.trim() + "'");
            } else {
                urlParams.delete('filter');
            }

            urlParams.set('page', '1');

            window.location.href = window.location.pathname + "?" + urlParams.toString();
        }
        document.getElementById("searchName").addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                handleSearch();
            }
        });
    </script>
</body>

</html>
