<header class="p-3 premium-navbar sticky-top" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="container-fluid px-4">
        <div class="d-flex flex-wrap align-items-center justify-content-between">
            <div class="d-flex align-items-center">
                <a th:href="@{/}" class="d-flex align-items-center mb-2 mb-lg-0 text-decoration-none">
                    <i class="fas fa-drumstick-bite text-warning fs-3 me-2"></i>
                    <span class="fw-bold fs-4 text-dark">Golden <span class="text-warning">Chicken</span></span>
                </a>
            </div>

            <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0 ms-lg-5">
                <li><a th:href="@{/}" class="nav-link px-3">Storefront</a></li>
                <li><a th:href="@{/staff/dashboard}" class="nav-link px-3">Management Dashboard</a></li>
            </ul>

            <div class="d-flex align-items-center gap-3">
                <div class="dropdown text-end">
                    <a href="#" class="d-block link-dark text-decoration-none dropdown-toggle border-0 bg-transparent p-0" id="dropdownUser1" data-bs-toggle="dropdown" aria-expanded="false">
                        <span class="me-2 fw-medium d-none d-sm-inline" th:text="${session.fullName ?: 'Account'}">User</span>
                        <i class="fas fa-user-circle fs-4 text-secondary"></i>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2" aria-labelledby="dropdownUser1">
                        <li><a class="dropdown-item py-2" th:href="@{/profile}"><i class="fas fa-id-card me-2 opacity-50"></i> Profile</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post" class="px-0 py-0 m-0">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="dropdown-item py-2 text-danger bg-transparent border-0 w-100 text-start">
                                    <i class="fas fa-sign-out-alt me-2"></i> Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</header>
<div th:replace="~{component/chat-widget :: chat-widget}"></div>
