<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Thanh toán thành công</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* ===== BACKGROUND SHOPEE STYLE ===== */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #ff512f, #f09819);
            overflow: hidden;
            position: relative;
        }

        /* Glow circles */
        body::before,
        body::after {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.4), transparent 70%);
            border-radius: 50%;
            filter: blur(50px);
            z-index: 0;
        }

        body::before {
            top: -100px;
            left: -100px;
        }

        body::after {
            bottom: -120px;
            right: -120px;
        }

        /* ===== LIQUID GLASS CARD ===== */
        .success-card {
            position: relative;
            z-index: 2;
            width: 95%;
            max-width: 500px;
            padding: 55px 45px;
            text-align: center;
            border-radius: 35px;

            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);

            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow:
                0 25px 70px rgba(0, 0, 0, 0.25),
                inset 0 1px 1px rgba(255, 255, 255, 0.4);

            animation: fadeIn 0.7s ease;
        }

        /* ===== CHECK ICON ===== */
        .check-circle {
            width: 110px;
            height: 110px;
            margin: 0 auto 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00c853, #69f0ae);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0, 200, 83, 0.5);
            animation: pop 0.7s ease;
        }

        .check-circle svg {
            width: 55px;
            height: 55px;
            fill: white;
        }

        /* ===== TEXT ===== */
        .success-card h1 {
            font-size: 28px;
            margin-bottom: 12px;
            font-weight: 700;
            color: white;
            letter-spacing: 0.5px;
        }

        .success-card p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 15px;
            margin-bottom: 40px;
        }

        /* ===== BUTTONS ===== */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .btn-glass {
            padding: 14px;
            border-radius: 60px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.35s ease;
            backdrop-filter: blur(15px);
        }

        /* Shopee style primary */
        .btn-primary-glass {
            background: linear-gradient(135deg, #ff3c00, #ff7a00);
            color: white;
            box-shadow: 0 15px 30px rgba(255, 60, 0, 0.4);
        }

        .btn-primary-glass:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 40px rgba(255, 60, 0, 0.6);
        }

        /* Secondary glass */
        .btn-outline-glass {
            background: rgba(255, 255, 255, 0.25);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .btn-outline-glass:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-4px) scale(1.02);
        }

        /* ===== ANIMATION ===== */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pop {
            0% {
                transform: scale(0.6);
            }

            80% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        @media (min-width: 768px) {
            .btn-group {
                flex-direction: row;
            }
        }
    </style>
</head>

<body>

    <div class="success-card">

        <div class="check-circle">
            <svg viewBox="0 0 24 24">
                <path d="M9 16.2l-3.5-3.5L4 14.2l5 5 11-11-1.5-1.5z" />
            </svg>
        </div>

        <h1>Thanh toán thành công</h1>
        <p>Đơn hàng của bạn đã được ghi nhận và đang được xử lý.</p>

        <div class="btn-group" style="display: flex; justify-content: center;">
            <a href="/home" class="btn-glass btn-primary-glass">
                Tiếp tục mua hàng
            </a>

            <a href="/order-history" class="btn-glass btn-outline-glass">
                Xem đơn hàng
            </a>
        </div>

    </div>

</body>

</html>
