<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        /* ===== BACKGROUND ===== */
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('/img/register.jpg') no-repeat center center/cover;
            font-family: 'Segoe UI', sans-serif;
            position: relative;
        }

        /* Overlay tối */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 0;
        }

        /* ===== CARD ===== */
        .register-wrapper {
            width: 420px;
            padding: 40px;
            border-radius: 25px;
            backdrop-filter: blur(25px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            transition: 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .register-wrapper:hover {
            transform: scale(1.03);
        }

        h3 {
            font-weight: 700;
            color: #fff;
        }

        /* ===== INPUT ===== */
        .form-control {
            background: rgba(255, 255, 255, 0.4);
            border: none;
            border-radius: 15px;
            padding: 14px;
            color: #fff;
        }

        .form-control::placeholder {
            color: #eee;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.3);
            color: #000;
        }

        label {
            color: #000000 !important;
            font-weight: 500;
        }

        /* ===== BUTTON ===== */
        .btn-custom {
            border-radius: 15px;
            background: #e9c3a3;
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .btn-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        /* Link */
        .login-link a {
            color: #fff;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        #error-msg {
            color: #ffb3b3;
        }

        /* ===== PASSWORD TOGGLE ===== */
        .pw-group {
            position: relative;
        }

        .pw-group .form-control {
            padding-right: 48px;
        }

        .pw-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            z-index: 5;
            padding: 0;
            transition: color 0.2s;
        }

        .pw-toggle:hover {
            color: #e9c3a3;
        }
    </style>
</head>

<body>

    <div class="register-wrapper login-card">

        <h3 class="text-center mb-4">Đăng Ký Tài Khoản</h3>

        <form th:action="@{/register}" method="post" th:object="${registerUser}" onsubmit="return validPassword()">

            <div class="form-floating mb-3">
                <input id="fullName" class="form-control" th:field="*{fullName}" placeholder="Full name" required>
                <label>Tên</label>
            </div>

            <div class="form-floating mb-3">
                <input id="email" th:class="'form-control' + (${#fields.hasErrors('email')} ? ' is-invalid' : '')"
                    th:field="*{email}" type="email" placeholder="name@example.com" required />
                <label for="email">Email</label>
                <div th:if="${#fields.hasErrors('email')}" class="invalid-feedback" th:errors="*{email}"
                    style="color: #000; font-style: italic; margin-left: 10px;"></div>
            </div>
            <div class="form-floating mb-3">
                <input id="phone" class="form-control" type="text" th:field="*{phone}" placeholder="Số điện thoại"
                    required />

                <label>Số điện thoại</label>
                <!-- <div th:if="${#fields.hasErrors('phone')}" class="invalid-feedback" th:errors="*{phone}"
                    style="color: #000; font-style: italic; margin-left: 10px;"></div> -->
                <div id="phoneError" style="color: black;" class="invalid-feedback"></div>
            </div>

            <div class="form-floating mb-3 pw-group">
                <input class="form-control" th:field="*{password}" id="password" type="password" placeholder="Password"
                    required>
                <label>Mật khẩu</label>
                <button type="button" class="pw-toggle" onclick="togglePw('password','eyeReg1')" tabindex="-1">
                    <i id="eyeReg1" class="bi bi-eye"></i>
                </button>
            </div>
            <div id="reg-pw-len-error" class="mb-1 fw-semibold" style="color:#ffb3b3; font-size:0.88rem;"></div>

            <div class="form-floating mb-3 pw-group">
                <input class="form-control" th:field="*{confirmPassword}" id="confirmPassword" type="password"
                    placeholder="Confirm Password" required>
                <label>Xác nhận mật khẩu</label>
                <button type="button" class="pw-toggle" onclick="togglePw('confirmPassword','eyeReg2')" tabindex="-1">
                    <i id="eyeReg2" class="bi bi-eye"></i>
                </button>
            </div>

            <div id="error-msg" class="mb-3 fw-semibold"></div>

            <div class="d-grid">
                <button type="submit" id="submitBtn" class="btn btn-custom" disabled>
                    Tạo tài khoản
                </button>
            </div>

            <div class="login-link text-center mt-3">
                <a th:href="@{/login}">
                    Đã có tài khoản, Đăng Nhập
                </a>
            </div>

        </form>
    </div>

    <script>
        const submitBtn = document.getElementById("submitBtn");
        const fullNameInput = document.getElementById("fullName");
        const emailInput = document.getElementById("email");
        const phoneInput = document.getElementById("phone");
        const pwInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');

        const phoneErrorDiv = document.getElementById("phoneError");
        const errorMsg = document.getElementById('error-msg');
        const lenError = document.getElementById('reg-pw-len-error');

        function updateSubmitButtonState() {
            const isFullNameFilled = fullNameInput.value.trim() !== "";
            const isEmailFilled = emailInput.value.trim() !== "" && emailInput.checkValidity();

            const phoneValue = phoneInput.value;
            const phoneRegex = /^(0[3|5|7|8|9])[0-9]{8}$/;
            const isPhoneValid = phoneRegex.test(phoneValue);

            const isPwValid = pwInput.value.length >= 6;
            const isMatch = pwInput.value === confirmInput.value && confirmInput.value !== "" && pwInput.value !== "";

            if (isFullNameFilled && isEmailFilled && isPhoneValid && isPwValid && isMatch) {
                submitBtn.disabled = false;
            } else {
                submitBtn.disabled = true;
            }
        }

        phoneInput.addEventListener("input", function () {
            // 1. Chỉ cho nhập số
            this.value = this.value.replace(/[^0-9]/g, "");
            const value = this.value;

            // 2. Regex số điện thoại VN
            const regex = /^(0[3|5|7|8|9])[0-9]{8}$/;

            // 3. Validate UI
            if (value.length === 0) {
                setPhoneInvalid("Không được để trống");
            } else if (!regex.test(value)) {
                setPhoneInvalid("Số điện thoại không hợp lệ!");
            } else {
                setPhoneValid();
            }
            updateSubmitButtonState();
        });

        function setPhoneInvalid(message) {
            phoneInput.classList.add("is-invalid");
            phoneInput.classList.remove("is-valid");
            phoneErrorDiv.innerText = message;
        }

        function setPhoneValid() {
            phoneInput.classList.remove("is-invalid");
            phoneInput.classList.add("is-valid");
            phoneErrorDiv.innerText = "";
        }

        // Toggle hiển thị / ẩn mật khẩu
        function togglePw(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }

        function checkLength() {
            if (pwInput.value.length > 0 && pwInput.value.length < 6) {
                lenError.textContent = 'Mật khẩu phải có ít nhất 6 ký tự!';
                return false;
            }
            lenError.textContent = '';
            return true;
        }

        function checkMatch() {
            if (confirmInput.value.length > 0 && pwInput.value !== confirmInput.value) {
                errorMsg.innerHTML = 'Password và Confirm password không khớp!';
                return false;
            }
            errorMsg.innerHTML = '';
            return true;
        }

        pwInput.addEventListener('input', function () {
            checkLength();
            checkMatch();
            updateSubmitButtonState();
        });

        confirmInput.addEventListener('input', function () {
            checkMatch();
            updateSubmitButtonState();
        });

        fullNameInput.addEventListener('input', updateSubmitButtonState);
        emailInput.addEventListener('input', updateSubmitButtonState);

        // Initial check in case of browser auto-fill
        document.addEventListener('DOMContentLoaded', updateSubmitButtonState);

        function validPassword() {
            const lenOk = checkLength();
            const matchOk = checkMatch();
            return lenOk && matchOk;
        }

        // 3D Tilt Effect
        const card = document.querySelector(".login-card");

        card.addEventListener("mousemove", (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const centerX = rect.width / 2;
            const centerY = rect.height / 2;

            const rotateX = ((y - centerY) / 25) * -1;
            const rotateY = (x - centerX) / 25;

            card.style.transform =
                `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.03)`;
        });

        card.addEventListener("mouseleave", () => {
            card.style.transform = "rotateX(0deg) rotateY(0deg) scale(1)";
        });
    </script>

</body>

</html>
