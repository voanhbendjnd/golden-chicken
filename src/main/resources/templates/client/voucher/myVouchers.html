<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Voucher của tôi</title>
  <link th:href="@{/css/profileTest.css}" rel="stylesheet">
  <link th:href="@{/css/voucher-redeem.css}" rel="stylesheet">

  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
  <link th:href="@{/css/style.djnd.css}" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link th:href="@{/css/style.djnd.css}" rel="stylesheet">

</head>

<body>
  <div th:replace="~{client/layout/header.djnd}"></div>
  <div class="page">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="main">
      <div class="voucher-container">
        <div th:replace="~{fragments/voucher-header :: voucher-header}"></div>


        <section>
          <div class="section-head">
            <h2>Danh sách voucher sở hữu</h2>
            <a class="btn btn-primary" th:href="@{/vouchers}">Quay lại</a>
          </div>

          <div class="list" th:if="${#lists.isEmpty(myVouchers)}">
            <div class="voucher">
              <div class="v-left">
                <div class="v-title">Bạn chưa sở hữu voucher nào</div>
              </div>
              <div class="v-right">
                <a th:href="@{/vouchers}" class="btn-primary" style="text-decoration: none;">Đổi ngay</a>
              </div>
            </div>
          </div>

          <div class="list" th:unless="${#lists.isEmpty(myVouchers)}">
            <div class="voucher" th:each="cv : ${myVouchers}">
              <div class="v-left">
                <div class="v-title" th:text="${cv.voucher.name}">Voucher</div>
                <div class="v-sub" th:text="${cv.voucher.code}">CODE</div>
                <div class="v-sub"
                  th:text="${cv.voucher.endAt != null ? #temporals.format(cv.voucher.endAt, 'dd/MM/yyyy HH:mm') : 'Không xác định'}">
                  Date
                </div>
              </div>
              <div class="v-right">
                <span class="tag personal" th:text="${cv.status}">AVAILABLE</span>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>
  <div th:replace="~{client/layout/footer.djnd}"></div>
</body>

</html>
