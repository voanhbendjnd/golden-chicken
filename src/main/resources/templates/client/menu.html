<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Thực đơn - Golden Chicken</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}" />

    <link rel="stylesheet" th:href="@{/css/menudjnd.css}">
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
    <link th:href="@{/css/style.djnd.css}" rel="stylesheet">
    <link th:href="@{/css/product.show.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <!-- HEADER -->
    <div th:replace="~{client/layout/header.djnd}"></div>

    <section class="menu-page section container" style="padding-top: 50px;">
        <div class="container-fluid py-4">

            <h1 class="menu-title text-center">THỰC ĐƠN</h1>

            <!-- SEARCH RESULT INFO -->
            <div class="text-center mb-4" th:if="${searchQuery != null and !#strings.isEmpty(searchQuery)}">
                <div class="d-inline-flex align-items-center gap-2 flex-wrap justify-content-center">
                    <span class="text-muted">Kết quả tìm kiếm cho:</span>
                    <span class="fw-bold" th:text="${searchQuery}">keyword</span>
                    <a class="btn btn-sm btn-outline-secondary rounded-pill" th:href="@{/menu}">Xóa lọc</a>
                </div>
            </div>

            <!-- DANH MỤC -->
            <div class="category-block" th:each="block : ${categoryProductList}">

                <h2 class="category-name" th:text="${block.categoryName}" style="color: #b00020;">
                    Danh mục
                </h2>

                <div class="row product-list g-4">

                    <!-- SẢN PHẨM -->
                    <div class="col-6 col-md-4 col-lg-3" th:each="product : ${block.products}">
                        <div class="rounded position-relative fruite-item">

                            <!-- IMAGE -->
                            <div class="fruite-img img-hover-zoom">
                                <a th:href="@{/product/{id}(id=${product.id})}">
                                    <img class="img-fluid w-100 rounded-top"
                                        th:src="@{'/images/products/' + ${product.img}}" th:alt="${product.name}">
                                </a>

                            </div>

                            <!-- CATEGORY -->
                            <div class="text-white bg-secondary px-3 py-1 rounded position-absolute"
                                style="top:10px; left:10px;" th:text="${product.category.name}">
                                Category
                            </div>

                            <div class="p-4 border border-secondary border-top-0 rounded-bottom">

                                <!-- NAME -->
                                <h5 th:text="${product.name}">
                                    Tên sản phẩm
                                </h5>

                                <!-- DESCRIPTION -->
                                <p class="product-desc-fixed" th:if="${product.description}"
                                    th:text="${product.description}">Mô tả
                                </p>

                                <!-- PRICE + BUY -->
                                <div class="d-flex justify-content-between align-items-center flex-wrap">

                                    <p class="text-dark fw-bold mb-2"
                                        th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')} + ' ₫'">
                                        0 ₫
                                    </p>

                                    <a class="btn border border-danger rounded-pill px-3 text-danger btn-buy-now"
                                        th:href="@{/checkout?productId={id}(id=${product.id})}">
                                        Mua ngay
                                    </a>

                                </div>

                                <!-- ADD TO CART -->
                                <div class="mt-3 d-flex gap-2 align-items-center"
                                    th:if="${product.type.name() != 'MYSTERY'}">

                                    <button
                                        class="btn border border-secondary rounded-pill px-3 text-secondary btn-add-to-cart"
                                        th:data-id="${product.id}">
                                        <i class="fa fa-shopping-bag me-2"></i>Giỏ hàng
                                    </button>

                                    <!-- QUANTITY -->
                                    <div class="input-group quantity-selector" style="width:120px;">

                                        <button class="btn btn-outline-secondary btn-minus" type="button">-</button>

                                        <input type="number" class="form-control text-center input-qty" value="1"
                                            min="1" max="33" th:id="'qty-' + ${product.id}">

                                        <button class="btn btn-outline-secondary btn-plus" type="button">+</button>

                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>
                    <!-- END PRODUCT -->

                </div>
            </div>
            <!-- END CATEGORY -->

            <!-- KHÔNG CÓ DỮ LIỆU -->
            <div class="text-center py-5" th:if="${#lists.isEmpty(categoryProductList)}">
                <p class="text-muted"
                   th:text="${searchQuery != null and !#strings.isEmpty(searchQuery)} ? 'Không tìm thấy sản phẩm phù hợp.' : 'Chưa có sản phẩm nào trong thực đơn.'">
                    Chưa có sản phẩm nào trong thực đơn.
                </p>
                <a class="btn btn-outline-warning rounded-pill mt-2"
                   th:if="${searchQuery != null and !#strings.isEmpty(searchQuery)}"
                   th:href="@{/menu}">Xem toàn bộ thực đơn</a>
            </div>

        </div>
    </section>

    <!-- FOOTER -->
    <div th:replace="~{client/layout/footer.djnd}"></div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/menu.js}"></script>

</body>

</html>
