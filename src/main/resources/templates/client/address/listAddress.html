<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Địa chỉ giao hàng</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:href="@{/css/address.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.djnd.css}" rel="stylesheet">
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link th:href="@{/css/profileTest.css}" rel="stylesheet">


</head>

<body>
    <div th:replace="~{client/layout/header.djnd}"></div>

    <div class="page container" style="padding-top: 200px;">

        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <main class="addr-main">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h1 class="addr-title">Địa chỉ</h1>
                <a th:href="@{/addresses/new/init}" class="btn btn-success">
                    THÊM ĐỊA CHỈ MỚI
                </a>
            </div>
            <div th:if="${msgWarning != null}" class="alert alert-warning shadow-sm border-0 mb-4" role="alert"
                th:text="${msgWarning}"></div>
            <section class="addr-card">
                <div class="addr-card__head">DANH SÁCH ĐỊA CHỈ</div>
                <div class="addr-card__body">

                    <table class="table table-bordered table-hover">
                        <thead>
                            <tr>
                                <th>Người nhận</th>
                                <th>Địa chỉ</th>
                                <th>SĐT</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:if="${defaultAddress == null and #lists.isEmpty(additionalAddresses)}">
                                <td colspan="5" class="text-center">
                                    Chưa có địa chỉ nào.
                                </td>
                            </tr>

                            <tr th:if="${defaultAddress != null}" class="table-warning">
                                <td th:text="${defaultAddress.recipientName}">Name</td>

                                <td>
                                    <span th:text="${defaultAddress.specificAddress}"></span>,
                                    <span th:text="${defaultAddress.ward}"></span>,
                                    <span th:text="${defaultAddress.city}"></span>
                                </td>

                                <td th:text="${defaultAddress.recipientPhone}"></td>

                                <td>
                                    <span class="badge bg-success">Mặc định</span>
                                </td>

                                <td>
                                    <form th:action="@{/addresses/edit/init}" method="get" style="display:inline;">
                                        <input type="hidden" name="id" th:value="${defaultAddress.id}" />
                                        <button class="btn btn-sm btn-warning px-3 py-2">Sửa</button>
                                    </form>
                                </td>
                            </tr>

                            <tr th:each="a : ${additionalAddresses}"
                                th:if="${defaultAddress == null or a.id != defaultAddress.id}">

                                <td th:text="${a.recipientName}">Name</td>

                                <td>
                                    <span th:text="${a.specificAddress}"></span>,
                                    <span th:text="${a.ward}"></span>,
                                    <span th:text="${a.city}"></span>
                                </td>

                                <td th:text="${a.recipientPhone}"></td>

                                <td>
                                    <span class="badge bg-secondary">Phụ</span>
                                </td>

                                <td>
                                    <div class="d-flex align-items-center flex-nowrap gap-2">
                                        <form th:action="@{/addresses/edit/init}" method="get" class="m-0">
                                            <input type="hidden" name="id" th:value="${a.id}" />
                                            <button type="submit" class="btn btn-warning px-3 py-2">Sửa</button>
                                        </form>

                                        <a th:href="@{/addresses/{id}/delete(id=${a.id})}"
                                            class="btn btn-danger px-3 py-2">Xóa</a>

                                        <form th:action="@{/addresses/{id}/default(id=${a.id})}" method="post"
                                            class="m-0">
                                            <button type="submit" class="btn btn-info px-3 py-2 btn-nowrap">Đặt mặc
                                                định</button>
                                        </form>
                                    </div>
                                </td>

                            </tr>
                        </tbody>
                    </table>

                </div>
            </section>

        </main>
    </div>

    <div th:replace="~{client/layout/footer.djnd}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
