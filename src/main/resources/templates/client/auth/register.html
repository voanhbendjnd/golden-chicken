<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* ===== BACKGROUND ===== */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #d90429, #ef233c);
            background-size: 200% 200%;
            animation: gradientMove 12s ease infinite;
            font-family: 'Segoe UI', sans-serif;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* ===== MAIN CARD ===== */
        .register-wrapper {
            width: 900px;
            max-width: 95%;
            display: flex;
            border-radius: 35px;
            overflow: hidden;
            backdrop-filter: blur(30px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.35);
            transform-style: preserve-3d;
            transition: 0.3s ease;
        }

        /* ===== LEFT SIDE ===== */
        .left-panel {
            flex: 1;
            padding: 60px 40px;
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.05));
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            backdrop-filter: blur(20px);
        }

        .left-panel h2 {
            font-weight: 700;
            font-size: 32px;
        }

        .left-panel p {
            opacity: 0.9;
            margin-top: 15px;
        }

        /* ===== RIGHT SIDE ===== */
        .right-panel {
            flex: 1.2;
            padding: 50px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(25px);
        }

        h3 {
            font-weight: 700;
            color: #111;
        }

        /* ===== INPUT ===== */
        .form-control {
            background: rgba(255, 255, 255, 0.5);
            border: none;
            border-radius: 15px;
            padding: 14px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.2);
        }

        label {
            color: #111 !important;
            font-weight: 600;
        }

        /* ===== BUTTON ===== */
        .btn-danger {
            border-radius: 15px;
            background: linear-gradient(135deg, #d90429, #ef233c);
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .btn-danger:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        }

        /* FOOTER LINK */
        .login-link {
            margin-top: 15px;
        }

        .login-link a {
            color: #111;
            font-weight: 500;
            text-decoration: none;
        }

        /* ===== 3D EFFECT ===== */
        .register-wrapper:hover {
            transform: scale(1.02);
        }

        /* RESPONSIVE */
        @media(max-width: 768px) {
            .register-wrapper {
                flex-direction: column;
            }

            .left-panel {
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <div class="register-wrapper login-card">

        <!-- LEFT PANEL -->
        <div class="left-panel">
            <h2>Welcome!</h2>
            <p>Create your account and start your journey with us.</p>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">
            <h3 class="text-center mb-4">Register</h3>

            <form th:action="@{/register}" method="post" th:object="${registerUser}" onsubmit="return validPassword()">

                <div class="form-floating mb-3">
                    <input class="form-control" th:field="*{fullName}" placeholder="Full name" />
                    <label>Full name</label>
                </div>

                <div class="form-floating mb-3">
                    <input class="form-control" th:field="*{email}" type="email" placeholder="Email" />
                    <label>Email</label>
                </div>

                <div class="form-floating mb-3">
                    <input class="form-control" th:field="*{password}" id="password" type="password"
                        placeholder="Password" />
                    <label>Password</label>
                </div>

                <div class="form-floating mb-3">
                    <input class="form-control" th:field="*{confirmPassword}" id="confirmPassword" type="password"
                        placeholder="Confirm password" />
                    <label>Confirm Password</label>
                </div>

                <div id="error-msg" class="mb-3 fw-semibold"></div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-danger">
                        Create Account
                    </button>
                </div>

                <div class="login-link text-center">
                    <a th:href="@{/login}">
                        Have an account? Go to login
                    </a>
                </div>
            </form>
        </div>

    </div>

    <script>
        function validPassword() {
            var password = document.getElementById("password").value;
            var confirm = document.getElementById("confirmPassword").value;
            var errorElement = document.getElementById("error-msg");

            if (password !== confirm) {
                errorElement.innerHTML = "Password and Confirm password are not the same!";
                errorElement.style.color = "#b00020";
                return false;
            }
            return true;
        }

        // 3D tilt
        const card = document.querySelector(".login-card");

        card.addEventListener("mousemove", (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const centerX = rect.width / 2;
            const centerY = rect.height / 2;

            const rotateX = ((y - centerY) / 30) * -1;
            const rotateY = (x - centerX) / 30;

            card.style.transform =
                `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
        });

        card.addEventListener("mouseleave", () => {
            card.style.transform = "rotateX(0deg) rotateY(0deg) scale(1)";
        });
    </script>

</body>

</html>
