<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Chọn địa chỉ giao hàng</title>
    <link th:href="@{/css/list-address-checkout.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.djnd.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

</head>

<body>

    <div th:replace="~{client/layout/header.djnd}"></div>
    <div class="checkout-container">
        <div class="page-checkout-address" style="padding-top: 120px;">
            <h1 class="addr-title">📍 CHỌN ĐỊA CHỈ GIAO HÀNG</h1>

            <div th:each="a : ${addresses}" class="address-card">
                <div class="address-info">
                    <div class="name">
                        <span th:text="${a.recipientName}"></span>

                        <form th:action="@{/addresses/edit/init}" method="post" style="display: inline;">
                            <input type="hidden" name="id" th:value="${a.id}" />
                            <input type="hidden" name="productId" th:value="${productId}" />
                            <input type="hidden" name="productIds" th:value="${productIds}" />
                            <input type="hidden" name="orderId" th:value="${orderId}" />
                            <input type="hidden" name="productVoucherId" th:value="${productVoucherId}" />
                            <input type="hidden" name="shippingVoucherId" th:value="${shippingVoucherId}" />
                            <input type="hidden" name="quantity" th:value="${quantity}" />
                            <button type="submit" class="ms-2 text-primary" style="background: none; border: none; padding: 0;" title="Chỉnh sửa">
                                <i class="fa-solid fa-pen-to-square"></i>
                            </button>
                        </form>

                        <form th:action="@{/addresses/{id}/delete/init(id=${a.id})}" method="post" style="display: inline;">
                            <input type="hidden" name="productId" th:value="${productId}" />
                            <input type="hidden" name="productIds" th:value="${productIds}" />
                            <input type="hidden" name="orderId" th:value="${orderId}" />
                            <input type="hidden" name="productVoucherId" th:value="${productVoucherId}" />
                            <input type="hidden" name="shippingVoucherId" th:value="${shippingVoucherId}" />
                            <input type="hidden" name="quantity" th:value="${quantity}" />
                            <button type="submit" class="ms-2 text-danger" style="background: none; border: none; padding: 0;" title="Xoá">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </form>
                    </div>
                    <div>
                        <span th:text="${a.specificAddress}"></span>,
                        <span th:text="${a.ward}"></span>,
                        <span th:text="${a.city}"></span>
                    </div>
                    <div>📞 <span th:text="${a.recipientPhone}"></span></div>
                </div>
                <input class="address-radio" type="radio" name="addressId" th:value="${a.id}" required>
            </div>

            <div class="address-actions">
                <form th:action="@{/addresses/new/init}" method="post" style="display: inline;">
                    <input type="hidden" name="productId" th:value="${productId}" />
                    <input type="hidden" name="productIds" th:value="${productIds}" />
                    <input type="hidden" name="orderId" th:value="${orderId}" />
                    <input type="hidden" name="productVoucherId" th:value="${productVoucherId}" />
                    <input type="hidden" name="shippingVoucherId" th:value="${shippingVoucherId}" />
                    <input type="hidden" name="quantity" th:value="${quantity}" />
                    <button type="submit" class="btn btn-success btn-add">
                        Thêm địa chỉ mới
                    </button>
                </form>

                <button type="button" onclick="confirmAddress()" class="btn btn-confirm">
                    Xác nhận địa chỉ
                </button>
            </div>
        </div>

        <script th:inline="javascript">
            function confirmAddress() {
                const selectedRadio = document.querySelector('input[name="addressId"]:checked');
                if (!selectedRadio) {
                    alert("Vui lòng chọn một địa chỉ!");
                    return;
                }

                const addressId = selectedRadio.value;
                const productId = /*[[${productId}]]*/ null;
                const productIds = /*[[${productIds}]]*/ null;
                const productVoucherId = /*[[${productVoucherId}]]*/ null;
                const shippingVoucherId = /*[[${shippingVoucherId}]]*/ null;
                const orderId = /*[[${orderId}]]*/ null;
                const quantity = /*[[${quantity}]]*/ 1;

                const form = document.createElement('form');
                form.method = 'POST';
                form.action = '/checkout';

                const addInput = (name, value) => {
                    if (value != null && value !== '') {
                        const input = document.createElement('input');
                        input.type = 'hidden';
                        input.name = name;
                        input.value = value;
                        form.appendChild(input);
                    }
                };

                addInput('addressId', addressId);
                addInput('orderId', orderId);
                addInput('productId', productId);
                addInput('quantity', quantity);
                addInput('productVoucherId', productVoucherId);
                addInput('shippingVoucherId', shippingVoucherId);

                if (productIds != null && productIds !== '') {
                    productIds.split(',').forEach(id => {
                        addInput('ids', id);
                    });
                }

                const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
                if (csrfToken) {
                    addInput('_csrf', csrfToken);
                }

                document.body.appendChild(form);
                form.submit();
            }
        </script>
    </div>
    <div th:replace="~{client/layout/footer.djnd}"></div>

</body>

</html>

</html>
