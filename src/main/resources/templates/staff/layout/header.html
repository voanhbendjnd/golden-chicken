<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
   <meta charset="UTF-8">
   <title>Giao Diện Cho Shipper</title>

   <!-- Bootstrap -->
   <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">

   <!-- FontAwesome -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

   <style>
      :root {
         --shipper-red: #e31837;
      }

      /* ===== HEADER ===== */

      .shipper-header {
         background: linear-gradient(90deg, #ffb524, #ffb524);
         padding: 14px 0;
         box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
      }

      /* logo */

      .navbar-brand {
         font-size: 20px;
      }

      /* menu link */

      .shipper-link {
         color: white !important;
         font-weight: 500;
         position: relative;
         padding-bottom: 6px;
         transition: 0.3s;
      }

      /* hover */

      .shipper-link:hover {
         color: #ffd700 !important;
      }

      /* underline animation */

      .shipper-link::after {
         content: "";
         position: absolute;
         left: 0;
         bottom: 0;
         width: 0;
         height: 2px;
         background: #ffd700;
         transition: 0.3s;
      }

      .shipper-link:hover::after {
         width: 100%;
      }

      .shipper-link.active::after {
         width: 100%;
      }

      /* right side */

      .username {
         color: white;
         font-weight: 600;
      }

      /* buttons */

      .btn-outline-light {
         border-radius: 20px;
      }

      .btn-light {
         border-radius: 20px;
         font-weight: 600;
      }

      .navbar-toggler:focus {
         box-shadow: none;
      }
   </style>
</head>

<body>

   <!-- ===== HEADER ===== -->

   <header class="shipper-header navbar navbar-expand-lg">
      <div class="container-fluid px-4">

         <!-- Logo -->

         <a class="navbar-brand fw-bold text-white d-flex align-items-center gap-2" th:href="@{/staff/shipper}">
            <i class="fa-solid fa-truck-fast"></i>
            Nhận đơn dành cho shipper
         </a>

         <!-- Mobile toggle -->

         <button class="navbar-toggler text-white border-0" type="button" data-bs-toggle="collapse"
            data-bs-target="#shipperNavbar">
            <i class="fa-solid fa-bars"></i>
         </button>

         <!-- Navbar -->

         <div class="collapse navbar-collapse justify-content-between" id="shipperNavbar">

            <!-- Left menu -->

            <ul class="navbar-nav mb-2 mb-lg-0 gap-lg-4">

               <li class="nav-item">
                  <a class="nav-link shipper-link" th:href="@{/staff/shipper/dashboard}">
                     <i class="fa-solid fa-gauge-high me-1"></i>
                     Dashboard
                  </a>
               </li>

               <li class="nav-item">
                  <a class="nav-link shipper-link" th:href="@{/staff/shipper/orders}">
                     <i class="fa-solid fa-box me-1"></i>
                     Đơn hàng
                  </a>
               </li>

               <li class="nav-item">
                  <a class="nav-link shipper-link" th:href="@{/staff/shipper/statistics}">
                     <i class="fa-solid fa-chart-line me-1"></i>
                     Thống kê
                  </a>
               </li>
               <li class="nav-item" th:if="${session.roleName == 'ADMIN'}">
                  <a class="nav-link shipper-link" th:href="@{/admin/user}">
                     <i class="fa-solid fa-chart-line me-1"></i>
                     Quản lý tài khoản (ADMIN)
                  </a>
               </li>
               <li class="nav-item" th:if="${session.roleName == 'ADMIN'}">
                  <a class="nav-link shipper-link" th:href="@{/staff/dashboard}">
                     <i class="fa-solid fa-chart-line me-1"></i>
                     Trang dành cho quản lý (ADMIN)
                  </a>
               </li>
               <li class="nav-item">
                  <a class="nav-link shipper-link" href="/">
                     <i class="fa-solid fa-chart-line me-1"></i>
                     Trang chủ
                  </a>
               </li>
            </ul>

            <!-- Right side -->

            <div class="d-flex align-items-center gap-3">

               <span class="username" th:text="${session.fullName}">
               </span>

               <a th:href="@{/profile}" class="btn btn-outline-light btn-sm px-3">
                  <i class="fa-solid fa-user"></i>
               </a>

               <form th:action="@{/logout}" method="post" class="m-0">

                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                  <button type="submit" class="btn btn-light btn-sm px-3">
                     <i class="fa-solid fa-right-from-bracket"></i>
                  </button>

               </form>

            </div>

         </div>
      </div>
   </header>

   <!-- Bootstrap JS -->
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

   <!-- Active menu script -->

   <script>

      document.addEventListener("DOMContentLoaded", function () {

         const current = window.location.pathname;

         document.querySelectorAll(".shipper-link").forEach(link => {

            if (current.startsWith(new URL(link.href).pathname)) {
               link.classList.add("active");
            }

         });

      });

   </script>

</body>

</html>
