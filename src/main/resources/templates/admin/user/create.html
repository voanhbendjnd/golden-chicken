<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <head th:replace="~{common/head}"></head>
    <title>Trang tạo người dùng</title>
</head>

<body>
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h3 class="text-center mb-0">Tạo người dùng mới</h3>
                    </div>

                    <div class="card-body">
                        <form th:action="@{/admin/user/create}" method="post" th:object="${newUser}">

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" th:field="*{email}" required />
                                <div th:if="${#fields.hasErrors('email')}" class="text-danger small"
                                    th:errors="*{email}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Họ và tên</label>
                                <input type="text" class="form-control" th:field="*{fullName}" required />
                                <div th:if="${#fields.hasErrors('fullName')}" class="text-danger small"
                                    th:errors="*{fullName}"></div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Mật khẩu</label>
                                    <div class="input-group">
                                        <input type="password" class="form-control" th:field="*{password}" id="password" required />
                                        <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('password', 'eyeIcon1')" tabindex="-1">
                                            <i id="eyeIcon1" class="bi bi-eye"></i>
                                        </button>
                                    </div>
                                    <div id="passwordLenError" class="text-danger small"></div>
                                    <div th:if="${#fields.hasErrors('password')}" class="text-danger small"
                                        th:errors="*{password}"></div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Xác nhận mật khẩu</label>
                                    <div class="input-group">
                                        <input type="password" class="form-control" th:field="*{confirmPassword}" id="confirmPassword" required />
                                        <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('confirmPassword', 'eyeIcon2')" tabindex="-1">
                                            <i id="eyeIcon2" class="bi bi-eye"></i>
                                        </button>
                                    </div>

                                    <div th:if="${#fields.hasErrors('confirmPassword')}" class="text-danger small"
                                        th:errors="*{confirmPassword}"></div>

                                    <!-- lỗi JS -->
                                    <div id="passwordError" class="text-danger small"></div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Vai trò</label>
                                <select id="roleSelect" name="roleId" class="form-select" required>
                                    <option value="">Chọn vai trò</option>
                                    <option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.name}">
                                    </option>
                                </select>
                            </div>

                            <div id="staffTypeGroup" class="mb-3" style="display: none;">
                                <label class="form-label">Loại nhân viên</label>
                                <select th:field="*{staffType}" class="form-select">
                                    <option value="RECEPTIONIST">Lễ tân</option>
                                    <option value="SHIPPER">Giao hàng</option>
                                    <option value="MANAGER">Quản lý</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Trạng thái</label>
                                <select th:field="*{status}" class="form-select">
                                    <option value="true">Hoạt động</option>
                                    <option value="false">Ngừng hoạt động</option>
                                </select>
                            </div>

                            <hr>

                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/admin/user}" class="btn btn-secondary">Hủy</a>
                                <button type="submit" class="btn btn-primary px-4">Tạo người dùng</button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Toggle hiển thị / ẩn mật khẩu
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon  = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }

        document.addEventListener("DOMContentLoaded", function () {

            const roleSelect      = document.getElementById("roleSelect");
            const staffTypeGroup  = document.getElementById("staffTypeGroup");

            const password        = document.getElementById("password");
            const confirmPassword = document.getElementById("confirmPassword");
            const form            = document.querySelector("form");
            const errorDiv        = document.getElementById("passwordError");
            const lenErrorDiv     = document.getElementById("passwordLenError");

            // Hiển thị / ẩn trường Staff Type theo Role
            function toggleFieldsByRole() {
                if (!roleSelect) return;
                const selectedText = roleSelect.options[roleSelect.selectedIndex]?.text.toUpperCase() ?? "";
                staffTypeGroup.style.display = selectedText.includes("STAFF") ? "block" : "none";
            }
            roleSelect.addEventListener("change", toggleFieldsByRole);
            toggleFieldsByRole();

            // Kiểm tra độ dài mật khẩu (≥ 6 ký tự)
            function checkPasswordLength() {
                if (password.value.length > 0 && password.value.length < 6) {
                    lenErrorDiv.textContent = "Mật khẩu phải có ít nhất 6 ký tự!";
                    return false;
                }
                lenErrorDiv.textContent = "";
                return true;
            }

            // Kiểm tra hai mật khẩu khớp nhau
            function checkPasswordMatch() {
                if (confirmPassword.value.length > 0 && password.value !== confirmPassword.value) {
                    errorDiv.textContent = "Password và Confirm Password không khớp!";
                    return false;
                }
                errorDiv.textContent = "";
                return true;
            }

            password.addEventListener("keyup", function () {
                checkPasswordLength();
                checkPasswordMatch();
            });
            confirmPassword.addEventListener("keyup", checkPasswordMatch);

            form.addEventListener("submit", function (e) {
                const lenOk   = checkPasswordLength();
                const matchOk = checkPasswordMatch();
                if (!lenOk || !matchOk) {
                    e.preventDefault();
                }
            });

        });
    </script>

</body>

</html>
