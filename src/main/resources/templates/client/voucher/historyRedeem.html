<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lịch sử đổi điểm</title>
  <link th:href="@{/css/profileTest.css}" rel="stylesheet">
  <link th:href="@{/css/voucher-redeem.css}" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
  <link th:href="@{/css/style.djnd.css}" rel="stylesheet">
</head>

<body>
  <div th:replace="~{client/layout/header.djnd}"></div>
  <div class="page" style="padding-top: 200px;">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="main">
      <div class="voucher-container">
        <div th:replace="~{fragments/voucher-header :: voucher-header}"></div>

        <section>
          <div class="section-head">
            <h2>Danh sách lịch sử</h2>
            <a class="btn btn-primary" th:href="@{/vouchers}">Quay lại</a>
          </div>

          <div class="list" th:if="${#lists.isEmpty(history)}">
            <div class="voucher">
              <div class="v-left">
                <div class="v-title">Chưa có lịch sử đổi điểm</div>
              </div>
            </div>
          </div>

          <div class="list" th:unless="${#lists.isEmpty(history)}">
            <div class="voucher" th:each="cv : ${history}">
              <div class="v-left">
                <div class="v-title" th:text="${cv.voucher.name}">Tên voucher </div>
                <div class="v-sub" th:text="${#temporals.format(cv.redeemedAt, 'dd/MM/yyyy HH:mm')}">24/02/2026 13:04
                </div>
              </div>
              <div class="v-right">
                <span class="tag personal" th:text="${' -' + cv.voucher.pointCost + ' điểm'}">-100 điểm</span>
                <!-- <span class="tag personal" th:text="${cv.status}">AVAILABLE</span> -->
              </div>
            </div>
          </div>

          <div class="mt-4" th:if="${totalPages > 1}">
            <nav aria-label="History pagination">
              <ul class="pagination justify-content-center d-flex" >
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                  <a class="page-link" th:href="@{/vouchers/history(page=${currentPage - 1}, size=${size})}">Trước</a>
                </li>
                <li class="page-item" th:each="p : ${#numbers.sequence(1, totalPages)}"
                  th:classappend="${p == currentPage} ? 'active'">
                  <a class="page-link" th:href="@{/vouchers/history(page=${p}, size=${size})}" th:text="${p}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                  <a class="page-link" th:href="@{/vouchers/history(page=${currentPage + 1}, size=${size})}">Sau</a>
                </li>
              </ul>
            </nav>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div th:replace="~{client/layout/footer.djnd}"></div>
</body>

</html>
