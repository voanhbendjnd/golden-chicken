<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Chọn địa chỉ giao hàng</title>
    <link th:href="@{/css/list-address-checkout.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.djnd.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">

</head>

<body>

    <div th:replace="~{client/layout/header.djnd}"></div>
    <div class="checkout-container">
        <div class="page-checkout-address" style="padding-top: 120px;">
            <h1 class="addr-title">📍 CHỌN ĐỊA CHỈ GIAO HÀNG</h1>

            <div th:each="a : ${addresses}" class="address-card">
                <div class="address-info">
                    <div class="name" th:text="${a.recipientName}"></div>
                    <div>
                        <span th:text="${a.specificAddress}"></span>,
                        <span th:text="${a.ward}"></span>,
                        <!-- <span th:text="${a.district}"></span>, -->
                        <span th:text="${a.city}"></span>
                    </div>
                    <div>📞 <span th:text="${a.recipientPhone}"></span></div>
                </div>

                <input class="address-radio" type="radio" name="addressId" th:value="${a.id}" required>
            </div>

            <div class="address-actions">
                <a th:href="@{/addresses/new}" class="btn btn-success btn-add">
                    Thêm địa chỉ mới
                </a>

                <button type="button" onclick="confirmAddress()" class="btn btn-confirm">
                    Xác nhận địa chỉ
                </button>
            </div>
        </div>

        <script th:inline="javascript">
            function confirmAddress() {
                const selectedRadio = document.querySelector('input[name="addressId"]:checked');
                if (!selectedRadio) {
                    alert("Vui lòng chọn một địa chỉ!");
                    return;
                }

                const addressId = selectedRadio.value;
                const productId = [[${ productId }]];
                const productIds = [[${ productIds }]];

                let url = "";
                if (productId != null) {
                    url = `/checkout?id=${productId}&addressId=${addressId}`;
                } else if (productIds != null && productIds.length > 0) {
                    const idsQuery = productIds.map(id => `ids=${id}`).join('&');
                    url = `/checkout/order?${idsQuery}&addressId=${addressId}`;
                } else {
                    url = `/checkout/order?addressId=${addressId}`;
                }

                window.location.href = url;
            }
        </script>
    </div>
    <div th:replace="~{client/layout/footer.djnd}"></div>

</body>

</html>
