<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Update Product</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .image-card {
            position: relative;
        }

        .btn-delete-abs {
            position: absolute;
            top: 5px;
            right: 5px;
            border-radius: 50%;
        }

        .preview-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container mt-5 pb-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Cập nhật sản phẩm</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/staff/product/update}" th:object="${product}" method="post"
                    enctype="multipart/form-data">
                    <div th:if="${error}" th:text="${error}" class="alert alert-danger"></div>

                    <input type="hidden" th:field="*{id}">

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Tên sản phẩm</label>
                            <input type="text" th:field="*{name}" class="form-control" placeholder="Nhập tên..."
                                required>
                            <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Giá (VNĐ)</label>
                            <input type="number" th:field="*{price}" class="form-control" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                        </div>
                    </div>


                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Thể loại</label>
                            <select class="form-select" th:field="*{category.id}" required>
                                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                                    th:selected="${product.category.id == cat.id}">

                                </option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Mô tả</label>
                            <textarea type="text" th:field="*{description}" class="form-control"
                                placeholder="Input description..." required> </textarea>
                            <div class="text-danger" th:if="${#fields.hasErrors('description')}"
                                th:errors="*{description}"></div>
                        </div>
                    </div>
                    <div class="row mb 4">

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Trạng thái</label>
                            <select th:field="*{active}" class="form-select" required>
                                <option value="true">Hoạt động</option>
                                <option value="false">Không hoạt động</option>
                            </select>
                        </div>
                    </div>
                    <hr>

                    <div class="mb-4">
                        <label class="form-label fw-bold d-block">Ảnh chính</label>
                        <div id="thumbnail-container" class="mb-2" style="width: 200px;">
                            <input type="hidden" th:field="*{img}" required>
                            <img th:src="@{'/images/products/' + *{img}}" class="img-thumbnail" id="main-img-preview">
                        </div>
                        <label class="form-label text-muted small">Thay đổi ảnh</label>
                        <input type="file" name="file" class="form-control" onchange="previewMainImage(this)">


                    </div>

                    <hr>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Các ảnh phụ</label>
                        <div class="row" id="gallery-container">
                            <div th:each="imgName : *{imgs}" class="col-md-3 mb-3 image-card-wrapper">
                                <div class="card shadow-sm h-100">
                                    <img th:src="@{'/images/products/' + ${imgName}}" class="preview-img">
                                    <input type="hidden" name="imgs" th:value="${imgName}" required>
                                    <button type="button" class="btn btn-danger btn-sm btn-delete-abs"
                                        onclick="removeGalleryImage(this)">
                                        <i class="fa fa-times"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="mt-3">
                            <label class="form-label text-muted small">Thay đổi ảnh</label>
                            <input type="file" name="files" multiple class="form-control"
                                onchange="previewMultipleImages(this)">
                            <div id="new-files-preview" class="row mt-2"></div>
                        </div>
                    </div>

                    <div class="mt-5 text-end">
                        <a href="/staff/product" class="btn btn-secondary me-2">Dừng</a>
                        <button type="submit" class="btn btn-success px-5">Cập nhật</button>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:inline="javascript">
        const allowedExtensions = ['png', 'jpg', 'jpeg'];

        function validateFile(file) {
            const extension = file.name.split('.').pop().toLowerCase();
            return allowedExtensions.includes(extension);
        }

        function previewMainImage(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                if (!validateFile(file)) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Tệp không hợp lệ',
                        text: 'Chỉ chấp nhận các tệp ảnh định dạng: .png, .jpg, .jpeg',
                        confirmButtonColor: '#3085d6',
                        confirmButtonText: 'Đồng ý'
                    });
                    input.value = '';
                    return;
                }

                const reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById('main-img-preview').src = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        }

        function removeGalleryImage(btn) {
            const wrapper = btn.closest('.image-card-wrapper');
            wrapper.remove();
        }

        function previewMultipleImages(input) {
            const container = document.getElementById('new-files-preview');
            container.innerHTML = '';
            if (input.files) {
                const files = Array.from(input.files);
                const invalidFiles = files.filter(file => !validateFile(file));

                if (invalidFiles.length > 0) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Tệp không hợp lệ',
                        text: 'Một hoặc nhiều tệp không đúng định dạng. Chỉ chấp nhận: .png, .jpg, .jpeg',
                        confirmButtonColor: '#3085d6',
                        confirmButtonText: 'Đồng ý'
                    });
                    input.value = '';
                    return;
                }

                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        const div = document.createElement('div');
                        div.className = 'col-md-2 mb-2';
                        div.innerHTML = `<img src="${e.target.result}" class="img-thumbnail" style="height: 80px; width: 100%; object-fit: cover;">`;
                        container.appendChild(div);
                    }
                    reader.readAsDataURL(file);
                });
            }
        }
    </script>

</body>

</html>
