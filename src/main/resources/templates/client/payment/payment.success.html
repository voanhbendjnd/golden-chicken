<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Thanh toán thành công</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* ===== GLOBAL ===== */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #ffdde1, #ee9ca7);
        }

        /* ===== GLASS CARD ===== */
        .success-card {
            width: 95%;
            max-width: 480px;
            padding: 50px 40px;
            text-align: center;
            border-radius: 30px;

            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);

            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);

            animation: fadeIn 0.6s ease;
        }

        /* ===== CHECK ICON ===== */
        .check-circle {
            width: 100px;
            height: 100px;
            margin: 0 auto 25px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4CAF50, #81C784);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 30px rgba(76, 175, 80, 0.4);
            animation: pop 0.6s ease;
        }

        .check-circle svg {
            width: 50px;
            height: 50px;
            fill: white;
        }

        /* ===== TEXT ===== */
        .success-card h1 {
            font-size: 26px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .success-card p {
            color: #444;
            font-size: 15px;
            margin-bottom: 35px;
        }

        /* ===== BUTTONS ===== */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-glass {
            padding: 12px;
            border-radius: 50px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.35s ease;
            backdrop-filter: blur(10px);
        }

        /* Continue shopping */
        .btn-primary-glass {
            background: linear-gradient(135deg, #e31837, #ff4d6d);
            color: white;
            box-shadow: 0 10px 25px rgba(227, 24, 55, 0.4);
        }

        .btn-primary-glass:hover {
            transform: translateY(-3px);
        }

        /* View order */
        .btn-outline-glass {
            background: rgba(255, 255, 255, 0.4);
            color: #111;
        }

        .btn-outline-glass:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: translateY(-3px);
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pop {
            0% {
                transform: scale(0.6);
            }

            80% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        @media (min-width: 768px) {
            .btn-group {
                flex-direction: row;
            }
        }
    </style>
</head>

<body>

    <div class="success-card">

        <div class="check-circle">
            <svg viewBox="0 0 24 24">
                <path d="M9 16.2l-3.5-3.5L4 14.2l5 5 11-11-1.5-1.5z" />
            </svg>
        </div>

        <h1>Thanh toán thành công 🎉</h1>
        <p>Đơn hàng của bạn đã được ghi nhận. Cảm ơn bạn đã mua hàng!</p>

        <div class="btn-group">
            <a href="/home" class="btn-glass btn-primary-glass">
                Tiếp tục mua hàng
            </a>

            <a href="/order" class="btn-glass btn-outline-glass">
                Xem đơn hàng
            </a>
        </div>

    </div>

</body>

</html>
