<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Management</title>
    <link rel="shortcut icon" th:href="@{/img/favicon_New.png}" type="image/x-icon">
    <link th:href="@{/css/base.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <th:block th:replace="~{common/head}"></th:block>
    <link th:href="@{/css/profileTest.css}" rel="stylesheet">
</head>

<body>
    <div th:replace="~{client/layout/header}"></div>
    <div class="page">
        <aside class="sidebar">
            <h3>My Account</h3>
            <nav class="nav">
                <a class="active" href="#">Account Management</a>
                <a href="#">My Orders</a>
                <a href="#">Address Book</a>
                <a href="#">Account Information</a>
                <a href="#">Voucher List</a>
            </nav>
        </aside>
        
        <form th:action="@{change-password}" method="post">

            <div class="mb-3">
                <label>Old Password</label>
                <input type="password" name="oldPassword" class="form-control" required>
            </div>
        
            <div class="mb-3">
                <label>New Password</label>
                <input type="password" name="newPassword" class="form-control" required>
            </div>
        
            <div class="mb-3">
                <label>Confirm Password</label>
                <input type="password" name="confirmPassword" class="form-control" required>
            </div>
        
            <button type="submit" class="btn btn-warning">
                Update Password
            </button>
        
            <div class="text-danger mt-2" th:if="${error}" th:text="${error}"></div>
            <div class="text-success mt-2" th:if="${success}" th:text="${success}"></div>
        
        </form>
    </div>    

    <div th:replace="~{client/layout/footer}">

    </div>
    <script src="https://unpkg.com/swiper@8/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</body>
